<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Flowin · Pro</title>
<style>
:root{
  --a:#7C2D92;--a2:#A855F7;--al:#F3E8FF;
  --ag:linear-gradient(135deg,#7C2D92 0%,#A855F7 100%);
  --bg:#F8F5FF;--card:#fff;--border:#E9D5FF;
  --txt:#1F1B2E;--muted:#6B7280;--sm:#94A3B8;
  --live:#EF4444;--upcoming:#3B82F6;--past:#94A3B8;
  --success:#10B981;--warn:#F59E0B;--info:#3B82F6;
  --r:14px;--rs:10px;--shadow:0 2px 12px rgba(124,45,146,.08);
  --shadow-lg:0 8px 24px rgba(124,45,146,.12);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{overflow-x:hidden}
body{background:var(--bg);color:var(--txt);font-family:'Segoe UI',system-ui,-apple-system,sans-serif;min-height:100vh;padding-bottom:84px;font-size:14px;line-height:1.4}

/* ──── PRO SWITCHER (mode test) ──── */
.pro-switcher{position:fixed;top:0;left:0;right:0;background:rgba(15,14,26,.95);color:#fff;padding:7px 12px;z-index:200;font-size:11px;display:flex;align-items:center;gap:8px;backdrop-filter:blur(8px);border-bottom:1px solid rgba(255,255,255,.1)}
.pro-switcher select{background:rgba(255,255,255,.12);color:#fff;border:1px solid rgba(255,255,255,.25);padding:4px 8px;border-radius:6px;font-size:11px;font-weight:600;flex:1;max-width:280px}
.pro-switcher .x{background:transparent;color:#fff;border:none;font-size:18px;cursor:pointer;padding:0 6px;opacity:.6}

/* ──── TOPBAR ──── */
.topbar{background:var(--ag);color:#fff;padding:42px 16px 16px;position:sticky;top:0;z-index:100;box-shadow:var(--shadow-lg)}
.topbar-row{display:flex;align-items:center;gap:12px}
.tb-avatar{width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800;border:2px solid rgba(255,255,255,.3);flex-shrink:0}
.tb-info{flex:1;min-width:0}
.tb-name{font-size:16px;font-weight:800;line-height:1.2;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tb-sub{font-size:11px;opacity:.85;margin-top:2px}
.tb-badge{background:rgba(255,255,255,.2);padding:5px 10px;border-radius:20px;font-size:11px;font-weight:700;backdrop-filter:blur(8px)}
.welcome-msg{margin-top:12px;padding:10px 12px;background:rgba(255,255,255,.15);border-radius:10px;font-size:12px;line-height:1.5;backdrop-filter:blur(8px)}
.welcome-msg.hidden{display:none}

/* ──── VIEWS ──── */
.view{display:none;padding:16px 14px}
.view.active{display:block}
.section-title{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin:18px 0 10px 4px;display:flex;align-items:center;justify-content:space-between}
.section-title .count{background:var(--al);color:var(--a);padding:2px 8px;border-radius:10px;font-size:10px}

/* ──── KPI CARDS ──── */
.kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.kpi-card{background:var(--card);border-radius:var(--r);padding:14px;box-shadow:var(--shadow);border:1px solid var(--border);position:relative;overflow:hidden}
.kpi-card::before{content:'';position:absolute;top:0;right:0;width:60px;height:60px;background:var(--ag);opacity:.05;border-radius:0 0 0 100%}
.kpi-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;font-weight:600}
.kpi-value{font-size:26px;font-weight:900;color:var(--txt);line-height:1.1;margin:6px 0 4px;font-family:'SF Mono','Menlo',monospace}
.kpi-delta{font-size:11px;color:var(--success);font-weight:600;display:flex;align-items:center;gap:3px}
.kpi-delta.neutral{color:var(--muted)}
.kpi-icon{position:absolute;top:10px;right:10px;font-size:18px;opacity:.7}

/* ──── EVENT CARD ──── */
.ev-card{background:var(--card);border-radius:var(--r);padding:0;margin-bottom:10px;box-shadow:var(--shadow);overflow:hidden;border:1px solid var(--border);cursor:pointer;transition:transform .15s,box-shadow .15s}
.ev-card:active{transform:scale(.98)}
.ev-card-banner{height:6px;background:var(--ev-color,var(--a))}
.ev-card-body{padding:14px}
.ev-row{display:flex;align-items:flex-start;gap:10px;margin-bottom:10px}
.ev-date{background:var(--al);color:var(--a);padding:7px 10px;border-radius:10px;text-align:center;min-width:48px;flex-shrink:0}
.ev-date .d{font-size:18px;font-weight:900;line-height:1;display:block}
.ev-date .m{font-size:9px;text-transform:uppercase;letter-spacing:.08em;font-weight:700;margin-top:1px;display:block}
.ev-info{flex:1;min-width:0}
.ev-name{font-size:15px;font-weight:700;line-height:1.3;margin-bottom:3px}
.ev-meta{font-size:11px;color:var(--muted);display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.ev-meta span{display:inline-flex;align-items:center;gap:3px}
.ev-status{padding:4px 9px;border-radius:6px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;display:inline-flex;align-items:center;gap:4px;flex-shrink:0}
.ev-status.live{background:#FEE2E2;color:var(--live)}
.ev-status.live::before{content:'';width:6px;height:6px;background:var(--live);border-radius:50%;animation:pulse 1.4s ease-in-out infinite}
.ev-status.upcoming{background:#DBEAFE;color:var(--upcoming)}
.ev-status.past{background:#F3F4F6;color:var(--past)}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.6;transform:scale(1.3)}}
.ev-stats{display:flex;gap:14px;padding-top:10px;border-top:1px solid var(--border);margin-top:6px}
.ev-stat{flex:1}
.ev-stat-val{font-size:16px;font-weight:800;color:var(--txt);line-height:1}
.ev-stat-lbl{font-size:9px;text-transform:uppercase;color:var(--muted);margin-top:3px;letter-spacing:.05em}

/* ──── JOUEUR CARD ──── */
.j-card{background:var(--card);border-radius:var(--rs);padding:12px;margin-bottom:8px;border:1px solid var(--border);box-shadow:var(--shadow);display:flex;align-items:center;gap:10px}
.j-avatar{width:38px;height:38px;border-radius:50%;background:var(--ag);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;flex-shrink:0}
.j-info{flex:1;min-width:0}
.j-name{font-weight:700;font-size:13px;display:flex;align-items:center;gap:6px}
.j-name .optin-dot{width:6px;height:6px;border-radius:50%;background:var(--success)}
.j-meta{font-size:11px;color:var(--muted);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.j-meta .pipe{margin:0 4px;opacity:.4}
.j-tag{padding:3px 8px;border-radius:5px;font-size:10px;font-weight:600;background:var(--al);color:var(--a);flex-shrink:0}

/* ──── SEARCH ──── */
.search-row{position:sticky;top:42px;background:var(--bg);padding:10px 0;z-index:40;margin:-16px -14px 12px;padding:12px 14px}
.search{width:100%;padding:11px 14px 11px 38px;border:1px solid var(--border);border-radius:24px;background:#fff;font-size:13px;color:var(--txt);outline:none;box-shadow:var(--shadow)}
.search:focus{border-color:var(--a);box-shadow:0 0 0 3px rgba(124,45,146,.1)}
.search-wrap{position:relative}
.search-wrap::before{content:'🔍';position:absolute;left:13px;top:50%;transform:translateY(-50%);font-size:13px;opacity:.5;pointer-events:none}

/* ──── QR CARDS ──── */
.qr-card{background:var(--card);border-radius:var(--r);padding:18px;margin-bottom:14px;text-align:center;box-shadow:var(--shadow);border:1px solid var(--border)}
.qr-img{width:200px;height:200px;margin:14px auto;display:block;background:#fff;padding:10px;border-radius:10px;border:1px solid var(--border)}
.qr-url{font-size:10px;color:var(--muted);word-break:break-all;background:var(--bg);padding:8px 10px;border-radius:8px;margin-top:8px;font-family:'SF Mono','Menlo',monospace}
.qr-name{font-size:14px;font-weight:700;color:var(--txt);margin-bottom:4px}
.qr-status-chip{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:14px;font-size:10px;font-weight:700;text-transform:uppercase}

/* ──── BUTTONS / ACTIONS ──── */
.btn{background:var(--ag);color:#fff;border:none;padding:13px 18px;border-radius:11px;font-weight:700;font-size:14px;cursor:pointer;width:100%;display:flex;align-items:center;justify-content:center;gap:7px;margin-bottom:10px;box-shadow:var(--shadow)}
.btn:active{transform:scale(.98)}
.btn-2{background:#fff;color:var(--a);border:1px solid var(--border)}
.btn-icon{display:inline-flex;align-items:center;justify-content:center;width:36px;height:36px;border-radius:8px;background:var(--al);color:var(--a);border:none;cursor:pointer;font-size:15px}

/* ──── EMPTY STATES ──── */
.empty{text-align:center;padding:50px 24px;color:var(--muted)}
.empty-emoji{font-size:48px;margin-bottom:14px;opacity:.6}
.empty-title{font-size:15px;font-weight:700;color:var(--txt);margin-bottom:6px}
.empty-msg{font-size:12px;line-height:1.6}

/* ──── BOTTOM NAV ──── */
.bottomnav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--border);display:flex;z-index:100;box-shadow:0 -4px 16px rgba(124,45,146,.06);padding-bottom:env(safe-area-inset-bottom)}
.nav-btn{flex:1;background:none;border:none;padding:10px 4px 11px;color:var(--muted);font-size:10px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;font-weight:600;transition:color .15s;position:relative}
.nav-btn .ico{font-size:20px;line-height:1}
.nav-btn.active{color:var(--a)}
.nav-btn.active::before{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:30px;height:3px;background:var(--a);border-radius:0 0 4px 4px}

/* ──── DETAIL SHEETS ──── */
.sheet{position:fixed;bottom:-100%;left:0;right:0;background:var(--card);border-radius:20px 20px 0 0;z-index:300;transition:bottom .25s ease;max-height:88vh;overflow-y:auto;box-shadow:0 -10px 40px rgba(0,0,0,.2)}
.sheet.open{bottom:0}
.sheet-handle{width:36px;height:4px;background:#D1D5DB;border-radius:4px;margin:10px auto 6px}
.sheet-header{padding:8px 18px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.sheet-title{font-weight:800;font-size:16px}
.sheet-close{background:none;border:none;font-size:24px;cursor:pointer;color:var(--muted);padding:0 6px}
.sheet-body{padding:18px}
.sheet-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:250;opacity:0;pointer-events:none;transition:opacity .2s}
.sheet-backdrop.show{opacity:1;pointer-events:auto}

.kv{display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px dashed var(--border);font-size:13px}
.kv:last-child{border:none}
.kv-key{color:var(--muted)}
.kv-val{font-weight:600;text-align:right}

.module-pill{display:inline-block;padding:3px 8px;background:var(--al);color:var(--a);border-radius:5px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em}

/* ──── TOAST ──── */
.toast{position:fixed;bottom:96px;left:50%;transform:translateX(-50%) translateY(10px);background:#1F1B2E;color:#fff;padding:11px 22px;border-radius:22px;font-size:13px;font-weight:600;z-index:1000;opacity:0;pointer-events:none;transition:all .25s;box-shadow:0 8px 24px rgba(0,0,0,.3)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

@media (max-width: 360px){
  .kpi-value{font-size:22px}
  .ev-name{font-size:14px}
}
</style>
</head>
<body>

<!-- ────────────────── PRO SWITCHER ────────────────── -->
<div id="pro-switcher" class="pro-switcher">
  <span style="opacity:.7">PRO:</span>
  <select id="pro-select" onchange="switchPro(this.value)">
    <option value="pro-test-cannes">Cannes (TEST)</option>
    <option value="pro-test-antibes">Antibes (TEST)</option>
    <option value="pro-test-grasse">Grasse (TEST)</option>
    <option value="pro-test-nice">Nice (TEST)</option>
    <option value="pro-test-mougins">Mougins (TEST)</option>
    <option value="pro-vence">Vence (PROD)</option>
  </select>
  <button class="x" onclick="document.getElementById('pro-switcher').style.display='none';document.querySelector('.topbar').style.paddingTop='16px'">×</button>
</div>

<!-- ────────────────── TOPBAR ────────────────── -->
<div class="topbar">
  <div class="topbar-row">
    <div class="tb-avatar" id="tb-avatar">PR</div>
    <div class="tb-info">
      <div class="tb-name" id="tb-name">Chargement...</div>
      <div class="tb-sub" id="tb-sub">—</div>
    </div>
    <div class="tb-badge" id="tb-badge">—</div>
  </div>
  <div class="welcome-msg hidden" id="welcome-msg"></div>
</div>

<!-- ────────────────── VIEW : ACCUEIL ────────────────── -->
<div id="v-dashboard" class="view active">
  <div class="section-title">Vue d'ensemble</div>
  <div class="kpi-grid">
    <div class="kpi-card">
      <div class="kpi-icon">👥</div>
      <div class="kpi-label">Participants</div>
      <div class="kpi-value" id="kpi-part">0</div>
      <div class="kpi-delta neutral" id="kpi-part-d">—</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-icon">✅</div>
      <div class="kpi-label">Opt-in CRM</div>
      <div class="kpi-value" id="kpi-optin">0</div>
      <div class="kpi-delta" id="kpi-optin-d">—</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-icon">🎁</div>
      <div class="kpi-label">Lots distribués</div>
      <div class="kpi-value" id="kpi-lots">0</div>
      <div class="kpi-delta neutral" id="kpi-lots-d">—</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-icon">🏆</div>
      <div class="kpi-label">Gagnants</div>
      <div class="kpi-value" id="kpi-gag">0</div>
      <div class="kpi-delta neutral" id="kpi-gag-d">—</div>
    </div>
  </div>
  
  <div class="section-title">Events récents <span class="count" id="cnt-recent">0</span></div>
  <div id="recent-events"></div>
</div>

<!-- ────────────────── VIEW : EVENTS ────────────────── -->
<div id="v-events" class="view">
  <div class="section-title">Mes événements <span class="count" id="cnt-events">0</span></div>
  <div id="events-list"></div>
</div>

<!-- ────────────────── VIEW : JOUEURS ────────────────── -->
<div id="v-joueurs" class="view">
  <div class="search-row">
    <div class="search-wrap">
      <input type="text" class="search" id="search-j" placeholder="Rechercher un joueur..." oninput="renderJoueurs()">
    </div>
  </div>
  <div class="section-title">Joueurs <span class="count" id="cnt-joueurs">0</span></div>
  <div id="joueurs-list"></div>
</div>

<!-- ────────────────── VIEW : PARCOURS QR ────────────────── -->
<div id="v-parcours" class="view">
  <div class="section-title">QR Codes des événements</div>
  <div id="qr-list"></div>
</div>

<!-- ────────────────── VIEW : EXPORT ────────────────── -->
<div id="v-export" class="view">
  <div class="section-title">Exports CSV</div>
  <div style="background:var(--card);border-radius:var(--r);padding:18px;box-shadow:var(--shadow);border:1px solid var(--border);margin-bottom:14px">
    <p style="font-size:13px;color:var(--muted);margin-bottom:14px;line-height:1.5">Téléchargez vos données pour les analyses, mailings ou archivage RGPD.</p>
    <button class="btn" onclick="exportJoueurs()">📥 Joueurs (CSV)</button>
    <button class="btn btn-2" onclick="exportGagnants()">🏆 Gagnants (CSV)</button>
    <button class="btn btn-2" onclick="exportEvents()">📅 Événements (CSV)</button>
  </div>
</div>

<!-- ────────────────── DETAIL SHEET (EVENT) ────────────────── -->
<div class="sheet-backdrop" id="sheet-bd" onclick="closeSheet()"></div>
<div class="sheet" id="sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-header">
    <div class="sheet-title" id="sheet-title">Détail</div>
    <button class="sheet-close" onclick="closeSheet()">×</button>
  </div>
  <div class="sheet-body" id="sheet-body"></div>
</div>

<div class="toast" id="toast"></div>

<!-- ────────────────── BOTTOM NAV ────────────────── -->
<nav class="bottomnav">
  <button id="nav-dashboard" class="nav-btn active" onclick="goTab('dashboard',this)"><div class="ico">🏠</div>Accueil</button>
  <button id="nav-events" class="nav-btn" onclick="goTab('events',this)"><div class="ico">📅</div>Events</button>
  <button id="nav-joueurs" class="nav-btn" onclick="goTab('joueurs',this)"><div class="ico">👥</div>Joueurs</button>
  <button id="nav-parcours" class="nav-btn" onclick="goTab('parcours',this)"><div class="ico">📱</div>QR</button>
  <button id="nav-export" class="nav-btn" onclick="goTab('export',this)"><div class="ico">📤</div>Export</button>
</nav>

<script>
/* ═══════════════════════════════════════════════════════════ */
/* CONFIG                                                       */
/* ═══════════════════════════════════════════════════════════ */
var SUPA_URL = 'https://atddutvzklcgiqxlpvla.supabase.co';
var SUPA_ANON = 'sb_publishable_LBkvaGc0M9ZzXZLxviJi9g_58lU8onF';
var PARCOURS_BASE = 'https://flowin-events.vercel.app';

var PRO_ID = (function(){
  var p = new URLSearchParams(window.location.search).get('pro');
  if(p){ localStorage.setItem('flowin_pro_id', p); return p; }
  var stored = localStorage.getItem('flowin_pro_id');
  return stored || 'pro-test-cannes';
})();

function switchPro(id){
  localStorage.setItem('flowin_pro_id', id);
  window.location.href = window.location.pathname + '?pro=' + id;
}

setTimeout(function(){
  var sel = document.getElementById('pro-select');
  if(sel) sel.value = PRO_ID;
},100);

/* ═══════════════════════════════════════════════════════════ */
/* DATA                                                         */
/* ═══════════════════════════════════════════════════════════ */
var DATA = {pros:[],partenaires:[],events:[],superEvents:[],joueurs:[],lots:[],banques:[]};

function camel(row){
  if(!row) return null;
  var o={};
  for(var k in row){ if(row.hasOwnProperty(k)) o[k]=row[k]; }
  var map={pro_id:'proId',code_postal:'codePostal',date_d:'dateD',date_f:'dateF',
    h_start:'hStart',h_end:'hEnd',joueurs_optin:'joueursOptin',super_event_id:'superEventId',
    client_type:'clientType',pro_visib:'proVisib',score_min:'scoreMin',score_moy:'scoreMoy',
    optin_date:'optinDate',first_seen:'firstSeen',last_seen:'lastSeen',lot_gagne:'lotGagne',
    ticket_code:'ticketCode',partenaire_id:'partenaireId',event_id:'eventId',assigne_a:'assigneA'};
  for(var sk in map){
    if(o[sk]!==undefined){ o[map[sk]]=o[sk]; delete o[sk]; }
  }
  return o;
}

function fetchTable(name){
  return fetch(SUPA_URL+'/rest/v1/'+name+'?select=*',{
    headers:{'apikey':SUPA_ANON,'Authorization':'Bearer '+SUPA_ANON}
  }).then(function(r){return r.ok?r.json():[]}).catch(function(){return[]});
}

async function loadAll(){
  var r = await Promise.all([
    fetchTable('pros'),fetchTable('events'),fetchTable('joueurs'),
    fetchTable('lots'),fetchTable('super_events'),fetchTable('partenaires')
  ]);
  DATA.pros=r[0].map(camel);
  DATA.events=r[1].map(camel);
  DATA.joueurs=r[2].map(camel);
  DATA.lots=r[3].map(camel);
  DATA.superEvents=r[4].map(camel);
  DATA.partenaires=r[5].map(camel);
  console.log('[Pro] Supabase chargé:',DATA.events.length+' events, '+DATA.joueurs.length+' joueurs');
}

/* ═══════════════════════════════════════════════════════════ */
/* SCOPE PRO — vue scopée par pro_id                            */
/* ═══════════════════════════════════════════════════════════ */
function myPro(){
  for(var i=0;i<DATA.pros.length;i++){
    if(DATA.pros[i].id===PRO_ID) return DATA.pros[i];
  }
  return null;
}
function myEvents(){
  return DATA.events.filter(function(e){return e.proId===PRO_ID});
}
function myJoueurs(){
  var ids = myEvents().map(function(e){return e.id});
  return DATA.joueurs.filter(function(j){
    if(!j.events) return false;
    for(var i=0;i<j.events.length;i++){
      if(ids.indexOf(j.events[i])>=0) return true;
    }
    return false;
  });
}
function myLots(){
  var ids = myEvents().map(function(e){return e.id});
  return DATA.lots.filter(function(l){return ids.indexOf(l.eventId)>=0});
}

/* ═══════════════════════════════════════════════════════════ */
/* HELPERS                                                       */
/* ═══════════════════════════════════════════════════════════ */
var MONTHS=['JAN','FÉV','MAR','AVR','MAI','JUI','JUL','AOÛ','SEP','OCT','NOV','DÉC'];

function formatDate(s){
  if(!s) return {d:'—',m:'—'};
  var dt = new Date(s);
  if(isNaN(dt)) return {d:'—',m:'—'};
  return {d:String(dt.getDate()),m:MONTHS[dt.getMonth()]};
}

function statusLabel(s){
  if(s==='live') return 'LIVE';
  if(s==='upcoming') return 'À VENIR';
  if(s==='past') return 'PASSÉ';
  return s||'—';
}

function moduleLabel(m){
  var map={quiz:'Quiz',quizsolo:'Quiz Solo',quizmaster:'Quiz Master',
    vote:'Vote',standup:'Stand-up',spin:'Roue',tombola:'Tombola'};
  return map[m]||m||'—';
}

function initials(s){
  if(!s) return '?';
  var p = s.replace('TEST ','').replace('TEST·','').trim().split(/\s+/);
  if(p.length<2) return (p[0]||'?').substring(0,2).toUpperCase();
  return (p[0][0]+p[1][0]).toUpperCase();
}

function pluralize(n,sg,pl){return n+' '+(n>1?(pl||sg+'s'):sg)}

function toast(msg){
  var t=document.getElementById('toast');
  t.textContent=msg;
  t.classList.add('show');
  setTimeout(function(){t.classList.remove('show')},2500);
}

/* ═══════════════════════════════════════════════════════════ */
/* PRO VISIB — masquer onglets selon flags SA                   */
/* ═══════════════════════════════════════════════════════════ */
function applyProVisib(){
  var evs = myEvents();
  if(!evs.length) return;
  var ev = null;
  for(var i=0;i<evs.length;i++){if(evs[i].status==='live'){ev=evs[i];break}}
  if(!ev) ev=evs[0];
  var pv=(ev&&ev.proVisib)||{};
  
  var map={dashboard:'stats',events:'activite',joueurs:'participants',parcours:'qr',export:'export'};
  for(var t in map){
    var btn=document.getElementById('nav-'+t);
    if(!btn) continue;
    if(pv[map[t]]===false){btn.style.display='none'}
    else {btn.style.display=''}
  }
  
  if(pv.msgBienvenue){
    var m=document.getElementById('welcome-msg');
    m.textContent='💬 '+pv.msgBienvenue;
    m.classList.remove('hidden');
  }
}

/* ═══════════════════════════════════════════════════════════ */
/* RENDER : TOPBAR                                              */
/* ═══════════════════════════════════════════════════════════ */
function renderTopbar(){

  document.getElementById('tb-sub').textContent = pro?(pro.ville+' · '+pluralize(evs.length,'événement')):'—';
  document.getElementById('tb-avatar').textContent = pro?initials(pro.nom):'?';

/* ═══════════════════════════════════════════════════════════ */
/* RENDER : ACCUEIL (KPIs + events récents)                     */
/* ═══════════════════════════════════════════════════════════ */
function renderDashboard(){
  var evs=myEvents();
  var jou=myJoueurs();
  var lots=myLots();
  
  var part=0,gag=0,optin=0;
  for(var i=0;i<evs.length;i++){
    part+=evs[i].participants||0;
    gag+=evs[i].gagnants||0;
    optin+=evs[i].joueursOptin||0;
  }
  var lotsAssign=0;
  for(var i=0;i<lots.length;i++){if(lots[i].assigneA)lotsAssign++}
  
  var optinRate = part>0?Math.round((optin/part)*100):0;
  
  document.getElementById('kpi-part').textContent=part;
  document.getElementById('kpi-optin').textContent=optin;
  document.getElementById('kpi-lots').textContent=lotsAssign+'/'+lots.length;
  document.getElementById('kpi-gag').textContent=gag;
  document.getElementById('kpi-part-d').textContent=pluralize(evs.length,'event');
  document.getElementById('kpi-optin-d').textContent=optinRate+' % opt-in';
  document.getElementById('kpi-lots-d').textContent=lotsAssign>0?'attribués':'à attribuer';
  document.getElementById('kpi-gag-d').textContent=gag>0?'gagnants':'—';
  
  // Events récents (3 derniers)
  var sorted = evs.slice().sort(function(a,b){
    var da=new Date(a.dateD||0), db=new Date(b.dateD||0);
    return db-da;
  });
  var recent = sorted.slice(0,5);
  document.getElementById('cnt-recent').textContent=recent.length;
  document.getElementById('recent-events').innerHTML = recent.map(function(e){return evCardHTML(e)}).join('') || emptyHTML('📅','Aucun événement','Vos événements apparaîtront ici.');
}

/* ═══════════════════════════════════════════════════════════ */
/* RENDER : EVENT CARD                                          */
/* ═══════════════════════════════════════════════════════════ */
function evCardHTML(e){
  var d = formatDate(e.dateD);
  var c = e.couleur||'#7C2D92';
  return '<div class="ev-card" style="--ev-color:'+c+'" onclick="openEventDetail(\''+e.id+'\')">'+
    '<div class="ev-card-banner"></div>'+
    '<div class="ev-card-body">'+
      '<div class="ev-row">'+
        '<div class="ev-date"><span class="d">'+d.d+'</span><span class="m">'+d.m+'</span></div>'+
        '<div class="ev-info">'+
          '<div class="ev-name">'+(e.nom||'Sans nom')+'</div>'+
          '<div class="ev-meta">'+
            '<span class="module-pill">'+moduleLabel(e.module)+'</span>'+
            (e.lieu?'<span>📍 '+e.lieu+'</span>':'')+
          '</div>'+
        '</div>'+
        '<div class="ev-status '+(e.status||'past')+'">'+statusLabel(e.status)+'</div>'+
      '</div>'+
      '<div class="ev-stats">'+
        '<div class="ev-stat"><div class="ev-stat-val">'+(e.participants||0)+'</div><div class="ev-stat-lbl">Particip.</div></div>'+
        '<div class="ev-stat"><div class="ev-stat-val">'+(e.joueursOptin||0)+'</div><div class="ev-stat-lbl">Opt-in</div></div>'+
        '<div class="ev-stat"><div class="ev-stat-val">'+(e.gagnants||0)+'</div><div class="ev-stat-lbl">Gagnants</div></div>'+
      '</div>'+
    '</div>'+
  '</div>';
}

/* ═══════════════════════════════════════════════════════════ */
/* RENDER : EVENTS                                              */
/* ═══════════════════════════════════════════════════════════ */
function renderEvents(){
  var evs = myEvents().slice().sort(function(a,b){
    // Live > upcoming > past, puis date DESC
    var order={live:0,upcoming:1,past:2};
    var oa=order[a.status]||3, ob=order[b.status]||3;
    if(oa!==ob) return oa-ob;
    return new Date(b.dateD||0)-new Date(a.dateD||0);
  });
  document.getElementById('cnt-events').textContent=evs.length;
  document.getElementById('events-list').innerHTML = evs.map(function(e){return evCardHTML(e)}).join('') || emptyHTML('📅','Aucun événement','Le SA n\'a pas encore créé d\'événement pour vous.');
}

/* ═══════════════════════════════════════════════════════════ */
/* RENDER : JOUEURS                                             */
/* ═══════════════════════════════════════════════════════════ */
function renderJoueurs(){
  var search=(document.getElementById('search-j')||{}).value||'';
  search=search.toLowerCase().trim();
  var jou=myJoueurs();
  if(search){
    jou=jou.filter(function(j){
      var hay=((j.nom||'')+' '+(j.prenom||'')+' '+(j.email||'')+' '+(j.ville||'')).toLowerCase();
      return hay.indexOf(search)>=0;
    });
  }
  document.getElementById('cnt-joueurs').textContent=jou.length;
  document.getElementById('joueurs-list').innerHTML = jou.map(function(j){
    var nom=(j.prenom||'')+' '+(j.nom||'');
    nom=nom.trim()||(j.email||'—');
    var ini=initials(nom);
    var meta=[];
    if(j.email) meta.push(j.email);
    if(j.ville) meta.push(j.ville);
    return '<div class="j-card" onclick="openJoueurDetail(\''+j.id+'\')">'+
      '<div class="j-avatar">'+ini+'</div>'+
      '<div class="j-info">'+
        '<div class="j-name">'+nom+(j.optin?'<span class="optin-dot" title="Opt-in"></span>':'')+'</div>'+
        '<div class="j-meta">'+meta.join(' · ')+'</div>'+
      '</div>'+
      (j.lotGagne?'<div class="j-tag">🎁 Gagnant</div>':'')+
    '</div>';
  }).join('') || emptyHTML('👥','Aucun joueur','Les participants apparaîtront ici.');
}

/* ═══════════════════════════════════════════════════════════ */
/* RENDER : QR PARCOURS                                          */
/* ═══════════════════════════════════════════════════════════ */
function renderParcours(){
  var evs=myEvents().filter(function(e){return e.status!=='past'});
  if(!evs.length) evs=myEvents(); // si tout est past, on montre quand même
  
  var html = evs.map(function(e){
    var url = PARCOURS_BASE+'/parcours/?ev='+e.id;
    var qr = 'https://api.qrserver.com/v1/create-qr-code/?size=400x400&data='+encodeURIComponent(url);
    return '<div class="qr-card">'+
      '<div class="qr-name">'+(e.nom||'Sans nom')+'</div>'+
      '<span class="qr-status-chip '+(e.status==='live'?'ev-status live':(e.status==='upcoming'?'ev-status upcoming':'ev-status past'))+'" style="font-size:9px">'+statusLabel(e.status)+'</span>'+
      '<img class="qr-img" src="'+qr+'" alt="QR Code">'+
      '<div class="qr-url">'+url+'</div>'+
      '<button class="btn btn-2" style="margin-top:10px" onclick="copyUrl(\''+url+'\')">📋 Copier le lien</button>'+
    '</div>';
  }).join('');
  
  document.getElementById('qr-list').innerHTML = html || emptyHTML('📱','Aucun QR disponible','Aucun événement actif.');
}

function copyUrl(url){
  if(navigator.clipboard){
    navigator.clipboard.writeText(url).then(function(){toast('Lien copié 📋')});
  } else {
    toast('Lien : '+url);
  }
}

/* ═══════════════════════════════════════════════════════════ */
/* EXPORTS CSV                                                   */
/* ═══════════════════════════════════════════════════════════ */
function downloadCSV(name,rows){
  if(!rows.length){toast('Aucune donnée à exporter');return}
  var keys=Object.keys(rows[0]);
  var csv=keys.join(';')+'\n';
  rows.forEach(function(r){
    csv+=keys.map(function(k){
      var v=r[k];
      if(Array.isArray(v)) v=v.join('|');
      if(v==null) v='';
      v=String(v).replace(/;/g,',').replace(/\n/g,' ');
      return v;
    }).join(';')+'\n';
  });
  var blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
  var a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=name+'_'+new Date().toISOString().split('T')[0]+'.csv';
  a.click();
  toast('Export téléchargé');
}

function exportJoueurs(){
  var jou=myJoueurs().map(function(j){return {
    nom:j.nom||'',prenom:j.prenom||'',email:j.email||'',tel:j.tel||'',
    ville:j.ville||'',code_postal:j.codePostal||'',optin:j.optin?'oui':'non',
    optin_date:j.optinDate||'',source:j.source||'',first_seen:j.firstSeen||'',
    lot_gagne:j.lotGagne||'',ticket:j.ticketCode||'',score:j.scoreMoy||''
  }});
  downloadCSV('flowin_joueurs',jou);
}

function exportGagnants(){
  var jou=myJoueurs().filter(function(j){return j.lotGagne}).map(function(j){return {
    nom:j.nom||'',prenom:j.prenom||'',email:j.email||'',tel:j.tel||'',
    lot:j.lotGagne||'',ville:j.ville||''
  }});
  downloadCSV('flowin_gagnants',jou);
}

function exportEvents(){
  var evs=myEvents().map(function(e){return {
    id:e.id,nom:e.nom||'',module:e.module||'',status:e.status||'',
    date_d:e.dateD||'',date_f:e.dateF||'',lieu:e.lieu||'',
    participants:e.participants||0,opt_in:e.joueursOptin||0,gagnants:e.gagnants||0
  }});
  downloadCSV('flowin_events',evs);
}

/* ═══════════════════════════════════════════════════════════ */
/* NAVIGATION                                                    */
/* ═══════════════════════════════════════════════════════════ */
var currentTab='dashboard';
function goTab(tab,btn){
  applyProVisib();
  var views=document.querySelectorAll('.view');
  for(var i=0;i<views.length;i++) views[i].classList.remove('active');
  var btns=document.querySelectorAll('.nav-btn');
  for(var i=0;i<btns.length;i++) btns[i].classList.remove('active');
  var v=document.getElementById('v-'+tab);
  if(v) v.classList.add('active');
  if(btn) btn.classList.add('active');
  currentTab=tab;
  
  if(tab==='dashboard') renderDashboard();
  else if(tab==='events') renderEvents();
  else if(tab==='joueurs') renderJoueurs();
  else if(tab==='parcours') renderParcours();
  
  window.scrollTo(0,0);
}

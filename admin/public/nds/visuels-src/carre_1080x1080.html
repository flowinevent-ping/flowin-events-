<style>
*{margin:0;padding:0;box-sizing:border-box}html,body{margin:0;background:#15265A}
body{font-family:'Manrope',system-ui,sans-serif;color:#fff;-webkit-font-smoothing:antialiased}
.stage{position:relative;overflow:hidden;background:
  radial-gradient(120% 90% at 82% 14%,rgba(190,120,40,.38),transparent 52%),
  radial-gradient(90% 70% at 12% 8%,rgba(180,40,120,.5),transparent 55%),
  linear-gradient(150deg,#6E1A4F 0%,#2A1240 46%,#15265A 100%)}
.logo{display:block;margin:0 auto}
.badge{display:inline-block;background:linear-gradient(135deg,#FFD874,#F5A100);color:#3a2410;font-weight:800;letter-spacing:.06em;text-transform:uppercase;border-radius:999px}
.title{font-weight:800;letter-spacing:-.03em;line-height:1;color:#fff;text-align:center}
.title .d{color:#FFC24B}
.lots{text-align:center;color:#e9def6}
.lots .lab{color:#8FA6F0;font-weight:800;text-transform:uppercase;letter-spacing:.14em}
.lots .it{display:flex;align-items:center;justify-content:center;gap:.5em;font-weight:700}
.lots .it b{color:#fff}.lots .dot{color:#F5A100}
.qr{background:#fff;border-radius:18px;display:inline-block;line-height:0}.qr img{display:block}
.scan{font-weight:800;color:#fff;text-align:center}
.parts .ph{text-align:center;color:#2FD8B6;font-weight:800;text-transform:uppercase;letter-spacing:.16em}
.slots{display:grid;gap:14px;justify-content:center}
.slot{display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.07);border:1.5px dashed rgba(255,255,255,.34);color:rgba(255,255,255,.64);font-weight:700;border-radius:14px}
.flowin{text-align:center;font-weight:800;color:#fff}.flowin b{color:#2FD8B6}

<!doctype html><html lang="fr"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Billets gagnants — Grand Jeu des Nuits du Sud 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--vio:#7C2D92;--mag:#E0218A;--or:#F5B544;--ink:#160e1d;--ink2:#453b51;--mut:#8d8499;--line:#efeaf4;--soft:#fbf9fd}
*{box-sizing:border-box;margin:0;padding:0;min-width:0}
body{font-family:'Manrope',system-ui,sans-serif;color:var(--ink);background:#efe9f5;padding:18px}
.top{max-width:900px;margin:0 auto 18px}
.top h1{font-size:21px;font-weight:800;letter-spacing:-.3px}
.top p{font-size:13px;color:var(--mut);font-weight:600;margin-top:4px}
.bar{display:flex;gap:9px;align-items:center;flex-wrap:wrap;background:#fff;border:1px solid var(--line);
     border-radius:13px;padding:12px 14px;margin-top:13px}
.bar select,.bar button{font:inherit;font-size:13px;font-weight:700;padding:9px 14px;border-radius:10px;
     border:1px solid #ddd4e6;background:#fff;cursor:pointer;color:var(--ink2)}
.bar button.p{background:var(--vio);color:#fff;border-color:var(--vio)}
.bar .cnt{font-size:12.5px;color:var(--mut);font-weight:700;margin-left:auto}
.scope{background:#fff8ea;border:1px solid #f2e1b6;border-radius:11px;padding:11px 14px;
       font-size:12.5px;font-weight:700;color:#8a6410;margin-top:11px}

.tk{width:100%;max-width:460px;margin:0 auto 10px;background:#fff;border-radius:22px;overflow:hidden;
    box-shadow:0 16px 40px rgba(40,12,60,.14)}
.hd{position:relative;background:#5f1f74;padding:22px 22px 20px;display:flex;
    align-items:center;gap:16px;overflow:hidden}
.hd::before{content:'';position:absolute;left:50%;top:50%;width:300px;height:190px;
            transform:translate(-50%,-50%);border-radius:50%;pointer-events:none;
            background:radial-gradient(ellipse,rgba(224,33,138,.55),rgba(224,33,138,0) 70%)}
.hd > *{position:relative}
.hd img.nds{height:44px;width:auto;flex:none;object-fit:contain}
.hd img.fw{height:26px;width:auto;flex:none;object-fit:contain}
.hd .t{flex:1;min-width:0;color:#fff;font-size:10.5px;font-weight:800;letter-spacing:2.2px;
       text-transform:uppercase;text-align:center;line-height:1.5}
.rule{height:4px;background:linear-gradient(90deg,var(--or),#ffe0a0,var(--or))}
.shop{padding:20px 18px 16px;text-align:center;border-bottom:1px solid var(--line)}
.shop img{height:104px;max-width:82%;object-fit:contain;display:block;margin:0 auto 9px}
.shop .lb{font-size:7.5px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:var(--mut);margin-bottom:4px}
.shop b{display:block;font-size:18px;font-weight:800;line-height:1.25}
.shop .adr{font-size:11px;font-weight:500;color:var(--mut);margin-top:6px;line-height:1.5}
.lot{background:var(--soft);padding:13px 18px;text-align:center;border-bottom:1px solid var(--line)}
.lot h2{font-size:22px;font-weight:800;line-height:1.22;letter-spacing:-.4px}
.lot h2 em{font-style:normal;color:var(--mag)}
.qrz{padding:15px 18px 13px;text-align:center;border-bottom:1px solid var(--line)}
.qrz .box{width:186px;height:186px;margin:0 auto;border:1px solid var(--line);border-radius:15px;
          padding:9px;background:#fff;display:flex;align-items:center;justify-content:center}
.qrz .box img,.qrz .box canvas{width:168px!important;height:168px!important}
.qrz .num{font-family:ui-monospace,Menlo,Consolas,monospace;font-size:18px;font-weight:700;
          color:var(--vio);letter-spacing:1.1px;margin-top:12px}
.qrz .cap{font-size:8px;font-weight:800;letter-spacing:1.2px;text-transform:uppercase;color:var(--mut);margin-top:5px}
.ben{padding:11px 18px;display:flex;gap:16px;border-bottom:1px solid var(--line)}
.ben > div{flex:1;min-width:0}
.lab{font-size:7.5px;font-weight:800;letter-spacing:1.3px;text-transform:uppercase;color:var(--mut);margin-bottom:3px}
.v{font-size:14px;font-weight:700;line-height:1.3;overflow-wrap:anywhere}
.v.sm{font-size:11px;font-weight:600}
.use{padding:12px 18px;border-bottom:1px solid var(--line)}
.use h4{font-size:7.5px;font-weight:800;letter-spacing:1.4px;text-transform:uppercase;color:var(--vio);margin-bottom:9px}
.use ul{list-style:none;display:grid;gap:6px}
.use li{display:flex;gap:8px;font-size:11.5px;font-weight:600;color:var(--ink2);line-height:1.45;overflow-wrap:anywhere}
.use li::before{content:'';flex:none;width:4px;height:4px;border-radius:50%;background:var(--or);margin-top:6px}
.ment{padding:9px 18px 11px}
.ment p{font-size:8px;font-weight:500;line-height:1.65;color:var(--mut)}
.ft{background:var(--ink);padding:15px 20px;text-align:center;font-size:8.5px;font-weight:600;
    color:rgba(255,255,255,.62);line-height:1.75}
.ft b{color:rgba(255,255,255,.92)}
.acts{display:flex;gap:7px;justify-content:center;max-width:460px;margin:0 auto 22px}
.acts button{font:inherit;font-size:11.5px;font-weight:700;padding:7px 13px;border-radius:9px;
             border:1px solid #ddd4e6;background:#fff;cursor:pointer;color:var(--ink2)}
.acts button:hover{border-color:var(--vio);color:var(--vio)}
.empty{background:#fff;border:1px solid var(--line);border-radius:14px;padding:26px;text-align:center;
       color:var(--mut);max-width:460px;margin:0 auto;font-weight:600}
@media print{
  @page{size:A4;margin:12mm}
  body{background:#fff;padding:0}
  .top,.acts,.no-print{display:none!important}
  .tk{max-width:none;margin:0;box-shadow:none;border:1px solid var(--line);border-radius:14px;
      page-break-after:always;break-after:page}
  .tk:last-of-type{page-break-after:auto;break-after:auto}
  .qrz .box{width:210px;height:210px}
  .qrz .box img,.qrz .box canvas{width:190px!important;height:190px!important}
}
body.solo .tk{display:none}
body.solo .tk.only{display:block}
</style></head><body>

var PARTS=[["pt-bergerie","Domaine de la Bergerie"],["pt-pegase","Auto-\u00c9cole de l'ARA"],
           ["pt-utile","Utile Vence"],["pt-nook","Nook Caf\u00e9"],
           ["pt-giordano","\u00c9lectrom\u00e9nager J Giordano"],["pt-charvolin","Assurance Charvolin"],
           ["pt-carrosserie-gp","Carrosserie GP"]];
var NOMS={}; PARTS.forEach(function(p){NOMS[p[0]]=p[1];});
var DATA={}, SCOPE=null;
var MENTIONS="Jeu gratuit sans obligation d'achat \u00b7 Nuits du Sud 2026, Vence \u00b7 lot attribu\u00e9 par tirage au sort \u00b7 non remboursable, non \u00e9changeable contre esp\u00e8ces \u00b7 validable une seule fois.";

function esc(s){return String(s==null?"":s).replace(/[&<>"]/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c];});}
function qs(k){var m=new RegExp("[?&]"+k+"=([^&]*)").exec(location.search);return m?decodeURIComponent(m[1]):"";}
function rpc(fn,body){return fetch(SUPA+"/rest/v1/rpc/"+fn,{method:"POST",headers:{apikey:ANON,Authorization:"Bearer "+ANON,"Content-Type":"application/json"},body:JSON.stringify(body||{})}).then(function(r){return r.ok?r.json():[];});}
function typeBon(l){l=String(l||"").toLowerCase();
  if(l.indexOf("remise")>-1)return "Bon de r\u00e9duction";
  if(l.indexOf("bon d'achat")>-1)return "Bon d'achat";
  if(l.indexOf("offre")>-1)return "Offre gourmande";
  if(l.indexOf("s\u00e9jour")>-1)return "S\u00e9jour";
  if(l.indexOf("formation")>-1)return "Formation";
  return "Bon cadeau";}
/* Les conditions viennent de la base (partenaires.lots[].conditions), decoupees sur les separateurs. */
function puces(txt){
  var parts=String(txt||"").split("\u00b7").map(function(x){return x.trim();}).filter(Boolean);
  if(!parts.length) parts=["Billet nominatif \u00b7 non remboursable \u00b7 validable une seule fois"];
  return parts.map(function(p){return "<li>"+esc(p)+"</li>";}).join("");
}
function billet(pid,w,i){
  var nom=w.partenaire_nom||NOMS[pid]||pid;
  var coord=[w.partenaire_adresse,w.partenaire_tel].filter(Boolean).join(" \u00b7 ");
  var url=location.origin+"/lot.html?t="+encodeURIComponent(w.retrait_token);
  return '<div class="tk" id="tk'+i+'">'
   +'<div class="hd"><img class="nds" src="'+NDS+'" alt="Nuits du Sud">'
   +'<span class="t">Grand Jeu<br>\u00c9dition 2026</span>'
   +'<img class="fw" src="'+FLOWIN+'" alt="Flowin"></div><div class="rule"></div>'
   +'<div class="shop">'+(LOGO[pid]?'<img src="'+LOGO[pid]+'" alt="">':'')
   +'<div class="lb">Commerce partenaire</div><b>'+esc(nom)+'</b>'
   +(coord?'<div class="adr">'+esc(coord)+'</div>':'')+'</div>'
   +'<div class="lot"><h2>'+esc(typeBon(w.lot_nom))+' \u2014 <em>valeur '+esc(w.lot_valeur)+' \u20ac</em></h2></div>'
   +'<div class="qrz"><div class="box" data-url="'+esc(url)+'"></div>'
   +'<div class="num">'+esc(w.ticket_code||"\u2014")+'</div>'
   +'<div class="cap">Le commer\u00e7ant scanne ce code pour valider</div></div>'
   +'<div class="ben"><div><div class="lab">B\u00e9n\u00e9ficiaire</div><div class="v">'+esc(w.joueur_nom)+'</div></div>'
   +'<div><div class="lab">Email</div><div class="v sm">'+esc(w.joueur_email||"\u2014")+'</div></div></div>'
   +'<div class="use"><h4>Conditions d\'utilisation</h4><ul>'+puces(w.conditions)+'</ul></div>'
   +'<div class="ment"><p>'+esc(MENTIONS)+'</p></div>'
   +'<div class="ft"><b>Grand Jeu des Nuits du Sud</b> \u00b7 flowinevent@gmail.com \u00b7 06 16 35 49 36</div>'
   +'</div>'
   +'<div class="acts no-print"><button onclick="printOne('+i+')">\ud83d\udcc4 PDF de ce billet</button>'
   +'<button onclick="copier(\''+esc(url)+'\')">\ud83d\udd17 Copier le lien</button></div>';
}
function copier(u){try{navigator.clipboard.writeText(u);}catch(e){}}
function printAll(){document.body.classList.remove("solo");window.print();}
function printOne(i){
  document.querySelectorAll(".tk").forEach(function(e){e.classList.remove("only");});
  var el=document.getElementById("tk"+i); if(el) el.classList.add("only");
  document.body.classList.add("solo"); window.print();
  setTimeout(function(){document.body.classList.remove("solo");},500);
}
function render(){
  var out=document.getElementById("out"),html="",n=0,i=0;
  var liste = SCOPE ? [[SCOPE,NOMS[SCOPE]||SCOPE]] : PARTS;
  liste.forEach(function(p){(DATA[p[0]]||[]).forEach(function(w){html+=billet(p[0],w,i++);n++;});});
  out.innerHTML = html || (SCOPE
      ? '<div class="empty">Aucun billet confirm\u00e9 pour l\'instant.<br><span style="font-weight:600;font-size:12px">Les gagnants apparaissent ici au fur et \u00e0 mesure qu\'ils sont contact\u00e9s et valid\u00e9s par l\'organisateur.</span></div>'
      : '<div class="empty">Aucun billet pour cette s\u00e9lection.</div>');
  document.getElementById("cnt").textContent = n+" billet"+(n>1?"s":"");
  document.querySelectorAll(".box").forEach(function(el){
    if(el.childNodes.length) return;
    try{ new QRCode(el,{text:el.getAttribute("data-url"),width:168,height:168,correctLevel:QRCode.CorrectLevel.M}); }
    catch(e){ el.innerHTML='<span style="font-size:9px;color:#b91c1c">QR indisponible</span>'; }
  });
}
(function init(){
  SCOPE=qs("p")||null;
  var lbl=document.getElementById("lbl"),sc=document.getElementById("scope"),sel=document.getElementById("sel");
  if(SCOPE){
    lbl.textContent=NOMS[SCOPE]||SCOPE;
    sc.innerHTML="\ud83d\udd12 Cette planche ne contient que les billets de <b>"+esc(NOMS[SCOPE]||SCOPE)+"</b>.";
  }else{
    lbl.textContent="Tous les commerces";
    sc.innerHTML="\u26a0\ufe0f Vue interne, tous commerces confondus. Pour envoyer \u00e0 un commer\u00e7ant, utilisez le lien de sa fiche partenaire.";
    sel.style.display="";
  }
  /* Cycle de vie : TIRE (interne) -> CONFIRME (visible partenaire) -> RETIRE.
     Le lien partenaire (?p=) ne charge QUE les confirmes. Le filtrage est cote serveur :
     modifier l URL ne peut pas exposer un gagnant non encore appele. */
  var MODE = SCOPE ? "partenaire" : "interne";
  var cible = SCOPE?[[SCOPE,NOMS[SCOPE]]]:PARTS;
  Promise.all(cible.map(function(p){
    return rpc("partenaire_gagnants",{p_partenaire_id:p[0],p_se:"se-nds-2026",p_mode:MODE}).then(function(j){DATA[p[0]]=Array.isArray(j)?j:[];});
  })).then(function(){
    if(!SCOPE){
      sel.innerHTML='<option value="">Tous les commerces</option>'+PARTS.filter(function(p){return (DATA[p[0]]||[]).length;})
        .map(function(p){return '<option value="'+p[0]+'">'+esc(p[1])+' ('+DATA[p[0]].length+')</option>';}).join("");
      sel.onchange=function(){SCOPE=this.value||null;render();};
    }
    render();
  }).catch(function(){document.getElementById("out").innerHTML='<div class="empty">Erreur de chargement.</div>';});
})();
</script></body></html>

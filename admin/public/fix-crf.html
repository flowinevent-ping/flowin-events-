<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Fix CRF</title>
<style>
body{font-family:-apple-system,sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0;background:#F8FAFC;text-align:center}
.box{padding:32px;background:#fff;border-radius:16px;box-shadow:0 4px 24px rgba(0,0,0,.1)}
.ico{font-size:56px}
h2{color:#1B3A5C;margin:8px 0}
#msg{color:#64748B;font-size:14px;margin-top:12px}
</style>
</head>
<body>
<div class="box">
  <div class="ico">🏥</div>
  <h2>Injection en cours…</h2>
  <div id="msg">Préparation de l'event Croix Rouge</div>
</div>
<script>
var msg = document.getElementById('msg');
try {
  var LS = 'flowin_v31_data';
  var raw = localStorage.getItem(LS);
  var d = raw ? JSON.parse(raw) : {events:[],pros:[],lots:[],banques:[],joueurs:[],partenaires:[],superEvents:[],landings:[]};
  if(!d.events)  d.events  = [];
  if(!d.pros)    d.pros    = [];
  if(!d.lots)    d.lots    = [];
  if(!d.banques) d.banques = [];

  var hasCRF = false;
  for(var i=0;i<d.events.length;i++){ if(d.events[i].id==='ev-crf-2026'){hasCRF=true;break;} }
  if(!hasCRF){
    d.events.push({id:'ev-crf-2026',proId:'pro-crf-vence',
      nom:'Croix Rouge \u2014 Collecte Vence 2026',module:'quiz',status:'upcoming',
      dateD:'2026-05-23',dateF:'2026-05-23',hStart:'09:00',hEnd:'18:00',
      lieu:'Place du Grand Jardin',adresse:'Place du Grand Jardin, 06140 Vence',
      participants:0,gagnants:0,joueursOptin:0,couleur:'#E8212B',
      description:'Collecte solidaire Croix Rouge',scoreMin:0,
      banques:['bq-croix-rouge'],partenaires:[],superEventId:'',
      clientType:'btoc',tiragesFaits:{},
      cfg:{subtitle:'VENCE \u00b7 SOLIDARIT\u00c9 2026',datesLabel:'Samedi 23 Mai 2026',
        nomCourt:'Croix Rouge<br>Vence',tirageDate:'Manuel',
        qrUrl:'https://flowin-events.vercel.app/parcours/quiz.html?ev=ev-crf-2026',
        quizBanques:['bq-croix-rouge'],optinActif:true,quizNbQuestions:4,
        quizScoreMin:1,quizBonus:true,quizTimer:false,quizTimerVisible:false,
        quizPartage:false,quizRecapFin:true,quizUneFoisParJour:true,tirageManuel:true,
        logoEmoji:'🏥',accent:'#E8212B',accentSoft:'#FFF0F0'},
      proVisib:{stats:true,participants:true,lots:true,qr:true,export:true,activite:true,msgBienvenue:''}
    });
  }

  var hasPro=false;
  for(var i=0;i<d.pros.length;i++){if(d.pros[i].id==='pro-crf-vence'){hasPro=true;break;}}
  if(!hasPro) d.pros.push({id:'pro-crf-vence',
    nom:'Croix Rouge Fran\u00e7aise \u2014 D\u00e9l\u00e9gation de Vence',
    ville:'Vence',codePostal:'06140',adresse:'',tel:'',email:'',
    secteur:'Association',contact:'',role:'',siret:'',
    entreeP:'2026-05-18',notes:'',tags:['crf']});

  var hasBq=false;
  for(var i=0;i<d.banques.length;i++){if(d.banques[i].id==='bq-croix-rouge'){hasBq=true;break;}}
  if(!hasBq) d.banques.push({id:'bq-croix-rouge',
    nom:'Quiz Croix Rouge 2026',description:'Premiers secours',
    events:['ev-crf-2026'],
    questions:[
      {id:'q-crf-1',type:'qcm',texte:'En quelle annee la Croix Rouge a-t-elle ete fondee ?',options:['1854','1863','1901','1920'],bonne:1,points:1,explication:'1863, Henry Dunant.'},
      {id:'q-crf-2',type:'qcm',texte:'Que font les compressions thoraciques ?',options:['Faire respirer','Faire circuler le sang','Verifier le pouls','Appeler'],bonne:1,points:1,explication:'Elles font circuler le sang.'},
      {id:'q-crf-3',type:'qcm',texte:'Quel numero pour une urgence medicale ?',options:['17','15','18','112'],bonne:1,points:1,explication:'Le 15, le SAMU.'},
      {id:'q-crf-4',type:'qcm',texte:'Position personne inconsciente qui respire ?',options:['Sur le dos','PLS','Assise','Debout'],bonne:1,points:1,explication:'La PLS evite etouffement.'}
    ],tags:['crf']});

  var crfLots=0;
  for(var i=0;i<d.lots.length;i++){if(d.lots[i].eventId==='ev-crf-2026')crfLots++;}
  if(crfLots===0){
    for(var i=1;i<=6;i++) d.lots.push({id:'lot-crf-'+i,eventId:'ev-crf-2026',
      partenaireId:'',nom:'Lot '+i+' \u2014 \u00c0 compl\u00e9ter',
      valeur:0,quantite:1,assigneA:'',retire:false,dateRetrait:'',dateAssign:'',note:''});
  }

  localStorage.setItem(LS, JSON.stringify(d));
  msg.textContent = '✅ Event Croix Rouge injecté — redirection dashboard...';
} catch(e) {
  msg.textContent = 'Erreur: '+e.message;
}
setTimeout(function(){ window.location.href='/dashboard.html?v='+Date.now(); }, 1200);
</script>
</body>
</html>

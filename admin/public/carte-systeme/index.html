<style>

 *{box-sizing:border-box}html,body{margin:0;height:100%}
 body{background:var(--bg);color:var(--ink);font-family:'Manrope',sans-serif}
 .top{position:sticky;top:0;z-index:20;display:flex;align-items:center;gap:10px;padding:11px 18px;background:rgba(255,255,255,.92);backdrop-filter:blur(10px);border-bottom:1px solid var(--line)}

 .btn:hover{background:var(--soft)}
 main{padding:20px 18px 60px;max-width:1500px;margin:0 auto}
 .module{margin-bottom:30px}
 .mhead{display:flex;align-items:baseline;gap:12px;margin:0 0 4px;padding-bottom:10px;border-bottom:2px solid var(--line)}
 .mhead .ic{font-size:20px}
 .mhead h2{font-size:19px;font-weight:800;margin:0}
 .mhead .sub{font-size:12.5px;color:var(--muted);font-weight:600}
 .mcount{margin-left:auto;font-size:11px;color:var(--muted);font-weight:700;white-space:nowrap}
 .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:14px;margin-top:14px}
 .card{background:var(--card);border:1px solid var(--line);border-radius:13px;overflow:hidden;display:flex;flex-direction:column}
 .card-h{padding:10px 14px;font-size:12px;font-weight:800;letter-spacing:.02em;color:#fff;display:flex;align-items:center;justify-content:space-between}

 .chip:hover{background:var(--soft)}

 .chip .rulechip{font-family:'JetBrains Mono',monospace;font-size:11px;color:#8b3bd8;font-weight:700}
 .empty-hint{color:#98a0b3;font-size:13px;padding:20px}
 /* panel */
 #panel{position:fixed;top:0;right:0;bottom:0;width:430px;max-width:94vw;background:#fff;border-left:1px solid var(--line);transform:translateX(101%);transition:transform .22s cubic-bezier(.4,0,.2,1);z-index:40;display:flex;flex-direction:column;box-shadow:-18px 0 44px rgba(20,30,60,.1)}
 #panel.open{transform:none}
 .ph{padding:18px 20px 12px;border-bottom:1px solid var(--line);position:relative}
 .ph .tagrow{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px}
 .tag{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.03em;padding:3px 8px;border-radius:20px}
 .ph h2{margin:0;font-size:18px;font-weight:800;line-height:1.25;padding-right:32px;color:#111826}
 .ph .close{position:absolute;top:14px;right:14px;width:28px;height:28px;border-radius:8px;border:1px solid var(--line);background:#fff;color:var(--muted);cursor:pointer;font-weight:800}
 .ph .close:hover{background:var(--soft);color:#111826}
 .plead{padding:13px 20px;font-size:13px;line-height:1.55;color:#3f485c;border-bottom:1px solid var(--line)}
 .pbody{overflow-y:auto;flex:1;padding:16px 20px 44px}
 .blk{margin-bottom:16px}.blk:last-child{margin-bottom:0}
 .blk h4{font-size:9.5px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin:0 0 8px;font-weight:800}
 .badges{display:flex;flex-wrap:wrap;gap:5px}
 .conn{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:700;padding:5px 10px;border-radius:20px;border:1px solid var(--line);background:#fff;color:#33405a;cursor:pointer;margin:0 5px 5px 0}
 .conn:hover{border-color:#b7bed0;background:var(--soft)}.conn .cd{width:8px;height:8px;border-radius:50%}
 .dchip{display:inline-block;background:var(--soft);border:1px solid var(--line);border-radius:7px;padding:6px 9px;font-size:11.5px;font-family:'JetBrains Mono',monospace;color:#33405a;margin:0 5px 5px 0}
 .dchip.tbl{color:#a06a00;background:#fdf5e6;border-color:#f0e0c0}.dchip.file{color:#0b7a80;background:#e9f7f7;border-color:#c9ecec}
 .rule{background:#fff;border:1px solid var(--line);border-left-width:4px;border-radius:8px;padding:10px 12px;margin-bottom:9px}
 .rule .rt{font-size:12px;font-weight:800;margin:0 0 4px;display:flex;align-items:center;gap:6px;flex-wrap:wrap;color:#20293b}

 .dl{display:flex;flex-wrap:wrap;gap:6px}
 .dl a{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:700;text-decoration:none;padding:6px 10px;border-radius:7px;border:1px solid #c9ecec;color:#0b7a80;background:#e9f7f7}
 .dl a:hover{background:#dcf1f1}.dl a.file{border-color:#f0e0c0;color:#a06a00;background:#fdf5e6}
 select.psel{width:100%;background:#fff;border:1px solid var(--line);color:#20293b;font-family:inherit;font-weight:700;font-size:12px;padding:8px 10px;border-radius:7px;margin-bottom:10px}

 .cbox{border:1px solid var(--line);border-radius:8px;margin-bottom:8px;overflow:hidden}
 .cbox-h{background:var(--soft);padding:8px 10px;font-size:10.5px;font-weight:700;color:#33405a;cursor:pointer;font-family:'JetBrains Mono',monospace;display:flex;align-items:center;gap:6px;word-break:break-all}
 .cbox-h:hover{background:#e9edf5}.cbox-h .cue{transition:transform .15s;color:var(--muted);flex-shrink:0}.cbox.open .cbox-h .cue{transform:rotate(90deg)}

 .tree{background:var(--soft);border:1px solid var(--line);border-radius:8px;padding:8px 10px;margin-bottom:8px}
 .tree-h{font-size:11px;font-weight:700;color:#33405a;margin-bottom:5px}.tree-p{color:#98a0b3;font-weight:600;font-size:10.5px;font-family:'JetBrains Mono',monospace}
 .tree-i{font-size:11px;color:#556074;padding:1px 0 1px 12px;font-family:'JetBrains Mono',monospace}
 .riskbox{background:#fef2f4;border:1px solid #f5c6ce;border-left:3px solid #e11d48;border-radius:7px;padding:8px 10px;font-size:11.5px;color:#a01029;line-height:1.45}
 .cntbox{background:#e9f7f7;border:1px solid #c9ecec;border-radius:7px;padding:7px 10px;font-size:11.5px;color:#0b7a80}
 .cstep{display:flex;gap:10px;margin-bottom:14px}
 .cnum{flex-shrink:0;width:24px;height:24px;border-radius:50%;color:#fff;font-weight:800;font-size:12px;display:flex;align-items:center;justify-content:center}
 .cbody{flex:1;border-left:2px solid var(--line);padding-left:11px}
 .cbody .ct{font-size:13px;font-weight:800;color:#1b2333;cursor:pointer}.cbody .ct:hover{text-decoration:underline}.cbody .ct .cgo{color:#98a0b3;font-size:11px}
 .cbody .cdd{font-size:12px;color:#4a5568;line-height:1.45;margin-top:2px}.cbody .crule{font-size:11px;font-weight:700;margin-top:4px}
 .cbody .cstore{font-size:11px;color:#556074;margin-top:4px}.cbody .cstore b{color:#0b7a80;font-family:'JetBrains Mono',monospace}
 #modal{position:fixed;inset:0;z-index:50;background:rgba(30,40,60,.34);backdrop-filter:blur(3px);display:none;align-items:flex-start;justify-content:center;padding:60px 16px 24px;overflow:auto}
 #modal.open{display:flex}
 .mcard{width:760px;max-width:100%;background:#fff;border:1px solid var(--line);border-radius:16px;padding:22px 24px;box-shadow:0 20px 60px rgba(20,30,60,.2)}
 .mcard h2{margin:0 0 4px;font-size:17px;font-weight:800}.mcard p.lead{margin:0 0 16px;font-size:12.5px;color:var(--muted)}
 .appl{margin-top:6px;font-size:10.5px;color:var(--muted)}.appl b{color:#33405a;font-weight:700}
 @media(max-width:640px){#panel{width:100%}}
#stage{position:fixed;top:57px;left:0;right:0;bottom:0;background-image:radial-gradient(#e6e9f1 1px,transparent 1px);background-size:26px 26px}
  #map{width:100%;height:100%;display:block;cursor:grab}#map:active{cursor:grabbing}
  .stn text.lbl{pointer-events:none}

 {id:"prospect",label:"Prospection → Partenaire",color:"#1DA64A",desc:"D'un contact capté jusqu'à une fiche partenaire.",steps:[
   {node:"landing-page",t:"Captation (entrée)",detail:"Landing / prospection.",store:"landings / prospection"},
   {node:"crm-retours",t:"Retour entrant",detail:"Le contact laisse ses infos.",store:"crm_retours"},
   {node:"pros",t:"Devient un Pro",detail:"Création de la fiche.",rule:"R-COHERENCE",store:"pros"},
   {node:"partenaires",t:"Fiche partenaire (sortie)",detail:"Devient partenaire NDS.",store:"partenaires"}]},
];
function esc(s){return(s==null?'':(''+s)).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function norm(s){return(s||'').toString().toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');}
function hay(n){return norm([n.label,n.role,(n.tables||[]).join(' '),(n.files||[]).join(' ')].join(' '));}

/* ---- rendu des 2 modules en grille de cartes ---- */
function chipHTML(id){const n=NODE_BY_ID[id];if(!n)return'';const rk=RISKS[id]?'<span class="rk" title="point de vigilance"></span>':'';
 const cnt=COUNTS[id]!=null?`<span class="cnt">${COUNTS[id]}</span>`:'';
 return `<div class="chip${n.entity?' entity':''}" data-id="${id}" onclick="openDetail('${id}')"><span class="nm">${esc(n.label)}</span>${cnt}${rk}</div>`;}
function cardHTML(r){
 let body;
 if(r.rules){body=r.rules.map(rid=>{const rr=RULES[rid];return `<div class="chip" onclick="openRules('${rid}')"><span class="rulechip">${rid}</span><span class="nm" style="font-size:12px;font-weight:600">${rr?esc(rr.t):''}</span></div>`;}).join('');}
 else{body=r.els.map(chipHTML).join('');}
 return `<div class="card" data-rub="${r.id}"><div class="card-h" style="background:${r.color}">${esc(r.label)}<span style="font-weight:700;opacity:.85;font-size:10.5px">${r.rules?r.rules.length:r.els.length}</span></div><div class="card-b">${body}</div></div>`;}
function renderCards(){
 let h='';
 MODULES.forEach(mod=>{const rubs=RUBRICS.filter(r=>r.module===mod.id);
   const nEls=rubs.reduce((a,r)=>a+(r.els?r.els.length:0),0);
   h+=`<div class="module" data-mod="${mod.id}"><div class="mhead"><span class="ic">${mod.icon}</span><h2>${esc(mod.label)}</h2><span class="sub">${esc(mod.sub)}</span><span class="mcount">${rubs.length} rubriques · ${nEls} fonctions</span></div><div class="grid">${rubs.map(cardHTML).join('')}</div></div>`;});
 document.getElementById('main').innerHTML=h;
}
/* ---- recherche ---- */
function doSearch(v){const f=norm(v);if(!f)return;const hit=NODES.find(n=>POS[n.id]&&hay(n).includes(f));if(hit){const P=POS[hit.id];const w=SVG.clientWidth||1200,h=SVG.clientHeight||700,k=1.1;view={x:w/2-P.x*k,y:h/2-P.y*k,k};applyV();openDetail(hit.id);}}

/* ---- fiche détail (sources) ---- */
function openDetail(id){const n=NODE_BY_ID[id];if(!n)return;const g=GROUPS[n.group];
 const rub=RUBRICS.find(r=>r.els&&r.els.includes(id));const rubTag=rub?`<span class="tag" style="background:${rub.color}1e;color:${rub.color};border:1px solid ${rub.color}66">${esc(rub.label)}</span>`:'';
 const mod=rub?MODULES.find(m=>m.id===rub.module):null;const modTag=mod?`<span class="tag" style="background:#eef1f7;color:#4a5568;border:1px solid #e0e4ee">${mod.icon} ${esc(mod.label.split(' — ')[0])}</span>`:'';
 const tags=[modTag,rubTag];
 if(n.entity)tags.push('<span class="tag" style="background:#eef1f7;color:#4a5568;border:1px solid #e0e4ee">objet central</span>');
 if(COUNTS[id]!=null)tags.push(`<span class="tag" style="background:#0b7a8018;color:#0b7a80;border:1px solid #0b7a8055">📊 ${COUNTS[id]}</span>`);
 document.getElementById('ptags').innerHTML=tags.filter(Boolean).join('');
 document.getElementById('ptitle').textContent=n.label;
 document.getElementById('plead').textContent=n.role||'';
 const nb=[...(ADJ[id]||[])];
 const conns=nb.length?nb.map(m=>{const t=NODE_BY_ID[m];if(!t)return'';const cc=GROUPS[t.group]?GROUPS[t.group].color:'#889';return `<span class="conn" onclick="openDetail('${m}')"><span class="cd" style="background:${cc}"></span>${esc(t.label)}</span>`;}).join(''):'<div class="none">—</div>';
 const tbl=(n.tables&&n.tables.length)?`<div class="blk"><h4>Tables Supabase</h4>${n.tables.map(t=>`<span class="dchip tbl">${esc(t)}</span>`).join('')}</div>`:'';
 const fil=(n.files&&n.files.length)?`<div class="blk"><h4>Documents & où c'est dans le code</h4>${n.files.map(f=>`<span class="dchip file">${esc(f)}</span>`).join('')}</div>`:'';
 let vis='';if(n.assets==="partners")vis=`<div class="blk"><h4>Visuels — visualiser & télécharger</h4><select class="psel" id="pvsel"></select><div id="pvlinks"></div></div>`;
 else if(n.live)vis=`<div class="blk"><h4>Élément visuel</h4><a class="openlink" href="${n.live}" target="_blank">↗ Ouvrir en direct</a></div>`;
 const rules=(n.rules||[]);
 const rul=rules.length?`<div class="blk"><h4>Règles ${rub&&rub.module==='jeu'?'du jeu':'métier'}</h4>${rules.map(rid=>{const r=RULES[rid];return r?`<div class="rule" style="border-left-color:${r.color}"><p class="rt"><span style="color:${r.color}">●</span> ${esc(r.t)} <span class="rid">${rid}</span></p><p class="rx">${esc(r.x)}</p></div>`:'';}).join('')}<a class="openlink" href="#" onclick="openRules();return false;">↗ Tout le registre</a></div>`:'';
 const dp=(typeof DEEP!=='undefined'&&DEEP[id])?DEEP[id]:{};
 const foldSec=(dp.folders&&dp.folders.length)?`<div class="blk"><h4>📁 Dossiers réels</h4>${dp.folders.map(fd=>`<div class="tree"><div class="tree-h">${esc(fd.label)} <span class="tree-p">${esc(fd.path)}/</span></div>${fd.items.map(it=>`<div class="tree-i">· ${esc(it)}</div>`).join('')}</div>`).join('')}</div>`:'';
 const codeSec=(dp.code&&dp.code.length)?`<div class="blk"><h4>💻 Code réel (source)</h4>${dp.code.map(b=>`<div class="cbox"><div class="cbox-h" onclick="this.parentElement.classList.toggle('open')"><span class="cue">▸</span>${esc(b.path)}</div><pre class="cbox-c">${esc(b.code)}</pre></div>`).join('')}</div>`:'';
 const riskBlk=RISKS[id]?`<div class="blk"><div class="riskbox">⚠ ${esc(RISKS[id])}</div></div>`:'';
 const cntBlk=COUNTS[id]!=null?`<div class="blk"><div class="cntbox">📊 <b>${COUNTS[id]}</b> enregistrements — instantané du ${SNAP_DATE}</div></div>`:'';
 document.getElementById('pbody').innerHTML=riskBlk+`<div class="blk"><h4>🔗 Connecté à</h4><div class="badges">${conns}</div></div>`+cntBlk+tbl+fil+foldSec+codeSec+vis+rul;
 metroHL(id);
 if(n.assets==="partners"){const sel=document.getElementById('pvsel');sel.innerHTML=PARTNERS.map(s=>`<option value="${s}">${esc(PNAMES[s])}</option>`).join('');
   const draw=()=>{document.getElementById('pvlinks').innerHTML='<div class="dl">'+partnerAssets(sel.value).map(a=>`<a class="${a.k==='file'?'file':''}" href="${a.u}" target="_blank" download>${a.k==='vid'?'▶':'⬇'} ${esc(a.t)}</a>`).join('')+'</div>';};sel.onchange=draw;draw();}
 document.getElementById('panel').classList.add('open');
}
function closePanel(){document.getElementById('panel').classList.remove('open');resetMetro();}
/* ---- circuits ---- */
function openCircuits(){
 document.getElementById('ptitle').textContent='Circuits — comment ça circule';
 document.getElementById('ptags').innerHTML=`<span class="tag" style="background:#eef1f7;color:#4a5568;border:1px solid #e0e4ee">${CIRCUITS.length} flux de bout en bout</span>`;
 document.getElementById('plead').textContent="Suis un processus du point d'entrée jusqu'au stockage : ordre des étapes, règles, et où ça finit.";
 document.getElementById('pbody').innerHTML=CIRCUITS.map(c=>`<div class="blk"><div class="conn" style="font-size:12.5px" onclick="selectCircuit('${c.id}')"><span class="cd" style="background:${c.color}"></span>${esc(c.label)} ↗</div><div class="none" style="margin-top:4px">${esc(c.desc)}</div></div>`).join('');
 document.getElementById('panel').classList.add('open');}
function selectCircuit(cid){const C=CIRCUITS.find(c=>c.id===cid);if(!C)return;
 document.getElementById('ptitle').textContent='Circuit — '+C.label;
 document.getElementById('ptags').innerHTML=`<span class="tag" style="background:${C.color}1e;color:${C.color};border:1px solid ${C.color}66">${C.steps.length} étapes</span>`;
 document.getElementById('plead').textContent=C.desc;
 document.getElementById('pbody').innerHTML=C.steps.map((s,i)=>{const r=s.rule?RULES[s.rule]:null;return `<div class="cstep"><div class="cnum" style="background:${C.color}">${i+1}</div><div class="cbody"><div class="ct" onclick="openDetail('${s.node}')">${esc(s.t)} <span class="cgo">↗</span></div><div class="cdd">${esc(s.detail||'')}</div>${r?`<div class="crule" style="color:${r.color}">● ${esc(r.t)} <span style="color:#98a0b3">${esc(s.rule)}</span></div>`:''}${s.store?`<div class="cstore">→ stocké dans : <b>${esc(s.store)}</b></div>`:''}</div></div>`;}).join('');
 document.getElementById('panel').classList.add('open');}
/* ---- risques ---- */
function openRisks(){const risky=Object.keys(RISKS).filter(id=>NODE_BY_ID[id]);
 document.getElementById('ptitle').textContent='Risques & incohérences';
 document.getElementById('ptags').innerHTML=`<span class="tag" style="background:#e11d4818;color:#e11d48;border:1px solid #e11d4855">${risky.length} points de vigilance</span>`;
 document.getElementById('plead').textContent="Les points à surveiller, tirés du travail réel. Clique pour ouvrir la fonction concernée.";
 document.getElementById('pbody').innerHTML=risky.map(id=>`<div class="blk"><div class="conn" onclick="openDetail('${id}')"><span class="cd" style="background:#e11d48"></span>${esc(NODE_BY_ID[id].label)} ↗</div><div class="riskbox" style="margin-top:6px">${esc(RISKS[id])}</div></div>`).join('');
 document.getElementById('panel').classList.add('open');}
/* ---- règles (modal) ---- */
function openRules(only){const wrap=document.getElementById('modalBody');
 const entries=only?[[only,RULES[only]]]:Object.entries(RULES);
 document.getElementById('modalTitle').textContent=only?'Règle '+only:'Registre des règles métier';
 wrap.innerHTML=entries.map(([rid,r])=>{if(!r)return'';const appl=[];NODES.forEach(n=>{if((n.rules||[]).includes(rid))appl.push(n.label);});
   return `<div class="rule" style="border-left-color:${r.color}"><p class="rt"><span style="color:${r.color}">●</span> ${esc(r.t)} <span class="rid">${rid}</span></p><p class="rx">${esc(r.x)}</p><p class="appl">Rattachée à : <b>${appl.length?appl.map(esc).join(' · '):'—'}</b></p></div>`;}).join('');
 document.getElementById('modal').classList.add('open');}
document.getElementById('q').addEventListener('input',e=>doSearch(e.target.value));
document.getElementById('pclose').onclick=closePanel;
document.getElementById('btnCirc').onclick=openCircuits;
document.getElementById('btnRisk').onclick=openRisks;
document.getElementById('btnRules').onclick=()=>openRules();

/* ================= VUE MÉTRO ================= */
const NSVG="http://www.w3.org/2000/svg";
const SVG=document.getElementById('map'),SCENE=document.getElementById('scene');
let view={x:0,y:0,k:1},dragMoved=false;const POS={};
function elx(t,a,h){const e=document.createElementNS(NSVG,t);for(const k in a)e.setAttribute(k,a[k]);if(h!=null)e.textContent=h;return e;}
function trunc(s,n){return s.length>n?s.slice(0,n-1)+'…':s;}
function applyV(){SCENE.setAttribute('transform',`translate(${view.x},${view.y}) scale(${view.k})`);}
function fit(){let bb;try{bb=SCENE.getBBox();}catch(e){return;}if(!bb.width)return;const w=SVG.clientWidth||1200,h=SVG.clientHeight||700;const k=Math.min(w/(bb.width+90),h/(bb.height+90),1.2);view={x:(w-bb.width*k)/2-bb.x*k,y:(h-bb.height*k)/2-bb.y*k,k};applyV();}
const MLINES=RUBRICS.filter(r=>r.els&&r.els.length);
function renderMetro(){SCENE.innerHTML="";for(const k in POS)delete POS[k];
 const LEFTX=232,GAP=190,ROWH=62,Y0=52,MODGAP=54;
 let y=Y0,lastMod=null;const rows=[];const modY={};
 MLINES.forEach(r=>{if(lastMod&&r.module!==lastMod)y+=MODGAP;lastMod=r.module;if(modY[r.module]==null)modY[r.module]=y;rows.push({r,y});y+=ROWH;});
 Object.entries(modY).forEach(([m,my])=>{const M=MODULES.find(x=>x.id===m);SCENE.appendChild(elx('text',{x:16,y:my-20,'font-size':13,'font-weight':800,fill:'#334155'},`${M.icon} ${M.label.toUpperCase()}`));});
 rows.forEach(({r,y})=>{const xs=r.els.map((id,i)=>LEFTX+i*GAP);
   if(r.els.length>1)SCENE.appendChild(elx('line',{x1:xs[0],y1:y,x2:xs[xs.length-1],y2:y,stroke:r.color,'stroke-width':6,'stroke-linecap':'round'}));
   const lg=elx('g',{style:'cursor:pointer'});lg.addEventListener('click',ev=>{ev.stopPropagation();if(!dragMoved)selectRub(r.id);});
   lg.appendChild(elx('rect',{x:16,y:y-13,width:198,height:26,rx:13,fill:r.color}));
   lg.appendChild(elx('text',{x:27,y:y+5,'font-size':11.5,'font-weight':800,fill:'#fff'},r.label));SCENE.appendChild(lg);
   r.els.forEach((id,i)=>{const n=NODE_BY_ID[id];if(!n)return;const x=xs[i];POS[id]={x,y};
     const g=elx('g',{class:'stn','data-id':id,style:'cursor:pointer'});
     g.appendChild(elx('circle',{class:'body',cx:x,cy:y,r:7,fill:'#fff',stroke:r.color,'stroke-width':2.6}));
     if(RISKS[id])g.appendChild(elx('circle',{cx:x+9,cy:y-9,r:3.2,fill:'#e11d48'}));
     g.appendChild(elx('text',{class:'lbl',x:x,y:y+22,'text-anchor':'middle','font-size':11,'font-weight':n.entity?800:600,fill:'#1b2333'},trunc(n.label,26)));
     if(COUNTS[id]!=null)g.appendChild(elx('text',{class:'lbl',x:x,y:y+34,'text-anchor':'middle','font-size':9.5,'font-weight':800,fill:'#0b7a80'},''+COUNTS[id]));
     g.addEventListener('mouseenter',()=>g.querySelector('.body').setAttribute('r',9));
     g.addEventListener('mouseleave',()=>g.querySelector('.body').setAttribute('r',7));
     g.addEventListener('click',ev=>{ev.stopPropagation();if(!dragMoved)openDetail(id);});
     SCENE.appendChild(g);});});
 requestAnimationFrame(fit);}
function clearOverlay(){const o=document.getElementById('ovl');if(o)o.remove();}
function resetMetro(){document.querySelectorAll('.stn').forEach(g=>g.setAttribute('opacity',1));clearOverlay();}
function metroHL(id){const nb=new Set([id,...(ADJ[id]||[])]);
 document.querySelectorAll('.stn').forEach(g=>g.setAttribute('opacity',nb.has(g.dataset.id)?1:.25));
 clearOverlay();const P=POS[id];if(!P)return;const g=elx('g',{id:'ovl'});SCENE.appendChild(g);
 [...(ADJ[id]||[])].forEach(m=>{const Q=POS[m];if(!Q)return;const mx=(P.x+Q.x)/2;g.appendChild(elx('path',{d:`M ${P.x} ${P.y} C ${mx} ${P.y}, ${mx} ${Q.y}, ${Q.x} ${Q.y}`,fill:'none',stroke:'#334155','stroke-width':1.4,'stroke-dasharray':'2 5','stroke-opacity':.7}));});}
function selectRub(rid){const r=RUBRICS.find(x=>x.id===rid);if(!r||!r.els)return;clearOverlay();
 const set=new Set(r.els);document.querySelectorAll('.stn').forEach(g=>g.setAttribute('opacity',set.has(g.dataset.id)?1:.2));
 document.getElementById('ptitle').textContent=r.label;
 document.getElementById('ptags').innerHTML=`<span class="tag" style="background:${r.color}1e;color:${r.color};border:1px solid ${r.color}66">Rubrique</span>`;
 document.getElementById('plead').textContent="Les éléments de cette rubrique. Clique pour ouvrir (sources, code, règles).";
 document.getElementById('pbody').innerHTML=`<div class="blk"><h4>Éléments</h4><div class="badges">${r.els.map(id=>{const n=NODE_BY_ID[id];return n?`<span class="conn" onclick="openDetail('${id}')"><span class="cd" style="background:${r.color}"></span>${esc(n.label)}</span>`:'';}).join('')}</div></div>`;
 document.getElementById('panel').classList.add('open');}
let _dg=false,_sx,_sy;
SVG.addEventListener('pointerdown',ev=>{if(ev.target.closest('.stn'))return;_dg=true;dragMoved=false;_sx=ev.clientX;_sy=ev.clientY;});
window.addEventListener('pointermove',ev=>{if(!_dg)return;const dx=ev.clientX-_sx,dy=ev.clientY-_sy;if(Math.abs(dx)+Math.abs(dy)>3)dragMoved=true;view.x+=dx;view.y+=dy;_sx=ev.clientX;_sy=ev.clientY;applyV();});
window.addEventListener('pointerup',()=>{_dg=false;setTimeout(()=>dragMoved=false,30);});
SVG.addEventListener('wheel',ev=>{ev.preventDefault();const r=SVG.getBoundingClientRect();const mx=ev.clientX-r.left,my=ev.clientY-r.top;const f=ev.deltaY<0?1.12:1/1.12;const nk=Math.max(.2,Math.min(2.8,view.k*f));view.x=mx-(mx-view.x)*(nk/view.k);view.y=my-(my-view.y)*(nk/view.k);view.k=nk;applyV();},{passive:false});
window.addEventListener('resize',()=>fit());

renderMetro();
</script>
</body></html>

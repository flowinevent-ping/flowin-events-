<style>

  .top{position:fixed;top:0;left:0;right:0;height:56px;z-index:20;display:flex;align-items:center;gap:10px;padding:0 14px;background:rgba(255,255,255,.9);backdrop-filter:blur(10px);border-bottom:1px solid var(--line)}

  .plead{padding:13px 20px;font-size:13px;line-height:1.55;color:#3f485c;border-bottom:1px solid var(--line)}

  .chip{display:inline-block;background:var(--soft);border:1px solid var(--line);border-radius:7px;padding:6px 9px;font-size:11.5px;font-family:'JetBrains Mono',monospace;color:#33405a;margin:0 5px 5px 0}

  .rule .rx{font-size:11.5px;line-height:1.5;color:#4a5568;margin:0}.rule .rid{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--muted);font-weight:600}
  .dl{display:flex;flex-wrap:wrap;gap:6px}
  .dl a{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:700;text-decoration:none;padding:6px 10px;border-radius:7px;border:1px solid #c9ecec;color:#0b7a80;background:#e9f7f7}
  .dl a:hover{background:#dcf1f1}.dl a.file{border-color:#f0e0c0;color:#a06a00;background:#fdf5e6}
  select.psel{width:100%;background:#fff;border:1px solid var(--line);color:#20293b;font-family:inherit;font-weight:700;font-size:12px;padding:8px 10px;border-radius:7px;margin-bottom:10px}

  .none{color:#98a0b3;font-size:12px}
  #rulesModal{position:fixed;inset:0;z-index:30;background:rgba(30,40,60,.34);backdrop-filter:blur(3px);display:none;align-items:flex-start;justify-content:center;padding:64px 16px 24px;overflow:auto}
  #rulesModal.open{display:flex}
  .rcard{width:760px;max-width:100%;background:#fff;border:1px solid var(--line);border-radius:16px;padding:22px 24px;box-shadow:0 20px 60px rgba(20,30,60,.2)}

  .rcard .appl{margin-top:6px;font-size:10.5px;color:var(--muted)}.rcard .appl b{color:#33405a;font-weight:700}
  @media (max-width:820px){.legend{display:none}.sbox input{width:130px}.top h1 span{display:none}
    #panel{width:100%;top:auto;height:74vh;border-left:0;border-top:1px solid var(--line);border-radius:16px 16px 0 0;transform:translateY(101%)}#panel.open{transform:none}}

  .tree{background:var(--soft);border:1px solid var(--line);border-radius:8px;padding:8px 10px;margin-bottom:8px}
  .tree-h{font-size:11px;font-weight:700;color:#33405a;margin-bottom:5px}
  .tree-p{color:#98a0b3;font-weight:600;font-size:10.5px;font-family:'JetBrains Mono',monospace}
  .tree-i{font-size:11px;color:#556074;padding:1px 0 1px 14px;position:relative;font-family:'JetBrains Mono',monospace}
  .tree-i:before{content:'';position:absolute;left:4px;top:8px;width:4px;height:4px;border-radius:50%;background:#b7bed0}
  .cbox{border:1px solid var(--line);border-radius:8px;margin-bottom:8px;overflow:hidden}
  .cbox-h{background:var(--soft);padding:8px 10px;font-size:10.5px;font-weight:700;color:#33405a;cursor:pointer;font-family:'JetBrains Mono',monospace;display:flex;align-items:center;gap:6px;word-break:break-all}
  .cbox-h:hover{background:#e9edf5}
  .cbox-h .cue{transition:transform .15s;color:var(--muted);flex-shrink:0}
  .cbox.open .cbox-h .cue{transform:rotate(90deg)}
  .cbox-c{display:none;margin:0;background:#0f1526;color:#b7f0cf;padding:11px 12px;font-family:'JetBrains Mono',monospace;font-size:10.6px;line-height:1.55;overflow-x:auto;white-space:pre}
  .cbox.open .cbox-c{display:block}
.legend .legline{cursor:pointer;border-radius:6px;padding:3px 5px;margin:2px -5px}
  .legend .legline:hover{background:var(--soft)}

  .cstep{display:flex;gap:10px;margin-bottom:14px}
  .cnum{flex-shrink:0;width:24px;height:24px;border-radius:50%;color:#fff;font-weight:800;font-size:12px;display:flex;align-items:center;justify-content:center}
  .cbody{flex:1;border-left:2px solid var(--line);padding-left:11px}
  .cbody .ct{font-size:13px;font-weight:800;color:#1b2333;cursor:pointer}
  .cbody .ct:hover{text-decoration:underline}.cbody .ct .cgo{color:#98a0b3;font-weight:700;font-size:11px}
  .cbody .cdd{font-size:12px;color:#4a5568;line-height:1.45;margin-top:2px}
  .cbody .crule{font-size:11px;font-weight:700;margin-top:4px}
  .cbody .cstore{font-size:11px;color:#556074;margin-top:4px}.cbody .cstore b{color:#0b7a80;font-family:'JetBrains Mono',monospace}

  .riskbox{background:#fef2f4;border:1px solid #f5c6ce;border-left:3px solid #e11d48;border-radius:7px;padding:8px 10px;font-size:11.5px;color:#a01029;line-height:1.45}
  .cntbox{background:#e9f7f7;border:1px solid #c9ecec;border-radius:7px;padding:7px 10px;font-size:11.5px;color:#0b7a80}
.station:hover .body{stroke:#b7bed0;stroke-width:2}
  .orgrub:hover rect{fill-opacity:.24}
</style>

<body>
<div class="top">
  <h1>Plan du système <span>· métro · Flowin × NDS 2026</span></h1>

  <button class="btn" id="btnRisk">⚠ Risques</button>

</div>

  <h2>Registre des règles métier</h2><p class="lead">Chaque règle est rattachée aux stations où elle s'applique.</p>
  <div id="rulesList"></div>
</div></div>
<script>
const PARTNERS = ["bergerie","pegase","utile","carrosserie-gp","giordano","charvolin","nook","cycles963"];
const PNAMES = {bergerie:"Domaine de la Bergerie","pegase":"Auto-École de l'ARA",utile:"Utile Vence",
  "carrosserie-gp":"Carrosserie GP",giordano:"Électroménager J Giordano",charvolin:"Assurance Charvolin",
  nook:"Nook Café",cycles963:"Cycles 963"};
const BASE = "https://flowin-events.vercel.app";

function partnerAssets(slug){
  const d = BASE+"/nds/kit-digital/"+slug;
  return [
    {t:"Affiche A4 (PNG)", u:d+"/nds_a4_"+slug+".png", k:"file"},
    {t:"Affiche A4 (PDF)", u:d+"/nds_a4_"+slug+".pdf", k:"file"},
    {t:"Affiche A3 (PDF)", u:d+"/nds_a3_"+slug+".pdf", k:"file"},
    {t:"Affiche A5 (PDF)", u:d+"/nds_a5_"+slug+".pdf", k:"file"},
    {t:"A4 éditable (PPTX)", u:d+"/nds_a4_"+slug+"-editable.pptx", k:"file"},
    {t:"Vidéo réseaux 9×16", u:d+"/video-"+slug+"-9x16.mp4", k:"vid"},
    {t:"QR station", u:d+"/qr-station-"+slug+".png", k:"vid"},
    {t:"QR réseaux", u:d+"/qr-reseaux-"+slug+".png", k:"vid"},
    {t:"Kit complet (ZIP)", u:d+"/"+slug+"-kit.zip", k:"file"},
  ];
}

const RULES = {
  "R-LOGOS":{t:"Logos partenaires sur TOUS les supports", color:"var(--red)",
    x:"Les logos des 8 partenaires doivent apparaître sur CHAQUE support visuel : vidéo, forex, A4, présentation. Source unique = nds_lib.PARTNERS. À chaque nouveau partenaire signé : ajouter le slug + relancer rebuild_partenaires.sh. C'est LA règle historiquement oubliée qui a causé des régressions."},
  "R-QR-PYZBAR":{t:"QR toujours vérifiés avec pyzbar", color:"var(--red)",
    x:"Après génération d'un QR (affiche, vidéo, station), décoder avec pyzbar pour confirmer l'URL exacte. cv2.QRCodeDetector échoue silencieusement sur certains QR v5 — ne jamais s'y fier seul."},
  "R-COHERENCE":{t:"Cohérence stricte des 4 supports", color:"var(--amber)",
    x:"Une information doit être IDENTIQUE dans : (1) fiche partenaire, (2) web app (lots à gagner), (3) bon de commande, (4) facture. Une seule saisie se diffuse partout — jamais démultiplier. Lots : source = partenaires.lots. Coordonnées : master = partenaires (le bon remonte via trg_sync_bon_partenaire)."},
  "R-LOTS-SOURCE":{t:"Lots = partenaires.lots (source unique)", color:"var(--amber)",
    x:"Le lot/cadeau vient toujours de partenaires.lots (jsonb structuré). Il alimente la web app, la fiche et le pré-remplissage du bon. Sans lot renseigné : aucune affiche générée (ne jamais inventer une offre côté joueur)."},
  "R-MODULES-MAITRES":{t:"Modules maîtres jamais modifiés directement", color:"var(--violet)",
    x:"QuizClient.tsx, SpinClient.tsx, TombolaClient.tsx, VoteClient.tsx ne sont JAMAIS édités. Toute personnalisation passe par events.cfg (jsonb), event par event. Seul NDS2026Client.tsx (orchestrateur NDS) est modifiable."},
  "R-TICKET":{t:"4 bonnes réponses = 1 ticket (+1 si bonus)", color:"var(--magenta)",
    x:"Le barème est figé : 4 réponses correctes au quiz = 1 ticket, +1 ticket si la question bonus est complétée. Ne pas changer ce mécanisme."},
  "R-ANTICHEAT":{t:"Anti-triche : source_qr + index uniques", color:"var(--magenta)",
    x:"participations.source_qr distingue digital vs physique. uniq_participation_digital_oneshot = 1 participation digitale à vie. uniq_participation_physique_jour = 1 participation physique par joueur/station/jour. Retour digital d'un joueur connu → écran refusdigital."},
  "R-PDF-JSPDF":{t:"PDF via jsPDF programmatique (jamais html2canvas)", color:"var(--amber)",
    x:"Le bon et la facture génèrent leur PDF A4 en DESSINANT la page avec jsPDF (self-hébergé /nds/vendor/jspdf.umd.min.js). Jamais html2canvas/html2pdf (décalages, pages blanches — 10+ essais ratés)."},
  "R-COPIE-EMAIL":{t:"Tous les emails copient flowinevent@gmail.com", color:"var(--green)",
    x:"Chaque email (Resend) copie systématiquement flowinevent@gmail.com. Domaine Resend à vérifier : tant qu'il ne l'est pas, l'envoi ne part que vers flowinevent@gmail.com."},
  "R-CONTACT":{t:"Contact partenaire = jamais « Romain Collin »", color:"var(--teal)",
    x:"Sur tout visuel/vidéo/document partenaire, le contact affiché est flowinevent@gmail.com · 06 16 35 49 36. Ne jamais faire figurer « Romain Collin »."},
  "R-COMMIT":{t:"Filesystem éphémère → tout committer en séance", color:"var(--teal)",
    x:"/home/claude se réinitialise entre sessions. Chaque asset produit (rendu + script source) doit être commité sur GitHub DANS la même session, jamais laissé en local."},
  "R-3PILIERS":{t:"3 piliers de persistance à chaque tâche", color:"var(--violet)",
    x:"Toute tâche terminée met à jour les 3 : (1) commit+push GitHub, (2) Supabase handoff_notes, (3) hub Notion. Le Notion est souvent oublié — étape obligatoire, jamais optionnelle."},
  "R-NEVER-INVENT":{t:"Ne jamais inventer de donnée", color:"var(--red)",
    x:"Lots, coordonnées, wording, URLs : si ce n'est pas sourcé de façon fiable, laisser vide. Réutiliser le contenu validé des versions précédentes (retrouvable via conversation_search) plutôt que d'en fabriquer."},
  "R-ACCOUNT-TRAP":{t:"Piège des comptes Supabase", color:"var(--amber)",
    x:"Le projet ywcqtupgoxfzkddqkztk est sous le compte Google romain.collin@gmail.com, org affichée « flowin revision olivia » (nom trompeur mais BON projet). Le compte GitHub flowinevent possède un AUTRE projet Supabase vide (atddutvzklcgiqxlpvla) — ne jamais le confondre. Pro souscrit → pas de mise en pause automatique. Consolidation des comptes prévue post-festival (le transfert ne change pas le ref ywcqtupgoxfzkddqkztk)."},
  "R-PAT-EXPIRY":{t:"Token GitHub à durée limitée", color:"var(--teal)",
    x:"Le PAT fine-grained (Contents R/W) expire ~17 sept 2026. Auth push : https://x-access-token:<TOKEN>@github.com/flowinevent-ping/flowin-events-.git. Sur push 401 → demander à Romain le token courant et mettre à jour uniquement cette ligne du handoff."},
};

 crm:{label:"CRM", color:"#db1877"},

 nds:{label:"NDS 2026", color:"#e2692a"},

 jeuxtheme:{label:"Jeux", color:"#8b3bd8"},
 qr:{label:"QR codes", color:"#0e9aa0"},
};
// disposition en 3 colonnes de groupes empilés
const COLUMNS = [ ["crm","acq","reporting"], ["events","jeux","systeme","accueil"], ["nds","infra"] ];

const NODES = [
 // ACCUEIL
 {id:"pilotage",group:"accueil",label:"Accueil / Pilotage",role:"Le point d'entrée du dashboard : vue d'ensemble avec les events en cours, et un accès direct aux joueurs, aux partenaires et aux rapports de synthèse. C'est de là qu'on part.",
  tables:["events","participations"],files:["dashboard.html → renderPilotage() ~l.4632"],links:["events","super-events","joueurs","partenaires","rapports"]},

 // CRM
 {id:"pros",group:"crm",label:"Pros",entity:true,role:"Comptes professionnels (commerçants / clients). Point central : un Pro est relié à sa fiche, son jeu, son QR, ses factures, ses documents et ses visuels.",
  tables:["pros","partenaires (via pros.partenaire_id)"],files:["dashboard.html → renderBiblioPros() ~l.4974","fiche détaillée : renderDrawer() ~l.5148"],rules:["R-COHERENCE"],
  links:["partenaires","events","jeux","nds-track-qr","nds-bon-commande","nds-media","cgv","joueurs"]},
 {id:"joueurs",group:"crm",label:"Joueurs",entity:true,role:"Festivaliers / participants. Un joueur = profil + participations + réponses + tickets + gains.",

  links:["events","gagnants","jeux","nds-participants"]},
 {id:"gagnants",group:"crm",label:"Gagnants",role:"Joueurs ayant gagné un lot : code de retrait + QR + email de notification.",

 {id:"partenaires",group:"crm",label:"Partenaires",entity:true,role:"Fiche partenaire NDS : coordonnées + offre + lot. Source unique qui alimente l'app, les affiches, le bon et la facture.",

  links:["pros","events","jeux","nds-track-qr","nds-bon-commande","nds-media"]},

 // EVENTS

  document.getElementById('ptags').innerHTML=`<span class="tag" style="background:${L.color}1e;color:${L.color};border:1px solid ${L.color}66">Rubrique</span>`;
  document.getElementById('plead').textContent=LINEDESC[rid]||'';
  const chips=L.stations.map(s=>{const nn=NODE_BY_ID[s];return nn?`<span class="conn" onclick="selectStation('${s}')"><span class="cd" style="background:${L.color}"></span>${esc(nn.label)}</span>`:'';}).join('');
  document.getElementById('pbody').innerHTML=`<div class="blk"><h4>Les éléments de cette rubrique</h4><div class="badges">${chips}</div></div><div class="none" style="margin-top:10px">Clique un élément pour son détail : connexions, code réel et règles.</div>`;
  document.getElementById('panel').classList.add('open');}
function hoverLine(rid){if(document.getElementById('panel').classList.contains('open'))return;if(!rid){resetHL();return;}
  const set=new Set((LINES.find(l=>l.id===rid)||{stations:[]}).stations);
  document.querySelectorAll('.station').forEach(g=>g.setAttribute('opacity',set.has(g.dataset.id)?1:.3));
  document.querySelectorAll('.orgrub').forEach(g=>g.setAttribute('opacity',g.dataset.rub===rid?1:.5));}
function closePanel(){document.getElementById('panel').classList.remove('open');selId=null;clearCircuit();resetHL();}
function buildRulesList(){const wrap=document.getElementById('rulesList');let h="";
  Object.entries(RULES).forEach(([rid,r])=>{const appl=[];NODES.forEach(n=>{if((n.rules||[]).includes(rid))appl.push(n.label);});
    h+=`<div class="rule" style="border-left-color:${r.color}"><p class="rt"><span style="color:${r.color}">●</span> ${esc(r.t)} <span class="rid">${rid}</span></p><p class="rx">${esc(r.x)}</p><p class="appl">Rattachée à : <b>${appl.length?appl.map(esc).join(' · '):'—'}</b></p></div>`;});
  wrap.innerHTML=h;}

/* recherche -> centre + sélectionne */
function doSearch(v){const f=norm(v);if(!f)return;const hit=NODES.find(n=>COL[n.id]!=null && hay(n).includes(f));
  if(hit){const cx=X(COL[hit.id]),cy=Math.min(...OCC[hit.id].map(lid=>LINEY[lid]));const w=SVG.clientWidth,h=SVG.clientHeight;const k=1.1;
    animateTo({x:w/2-cx*k,y:h/2-cy*k,k});selectStation(hit.id);}}

/* pan/zoom sans capture */
let dragging=false,dragMoved=false,sx=0,sy=0;
function isSt(t){return t&&t.closest&&t.closest('.station');}
SVG.addEventListener('pointerdown',e=>{if(isSt(e.target))return;dragging=true;dragMoved=false;sx=e.clientX;sy=e.clientY;SVG.classList.add('grabbing');});
window.addEventListener('pointermove',e=>{if(!dragging)return;const dx=e.clientX-sx,dy=e.clientY-sy;if(Math.abs(dx)+Math.abs(dy)>3)dragMoved=true;view.x+=dx;view.y+=dy;sx=e.clientX;sy=e.clientY;applyView();target={...view};});
window.addEventListener('pointerup',()=>{dragging=false;SVG.classList.remove('grabbing');setTimeout(()=>dragMoved=false,30);});
SVG.addEventListener('wheel',e=>{e.preventDefault();const r=SVG.getBoundingClientRect();const mx=e.clientX-r.left,my=e.clientY-r.top;
  const f=e.deltaY<0?1.12:1/1.12;const nk=Math.max(.2,Math.min(2.8,view.k*f));
  view.x=mx-(mx-view.x)*(nk/view.k);view.y=my-(my-view.y)*(nk/view.k);view.k=nk;applyView();target={...view};},{passive:false});
function zoomBtn(f){const r=SVG.getBoundingClientRect();const mx=r.width/2,my=r.height/2;const nk=Math.max(.2,Math.min(2.8,view.k*f));
  animateTo({x:mx-(mx-view.x)*(nk/view.k),y:my-(my-view.y)*(nk/view.k),k:nk});}
document.getElementById('zin').onclick=()=>zoomBtn(1.25);
document.getElementById('zout').onclick=()=>zoomBtn(1/1.25);
document.getElementById('zfit').onclick=()=>fitBBox(70);
document.getElementById('pclose').onclick=closePanel;
document.getElementById('btnRules').onclick=()=>document.getElementById('rulesModal').classList.add('open');
document.getElementById('btnSom').onclick=openSommaire;
document.getElementById('btnCirc').onclick=openCircuits;
document.getElementById('btnRisk').onclick=openRisks;
document.getElementById('q').addEventListener('input',e=>doSearch(e.target.value));
window.addEventListener('resize',()=>{if(!anim)fitBBox(70);});
buildRulesList();render();
</script>
</body>
</html>

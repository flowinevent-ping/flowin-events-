<!DOCTYPE html>
<html>
<head><title>Flowin Debug</title></head>
<body>
<h2>Flowin localStorage Debug</h2>
<pre id="out"></pre>
<script>
var d = localStorage.getItem('flowin_v31_data');
if(!d){ document.getElementById('out').textContent = 'flowin_v31_data : NULL (pas en LS)'; }
else {
  var obj = JSON.parse(d);
  var evs = (obj.events||[]).map(function(e){ return e.id+' ('+e.status+')'; });
  document.getElementById('out').textContent = 
    'Events ('+evs.length+'): '+evs.join(', ')+'\n'+
    'Pros: '+(obj.pros||[]).map(function(p){return p.id;}).join(', ')+'\n'+
    'Lots CRF: '+(obj.lots||[]).filter(function(l){return l.eventId==='ev-crf-2026';}).length;
}
</script>
</body>
</html>

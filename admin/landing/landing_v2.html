
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Nunito:wght@600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
.page{
  min-height:560px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:44px 20px 52px;
  position:relative;
  overflow:hidden;
}
.orb{position:absolute;border-radius:50%;filter:blur(56px);pointer-events:none}
.o1{width:300px;height:300px;background:rgba(168,85,247,.11);top:-80px;left:-80px}
.o2{width:220px;height:220px;background:rgba(124,45,146,.09);bottom:-60px;right:-60px}
.o3{width:180px;height:180px;background:rgba(216,180,254,.13);top:44%;left:50%;transform:translate(-50%,-50%)}

.logo-wrap{
  display:flex;flex-direction:column;align-items:center;
  margin-bottom:52px;
  animation:up .55s ease-out both;
}
.ring{
  width:84px;height:84px;border-radius:26px;
  background:linear-gradient(140deg,#6D28D9,#A855F7);
  display:flex;align-items:center;justify-content:center;
  margin-bottom:16px;
  box-shadow:0 10px 36px rgba(124,45,146,.28),0 2px 8px rgba(124,45,146,.15);
}
.wordmark{
  font-family:'Syne',sans-serif;
  font-size:38px;font-weight:800;
  letter-spacing:-1.5px;
  color:var(--color-text-primary);
  line-height:1;
}
.wordmark em{color:#A855F7;font-style:normal}
.tagline{
  font-family:'Nunito',sans-serif;
  font-size:12px;font-weight:700;
  color:var(--color-text-secondary);
  margin-top:7px;letter-spacing:.08em;text-transform:uppercase;
}

.pillars{
  display:flex;gap:12px;width:100%;max-width:340px;
  animation:up .55s .16s ease-out both;
}
.pillar{
  flex:1;display:flex;flex-direction:column;align-items:center;gap:10px;
  cursor:default;
}
.icon-box{
  width:68px;height:68px;border-radius:22px;
  display:flex;align-items:center;justify-content:center;
  transition:transform .22s cubic-bezier(.34,1.56,.64,1);
  position:relative;
}
.pillar:hover .icon-box{transform:translateY(-5px) scale(1.04)}
.ib1{background:#FDF4FF;border:1.5px solid #E9D5FF}
.ib2{background:#EFF6FF;border:1.5px solid #BFDBFE}
.ib3{background:#FFF7ED;border:1.5px solid #FED7AA}

.p-name{
  font-family:'Syne',sans-serif;
  font-size:13px;font-weight:700;
  color:var(--color-text-primary);text-align:center;
}
.p-sub{
  font-family:'Nunito',sans-serif;
  font-size:10px;font-weight:700;
  color:var(--color-text-secondary);
  text-align:center;line-height:1.35;max-width:82px;
}

@keyframes up{
  from{opacity:0;transform:translateY(18px)}
  to{opacity:1;transform:none}
}

.dots{
  display:flex;gap:6px;margin-top:44px;
  animation:up .55s .3s ease-out both;
}
.dot{width:6px;height:6px;border-radius:50%;background:var(--color-border-tertiary)}
.dot.on{width:22px;border-radius:3px;background:#A855F7}
</style>

<div class="page">
  <div class="orb o1"></div>
  <div class="orb o2"></div>
  <div class="orb o3"></div>

  <div class="logo-wrap">
    <div class="ring">
      <svg width="46" height="46" viewBox="0 0 46 46" fill="none">
        <path d="M9 23C9 15.268 15.268 9 23 9" stroke="white" stroke-width="3.2" stroke-linecap="round"/>
        <path d="M23 9C30.732 9 37 15.268 37 23C37 30.732 30.732 37 23 37" stroke="rgba(255,255,255,.55)" stroke-width="3.2" stroke-linecap="round"/>
        <path d="M23 37C18.2 37 14 34.6 11.2 31" stroke="rgba(255,255,255,.28)" stroke-width="3.2" stroke-linecap="round"/>
        <circle cx="23" cy="23" r="5.5" fill="white"/>
        <circle cx="23" cy="10.5" r="2.8" fill="white"/>
        <circle cx="35.5" cy="23" r="2.2" fill="rgba(255,255,255,.65)"/>
      </svg>
    </div>
    <div class="wordmark">Flow<em>in</em></div>
    <div class="tagline">La gamification événementielle</div>
  </div>

  <div class="pillars">

    <!-- GAMIFIER · manette -->
    <div class="pillar">
      <div class="icon-box ib1">
        <svg width="38" height="38" viewBox="0 0 38 38" fill="none">
          <!-- corps manette -->
          <rect x="5" y="13" width="28" height="16" rx="7" fill="#E9D5FF" stroke="#A855F7" stroke-width="1.4"/>
          <!-- stick gauche -->
          <circle cx="13" cy="19" r="3.5" fill="#A855F7"/>
          <circle cx="13" cy="19" r="1.8" fill="#7C2D92"/>
          <!-- D-pad droite -->
          <rect x="22" y="17.5" width="8" height="3" rx="1.2" fill="#C084FC"/>
          <rect x="24.5" y="15" width="3" height="8" rx="1.2" fill="#C084FC"/>
          <!-- boutons haut -->
          <circle cx="10" cy="12" r="2" fill="#D8B4FE" stroke="#A855F7" stroke-width="1"/>
          <circle cx="16" cy="12" r="2" fill="#D8B4FE" stroke="#A855F7" stroke-width="1"/>
          <!-- gachettes -->
          <path d="M7 14Q5 10 7 8Q10 6 12 9" fill="#C084FC" stroke="#A855F7" stroke-width="1"/>
          <path d="M31 14Q33 10 31 8Q28 6 26 9" fill="#C084FC" stroke="#A855F7" stroke-width="1"/>
        </svg>
      </div>
      <div class="p-name">Gamifier</div>
      <div class="p-sub">Quiz, Spin, Vote, Tombola</div>
    </div>

    <!-- MESURER · stats -->
    <div class="pillar">
      <div class="icon-box ib2">
        <svg width="38" height="38" viewBox="0 0 38 38" fill="none">
          <!-- fond graphe -->
          <rect x="5" y="7" width="28" height="22" rx="4" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.2"/>
          <!-- ligne de base -->
          <line x1="8" y1="26" x2="30" y2="26" stroke="#93C5FD" stroke-width="1"/>
          <!-- barres -->
          <rect x="10" y="20" width="4" height="6" rx="1.5" fill="#60A5FA"/>
          <rect x="16" y="14" width="4" height="12" rx="1.5" fill="#3B82F6"/>
          <rect x="22" y="17" width="4" height="9" rx="1.5" fill="#2563EB"/>
          <!-- courbe -->
          <path d="M10 21Q16 12 22 18Q26 22 30 16" fill="none" stroke="#1D4ED8" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
          <circle cx="10" cy="21" r="2" fill="white" stroke="#1D4ED8" stroke-width="1.2"/>
          <circle cx="22" cy="18" r="2" fill="white" stroke="#1D4ED8" stroke-width="1.2"/>
          <circle cx="30" cy="16" r="2" fill="white" stroke="#1D4ED8" stroke-width="1.2"/>
          <!-- légende bas -->
          <rect x="8" y="30" width="22" height="3" rx="1.5" fill="#BFDBFE"/>
          <rect x="8" y="30" width="14" height="3" rx="1.5" fill="#3B82F6"/>
        </svg>
      </div>
      <div class="p-name">Mesurer</div>
      <div class="p-sub">CRM, stats, analyses</div>
    </div>

    <!-- ACTIVER · fusée -->
    <div class="pillar">
      <div class="icon-box ib3">
        <svg width="38" height="38" viewBox="0 0 38 38" fill="none">
          <!-- flamme -->
          <ellipse cx="19" cy="32" rx="4" ry="3" fill="#FDE68A" opacity=".7"/>
          <path d="M16 31Q17 28 19 26Q21 28 22 31Z" fill="#F59E0B"/>
          <path d="M15 32Q16.5 29 19 27Q21.5 29 23 32Z" fill="#FCD34D" opacity=".6"/>
          <!-- corps fusée -->
          <path d="M19 6C14 10 12 16 12 22L19 25L26 22C26 16 24 10 19 6Z" fill="#FED7AA" stroke="#F97316" stroke-width="1.3" stroke-linejoin="round"/>
          <!-- fenêtre -->
          <circle cx="19" cy="17" r="3.5" fill="white" stroke="#FB923C" stroke-width="1.2"/>
          <circle cx="19" cy="17" r="2" fill="#BFDBFE" stroke="#60A5FA" stroke-width="1"/>
          <!-- ailerons -->
          <path d="M12 22Q8 24 9 28L12 26Z" fill="#FB923C" stroke="#EA580C" stroke-width="1" stroke-linejoin="round"/>
          <path d="M26 22Q30 24 29 28L26 26Z" fill="#FB923C" stroke="#EA580C" stroke-width="1" stroke-linejoin="round"/>
          <!-- nez -->
          <path d="M15 10Q19 4 23 10" fill="#FDBA74" stroke="#F97316" stroke-width="1" stroke-linejoin="round"/>
          <!-- étoiles -->
          <circle cx="7" cy="10" r="1.2" fill="#FCD34D"/>
          <circle cx="30" cy="8" r="1" fill="#FCD34D"/>
          <circle cx="5" cy="18" r=".8" fill="#FDE68A"/>
          <circle cx="32" cy="20" r="1" fill="#FDE68A"/>
        </svg>
      </div>
      <div class="p-name">Activer</div>
      <div class="p-sub">Opt-in, lots, tirage</div>
    </div>

  </div>

  <div class="dots">
    <div class="dot on"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  </div>
</div>

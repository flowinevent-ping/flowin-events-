      html += '<div style="margin-bottom:10px"><div class="flex flex-between mb-2"><span class="text-sm fw-700">'+esc(e.nom)+'</span><span class="text-sm">'+e.participants+' part.</span></div><div class="meter"><div class="meter-bar"><div class="meter-fill" style="width:'+pct+'%"></div></div><div class="meter-val">'+e.participants+'</div></div></div>';
    });
    html += '</div>';
    html += '<div class="section-h">Modules utilisés</div>';
    const modUsage = {};
    evs.forEach(e=>{ modUsage[e.module]=(modUsage[e.module]||0)+1; });
    html += '<div class="flex gap-2 flex-wrap">';
    Object.keys(modUsage).forEach(m => { html += moduleChip(m)+' <span class="text-sm text-muted">x'+modUsage[m]+'</span> &nbsp;&nbsp;'; });
    html += '</div>';
  } else if(state.drawer.tab==='events'){
    if(evs.length===0){
      html += '<div class="empty-block"><div class="ico">📅</div><div class="t">Aucun event</div><div class="d">Ce pro n\'a pas encore d\'event.</div>'
           + (state.mode==='pro' ? '' : '<button class="btn btn-primary btn-sm mt-3" onclick="closeDrawer();startWizardCreate(\''+p.id+'\')">+ Créer un event</button>')
           + '</div>';
    } else {
      const evsPast = evs.filter(e=>e.status==='past').sort((a,b)=>new Date(b.dateD)-new Date(a.dateD));
      const evsLive = evs.filter(e=>e.status==='live').sort((a,b)=>new Date(a.dateD)-new Date(b.dateD));
      const evsUp = evs.filter(e=>e.status==='upcoming').sort((a,b)=>new Date(a.dateD)-new Date(b.dateD));
      const totalPart = evs.reduce((s,e)=>s+(e.participants||0),0);
      const totalGag = evs.reduce((s,e)=>s+(e.gagnants||0),0);

      // KPIs récap
      html += '<div class="kpi-grid" style="grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px">'
           + kpi('Total',evs.length)
           + kpi('En cours',evsLive.length,{trend:evsLive.length?'up':'flat'})
           + kpi('Participants',totalPart.toLocaleString('fr-FR'))
           + kpi('Gagnants',totalGag)
           + '</div>';

      // Mini-kanban 3 colonnes (composant compact)
      html += '<div class="kanban kanban-compact">';
      html += renderKanbanColumn('past','📁 Passés',evsPast,'#94A3B8','#F1F5F9');
      html += renderKanbanColumn('live','🔴 En cours',evsLive,'#10B981','#ECFDF5');
      html += renderKanbanColumn('upcoming','📅 À venir',evsUp,'#3B82F6','#EFF6FF');
      html += '</div>';

      if(state.mode!=='pro'){
        html += '<button class="btn btn-primary btn-block btn-sm mt-3" onclick="closeDrawer();startWizardCreate(\''+p.id+'\')">+ Créer un nouvel event pour ce pro</button>';
      }
    }
  } else if(state.drawer.tab==='liens'){
    html += '<div class="section-h">Joueurs CRM rattachés ('+joueursLies.length+')</div>';
    if(joueursLies.length===0){
      html += '<div class="text-sm text-muted">Aucun joueur rattaché aux events de ce pro.</div>';
    } else if(joueursLies.length>5){
      joueursLies.slice(0,5).forEach(j => {
        html += '<div style="display:flex;align-items:center;gap:10px;padding:10px;background:var(--sa-subtle);border-radius:8px;margin-bottom:6px;cursor:pointer" onclick="openDrawerFor(\'joueur\',\''+j.id+'\')"><div style="flex:1"><div class="fw-700">'+esc(j.nom)+'</div><div class="text-xs text-muted">'+esc(j.email)+'</div></div></div>';
      });
      html += '<button class="btn btn-sm">Voir les '+joueursLies.length+' joueurs →</button>';
    } else joueursLies.forEach(j => {
      html += '<div style="display:flex;align-items:center;gap:10px;padding:10px;background:var(--sa-subtle);border-radius:8px;margin-bottom:6px;cursor:pointer" onclick="openDrawerFor(\'joueur\',\''+j.id+'\')"><div style="flex:1"><div class="fw-700">'+esc(j.nom)+'</div><div class="text-xs text-muted">'+esc(j.email)+'</div></div></div>';
    });
    html += '<div class="section-h">Partenaires ('+partenairesLies.length+')</div>';
    if(partenairesLies.length===0){
      html += '<div class="text-sm text-muted">Aucun partenaire associé aux events de ce pro.</div>';
    } else partenairesLies.forEach(pt => {
      html += '<div style="display:flex;align-items:center;gap:10px;padding:10px;background:var(--sa-subtle);border-radius:8px;margin-bottom:6px;cursor:pointer" onclick="openDrawerFor(\'partenaire\',\''+pt.id+'\')"><div style="flex:1"><div class="fw-700">'+esc(pt.nom)+'</div><div class="text-xs text-muted">'+esc(pt.type||'')+'</div></div></div>';
    });
  } else if(state.drawer.tab==='export'){
    html += '<div class="section-h">Exports disponibles</div>';
    html += '<button class="btn mb-2 btn-block" onclick="exportFichePro(\''+p.id+'\')">📄 Fiche pro complète (PDF)</button>';
    html += '<button class="btn mb-2 btn-block" onclick="exportCSV(\'events-pro\',\''+p.id+'\')">📥 Tous les events (CSV)</button>';
    html += '<button class="btn mb-2 btn-block" onclick="exportCSV(\'joueurs-pro\',\''+p.id+'\')">📥 Joueurs CRM rattachés (CSV)</button>';
    html += '<button class="btn btn-block" onclick="toast(\'Synthèse XLSX générée\',\'success\')">📊 Synthèse statistique (XLSX)</button>';
  }

  html += '</div>';

  if(state.drawer.edit){
    html += drawerFooter('<button class="btn" onclick="cancelEdit()">Annuler</button><button class="btn btn-primary" onclick="saveEdit()">✓ Enregistrer</button>');
  } else {
    html += drawerFooter('<button class="btn btn-danger btn-sm" onclick="confirmDanger(\'Archiver ce pro ?\',\'Le pro sera archivé. Les events liés ne sont pas supprimés.\',()=>archivePro(\''+p.id+'\'),\'Archiver\')">🗑 Archiver</button><button class="btn btn-sm" onclick="openProMobileModal(\''+p.id+'\')">📱 Aperçu mobile</button><button class="btn btn-primary" onclick="enterEditMode()">✏ Éditer</button>');
  }
  return html;
}

function archivePro(id){
  DATA.pros = DATA.pros.filter(p=>p.id!==id);
  saveData(); closeDrawer(); closeModal();
  toast('Pro archivé','success'); render();
}
function archiveEvent(id){
  var e = findEvent(id); if(!e) return;
  e.status = 'archived';
  saveData(); closeDrawer(); closeModal();
  toast('Event archivé','success'); render();
}
function confirmDelete(type, id){
  if(type==='event'){
    confirmDanger('Archiver cet event ?','L\'event sera archivé. Les joueurs et lots ne sont pas supprimés.',function(){ archiveEvent(id); },'Archiver');
  } else if(type==='pro'){
    confirmDanger('Archiver ce pro ?','Le pro sera archivé. Les events liés ne sont pas supprimés.',function(){ archivePro(id); },'Archiver');
  }
}
function exportFichePro(id){
  const p = LIB_PROS.find(id); if(!p) return;
  const events = LIB_EVENTS.query({proId:id});
  const joueurs = LIB_JOUEURS.query({proId:id});
  const data = {pro:p, events:events.map(e=>({id:e.id,nom:e.nom,dateD:e.dateD,dateF:e.dateF,participants:e.participants,status:e.status})), totalJoueurs:joueurs.length, totalOptin:joueurs.filter(j=>j.optin).length};
  downloadJSON('fiche-pro-'+id+'.json', data);
  toast('Fiche pro exportée (JSON)','success');
}
function exportCSV(type, id){
  if(type==='joueurs'){
    const filter = id ? {eventId:id} : {};
    const csv = LIB_JOUEURS.exportCSV(filter);
    const fname = id ? 'joueurs-event-'+id+'.csv' : 'joueurs-crm-flowin.csv';
    downloadCSV(fname, csv);
    toast('Export CSV joueurs téléchargé ('+LIB_JOUEURS.query(filter).length+' lignes)','success');
  } else if(type==='lots'){
    const list = LIB_LOTS.query(id?{eventId:id}:{});
    const cols = ['ID','Event','Partenaire','Nom lot','Valeur €','Qté','Assigné à','Retiré','Date retrait','Date assignation'];
    const rows = list.map(l=>{
      const ev = LIB_EVENTS.find(l.eventId); const pt = LIB_PARTENAIRES.find(l.partenaireId);
      const j = l.assigneA ? LIB_JOUEURS.find(l.assigneA) : null;
      return [l.id, esc2csv(ev?ev.nom:l.eventId), esc2csv(pt?pt.nom:l.partenaireId), esc2csv(l.nom), l.valeur, l.quantite, esc2csv(j?j.nom+' ('+j.email+')':''), l.retire?'Oui':'Non', l.dateRetrait||'', l.dateAssign||''].join(';');
    });
    downloadCSV('lots-'+(id||'all')+'.csv', cols.join(';')+'\n'+rows.join('\n'));
    toast('Export CSV lots téléchargé','success');
  } else if(type==='event-config'){
    const ev = LIB_EVENTS.find(id); if(!ev) return;
    downloadJSON('config-event-'+id+'.json', ev);
    toast('Config event exportée (JSON)','success');
  } else if(type==='rapport'){
    exportPDFRapport(id);
  } else if(type==='pros'){
    const cols = ['ID','Nom','Ville','CP','Secteur','Contact','Email','Tel','Entrée','Notes'];
    const rows = DATA.pros.map(p=>[p.id,esc2csv(p.nom),esc2csv(p.ville),p.codePostal,esc2csv(p.secteur),esc2csv(p.contact),esc2csv(p.email),p.tel,p.entreeP,esc2csv(p.notes)].join(';'));
    downloadCSV('pros-flowin.csv', cols.join(';')+'\n'+rows.join('\n'));
    toast('Export pros téléchargé','success');
  } else if(type==='partenaires'){
    const cols = ['ID','Nom','Type','Secteur','Contact','Email','Tel'];
    const rows = DATA.partenaires.map(p=>[p.id,esc2csv(p.nom),p.type,esc2csv(p.secteur),esc2csv(p.contact),esc2csv(p.email),p.tel].join(';'));
    downloadCSV('partenaires-flowin.csv', cols.join(';')+'\n'+rows.join('\n'));
    toast('Export partenaires téléchargé','success');
  } else if(type==='gagnants'){
    const cols = ['ID lot','Event','Lot','Valeur','Gagnant','Email','Retiré'];
    const rows = DATA.lots.filter(l=>l.assigneA).map(l=>{
      const ev=LIB_EVENTS.find(l.eventId),j=LIB_JOUEURS.find(l.assigneA);
      return [l.id,esc2csv(ev?ev.nom:''),esc2csv(l.nom),l.valeur,esc2csv(j?j.nom:''),esc2csv(j?j.email:''),l.retire?'Oui':'Non'].join(';');
    });
    downloadCSV('gagnants-flowin.csv', cols.join(';')+'\n'+rows.join('\n'));
    toast('Export gagnants téléchargé','success');
  } else if(type==='events-pro'){
    const evs = DATA.events.filter(e=>e.proId===id);
    const cols = ['ID','Nom','Module','Statut','Date début','Date fin','Participants','Opt-in'];
    const rows = evs.map(e=>[e.id,esc2csv(e.nom),e.module,e.status,e.dateD,e.dateF,e.participants,e.joueursOptin].join(';'));
    downloadCSV('events-pro-'+id+'.csv', cols.join(';')+'\n'+rows.join('\n'));
    toast('Export events téléchargé','success');
  } else if(type==='joueurs-pro'){
    const evIds = DATA.events.filter(e=>e.proId===id).map(e=>e.id);
    const jList = DATA.joueurs.filter(j=>j.events&&j.events.some(eid=>evIds.includes(eid)));
    const csv = LIB_JOUEURS.exportCSV({ids: jList.map(j=>j.id)});
    downloadCSV('joueurs-pro-'+id+'.csv', csv);
    toast('Export joueurs pro téléchargé ('+jList.length+' lignes)','success');
  } else if(type==='historique-joueur'){
    const j = LIB_JOUEURS.find(id); if(!j) return;
    const evs = (j.events||[]).map(eid=>LIB_EVENTS.find(eid)).filter(Boolean);
    const cols = ['Event','Module','Statut','Date','Score','Gains'];
    const rows = evs.map(e=>[esc2csv(e.nom),e.module,e.status,e.dateD,j.scoreMoy,j.gains].join(';'));
    downloadCSV('historique-'+j.id+'.csv', cols.join(';')+'\n'+rows.join('\n'));
    toast('Export historique téléchargé','success');
  } else {
    toast('Export CSV ('+type+') — type non reconnu','warn');
  }
}

  const participants = eventId ? LIB_JOUEURS.query({eventId}) : DATA.joueurs;

  const gagnants = lots.filter(l=>l.assigneA);

  const css = `body{font-family:Arial,sans-serif;color:#1F1B2E;margin:0;padding:24px}
    h1{color:#7C2D92;font-size:20px;margin-bottom:4px} h2{font-size:14px;color:#7C2D92;margin:18px 0 8px;border-bottom:1.5px solid #E5E7EB;padding-bottom:4px}

    @media print{body{padding:12px} @page{margin:15mm}}`;

  const lotsTable = gagnants.length ? `<h2>Gagnants (${gagnants.length})</h2>
    <table><thead><tr><th>Joueur</th><th>Email</th><th>Lot</th><th>Retiré</th></tr></thead><tbody>
    ${gagnants.map(l=>{const j=LIB_JOUEURS.find(l.assigneA)||{};return `<tr><td>${esc(j.nom||'-')}</td><td>${esc(j.email||'-')}</td><td>${esc(l.nom)}</td><td>${l.retire?'✓':'En attente'}</td></tr>`;}).join('')}
    </tbody></table>` : '';

  const jouTable = `<h2>Liste participants (${participants.length})</h2>
    <table><thead><tr><th>Nom</th><th>Email</th><th>Ville</th><th>CP</th><th>Opt-in</th><th>Score</th></tr></thead><tbody>
    ${participants.slice(0,100).map(j=>`<tr><td>${esc(j.nom)}</td><td>${esc(j.email)}</td><td>${esc(j.ville||'')}</td><td>${j.codePostal||''}</td><td>${j.optin?'✓':''}</td><td>${esc(j.scoreMoy||'')}</td></tr>`).join('')}
    ${participants.length>100?`<tr><td colspan="6" style="text-align:center;color:#94A3B8;font-style:italic">… et ${participants.length-100} autres (export CSV pour la liste complète)</td></tr>`:''}
    </tbody></table>`;

  const html = `<!DOCTYPE html><html><head><meta charset="utf-8"><title>Rapport Flowin${ev?' — '+ev.nom:''}</title><style>${css}</style></head><body>
    <h1>📊 Rapport Flowin${ev?' — '+ev.nom:''}</h1>
    <div style="font-size:12px;color:#94A3B8;margin-bottom:16px">Généré le ${new Date().toLocaleDateString('fr-FR',{day:'2-digit',month:'long',year:'numeric'})}${pro?' · '+pro.nom:''}</div>
    <div class="kpi-row">
      <div class="kpi"><div class="v">${participants.length}</div><div class="l">Participants</div></div>
      <div class="kpi"><div class="v">${optin.length} <span style="font-size:14px;color:#94A3B8">(${participants.length?Math.round(optin.length/participants.length*100):0}%)</span></div><div class="l">Opt-in</div></div>
      <div class="kpi"><div class="v">${gagnants.length}</div><div class="l">Gagnants</div></div>
      <div class="kpi"><div class="v">${lots.reduce((s,l)=>s+(l.valeur||0),0)} €</div><div class="l">Valeur lots</div></div>
    </div>

    <div style="margin-top:24px;font-size:10px;color:#94A3B8;border-top:1px solid #E5E7EB;padding-top:8px">Flowin · OPConsult / BAITA EURL · Vence 06140 · romain@opconsult.fr</div>

  const w = window.open('','_blank','width=900,height=700');
  if(!w){ toast('Autoriser les popups pour générer le PDF','warn'); return; }
  w.document.write(html);
  w.document.close();

// ============ BIBLIOTHÈQUE JOUEURS — TABLE EXCEL ============
function renderBiblioJoueurs(){
  const filter  = state.filter.joueurs;
  const search  = (state.search.joueurs||'').toLowerCase();
  const colFilt = state.colFilter || {};
  const page    = state.joueurPage || 0;
  const PAGE_SZ = 50;
  const sel     = state.joueurSel || new Set();
  state.joueurSel = sel;

  // ---- Filtres pills + recherche globale ----
  let list = DATA.joueurs.slice();
  if(filter==='gagnants') list = list.filter(j=>j.gains>0);
  else if(filter==='optin')    list = list.filter(j=>j.optin);
  else if(filter==='no-optin') list = list.filter(j=>!j.optin);
  else if(filter==='actifs')   list = list.filter(j=>{ const d=(TODAY-new Date(j.lastSeen))/(864e5); return d<=30; });
  if(search) list = list.filter(j=>
    (j.nom||'').toLowerCase().includes(search)||
    (j.prenom||'').toLowerCase().includes(search)||
    (j.email||'').toLowerCase().includes(search)||
    (j.ville||'').toLowerCase().includes(search)||
    (j.codePostal||'').includes(search)
  );
  // ---- Filtres colonne ----
  if(colFilt.ville)  list = list.filter(j=>(j.ville||'')===(colFilt.ville));
  if(colFilt.optin!==undefined && colFilt.optin!=='') list = list.filter(j=>String(j.optin)===(colFilt.optin));
  if(colFilt.event)  list = list.filter(j=>j.events.includes(colFilt.event));

  // ---- Tri ----
  list = applySort(list,'joueurs',{
    nom:     j=>j.nom.toLowerCase(),
    prenom:  j=>(j.prenom||'').toLowerCase(),
    ville:   j=>(j.ville||'').toLowerCase(),
    cp:      j=>j.codePostal||'',
    events:  j=>j.events.length,
    gains:   j=>+j.gains,
    score:   j=>parseFloat(String(j.scoreMoy).split('/')[0])||0,
    optin:   j=>j.optin?1:0,
    lastSeen:j=>new Date(j.lastSeen).getTime(),
    firstSeen:j=>new Date(j.firstSeen||j.lastSeen).getTime()
  });

  // ---- Filtre B2B/B2C — AVANT pagination ----
  var btobFilter = state.btobFilter || 'all';
  if(btobFilter==='btob') list = list.filter(function(j){ return j.tags && j.tags.indexOf('btob')>-1; });
  if(btobFilter==='btoc') list = list.filter(function(j){ return !j.tags || j.tags.indexOf('btob')<0; });

  // ---- KPIs globaux (sur données totales, pas filtrées) ----
  const total    = DATA.joueurs.length;
  const nbOptin  = DATA.joueurs.filter(j=>j.optin).length;
  const nbGagn   = DATA.joueurs.filter(j=>j.gains>0).length;
  const moyEv    = (DATA.joueurs.reduce((s,j)=>s+j.events.length,0)/Math.max(total,1)).toFixed(1);

  // ---- Pagination ----
  const totalPages = Math.ceil(list.length/PAGE_SZ)||1;
  const safePage   = Math.min(page, totalPages-1);
  if(state.joueurPage!==safePage) state.joueurPage=safePage;
  const pageList   = list.slice(safePage*PAGE_SZ, (safePage+1)*PAGE_SZ);

  // ---- Valeurs distinctes pour filtres colonnes ----
  var _vSet = {}; DATA.joueurs.forEach(function(j){ if(j.ville) _vSet[j.ville]=true; });
  const villes = Object.keys(_vSet).sort();
  const eventsAll = DATA.events;

  // ---- Sélection ----
  const allOnPageSelected = pageList.length>0 && pageList.every(j=>sel.has(j.id));
  const selCount = sel.size;

  // ---- CSS inline dédié table Excel ----
  const xtraCss = `
    .xls-wrap{position:relative;border-radius:12px;overflow:hidden;border:1px solid var(--sa-border);background:var(--sa-card)}
    .xls-toolbar{display:flex;align-items:center;gap:8px;padding:10px 14px;background:var(--sa-subtle);border-bottom:1px solid var(--sa-border);flex-wrap:wrap}
    .xls-colhdr{display:flex;align-items:center;gap:4px;cursor:pointer;user-select:none;white-space:nowrap;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--sa-muted);padding:0 2px}
    .xls-colhdr:hover{color:var(--sa-text)}
    .xls-colhdr.active-sort{color:var(--sa-accent)}
    .xls-colhdr .sort-arrow{font-size:9px;opacity:.5}
    .xls-colhdr.active-sort .sort-arrow{opacity:1;color:var(--sa-accent)}
    .xls-filter-btn{background:none;border:1px solid var(--sa-border);border-radius:4px;padding:1px 5px;font-size:10px;cursor:pointer;color:var(--sa-muted);margin-left:2px;line-height:1.4}
    .xls-filter-btn.on{background:var(--sa-accent);color:#fff;border-color:var(--sa-accent)}
    .xls-table{width:100%;border-collapse:collapse;font-size:12.5px}
    .xls-table thead tr{background:var(--sa-subtle)}
    .xls-table thead th{padding:9px 10px;border-bottom:2px solid var(--sa-border);text-align:left;position:relative;white-space:nowrap;background:var(--sa-subtle)}
    .xls-table tbody td{padding:8px 10px;border-bottom:1px solid var(--sa-border);vertical-align:middle;white-space:nowrap}
    .xls-table tbody tr{transition:background .1s;cursor:pointer}
    .xls-table tbody tr:hover{background:#F8F5FF}
    .xls-table tbody tr.sel-row{background:rgba(124,45,146,.07)}
    .xls-table tbody tr:last-child td{border-bottom:none}
    .xls-score-bar{display:inline-flex;align-items:center;gap:5px}
    .xls-score-dots{display:flex;gap:2px}

// Helpers table Excel
function xlsToggleSel(id, checked){
  if(!state.joueurSel) state.joueurSel = new Set();
  if(checked) state.joueurSel.add(id); else state.joueurSel.delete(id);
  // Re-render partiel : juste la ligne concernée
  const row = document.querySelector('tr[onclick*="'+id+'"]');
  if(row){ if(checked) row.classList.add('sel-row'); else row.classList.remove('sel-row'); }
  // Met à jour la barre sel sans re-render complet
  render();
}
function xlsSelectPage(checked){
  if(!state.joueurSel) state.joueurSel = new Set();
  const page = state.joueurPage||0;
  const list = getJoueursList();
  const pageList = list.slice(page*50,(page+1)*50);
  pageList.forEach(j=>{ if(checked) state.joueurSel.add(j.id); else state.joueurSel.delete(j.id); });
  render();
}
function getJoueursList(){
  // Reproduit la même logique de filtrage pour les actions globales
  const filter=state.filter.joueurs, search=(state.search.joueurs||'').toLowerCase(), colFilt=state.colFilter||{};
  let list=DATA.joueurs.slice();
  if(filter==='gagnants') list=list.filter(j=>j.gains>0);
  else if(filter==='optin') list=list.filter(j=>j.optin);
  else if(filter==='no-optin') list=list.filter(j=>!j.optin);
  else if(filter==='actifs') list=list.filter(j=>(TODAY-new Date(j.lastSeen))/864e5<=30);
  if(search) list=list.filter(j=>(j.nom||'').toLowerCase().includes(search)||(j.email||'').toLowerCase().includes(search)||(j.ville||'').toLowerCase().includes(search)||(j.codePostal||'').includes(search));
  if(colFilt.ville) list=list.filter(j=>(j.ville||'')===colFilt.ville);
  if(colFilt.optin!==undefined&&colFilt.optin!=='') list=list.filter(j=>String(j.optin)===colFilt.optin);
  if(colFilt.event) list=list.filter(j=>j.events.includes(colFilt.event));
  return list;
}

  var cols,rows;

    rows=list.map(function(j){
      var tp=(j.tags||[]).filter(function(t){return t&&t!=='btob';})[0]||'';
      var src=(j.tags||[]).filter(function(t){return t&&t!=='btob'&&t!==tp;})[0]||'';
      return [j.id,esc2csv(j.enseigne||''),esc2csv(j.prenom||''),esc2csv(j.nom||''),esc2csv(j.email||''),esc2csv(j.tel||''),esc2csv(j.ville||''),esc2csv(tp),esc2csv(j.lot_gagne||''),esc2csv(j.ticket_code||''),esc2csv(src),j.optin?'Oui':'Non',j.firstSeen||''].join(';');
    });
  } else {
    cols=['ID','Prénom','Nom','Email','Téléphone','Ville','Code Postal','Opt-in','Date opt-in','Gains','Score','Première vue','Dernière vue'];
    rows=list.map(function(j){return [j.id,esc2csv(j.prenom||''),esc2csv(j.nom||''),esc2csv(j.email||''),esc2csv(j.tel||''),esc2csv(j.ville||''),j.codePostal||'',j.optin?'Oui':'Non',j.optinDate||'',j.gains||0,j.scoreMoy||'',j.firstSeen||'',j.lastSeen||''].join(';');});

      navigator.clipboard.writeText(nums).then(function(){

function renderEventsKanban(list){
  const past = list.filter(e=>e.status==='past').sort((a,b)=>new Date(b.dateD)-new Date(a.dateD));

function kbDrop(ev,toStatus){
  ev.preventDefault();
  const id = ev.dataTransfer.getData('text/plain');
  const e = findEvent(id);
  if(!e || e.status===toStatus) { document.querySelectorAll('.kb-col').forEach(c=>c.classList.remove('drop-hover')); return; }
  const fromStatus = e.status;

  saveData();
  toast('Event "'+e.nom+'" déplacé vers '+(toStatus==='live'?'En cours':(toStatus==='upcoming'?'À venir':'Passés')),'success');
  render();

// ============ HELPERS GRAPHIQUES SVG (style ZIP) ============
// Histogramme barres verticales
function renderBarChartSVG(labels, values, color){
  if(!values || values.length===0) return '<div class="text-sm text-muted">Aucune donnée</div>';
  const w = 480, h = 160;
  const n = values.length;
  const barW = Math.max(20, Math.min(48, (w - 40) / n - 10));
  const gap = (w - barW * n) / (n + 1);
  const maxV = Math.max.apply(null, values.concat([1]));
  let bars = '';
  values.forEach((v,i) => {
    const x = gap + i * (barW + gap);
    const bh = Math.round((v/maxV) * 110);
    const y = h - 30 - bh;
    bars += '<rect x="'+x+'" y="'+y+'" width="'+barW+'" height="'+bh+'" rx="4" fill="'+(color||'#7C2D92')+'" opacity="0.85"/>';
    bars += '<text x="'+(x+barW/2)+'" y="'+(y-5)+'" text-anchor="middle" font-size="11" font-weight="700" fill="#1F1B2E">'+v+'</text>';
    bars += '<text x="'+(x+barW/2)+'" y="'+(h-8)+'" text-anchor="middle" font-size="10" fill="#888780">'+labels[i]+'</text>';
  });
  return '<svg viewBox="0 0 '+w+' '+h+'" style="width:100%;height:auto;display:block">'+bars+'</svg>';
}

// Courbe (line chart avec aire)
function renderLineChartSVG(labels, values, color){
  if(!values || values.length===0) return '<div class="text-sm text-muted">Aucune donnée</div>';
  const w = 480, h = 160;
  const n = values.length;
  const padX = 30, padY = 20;
  const maxV = Math.max.apply(null, values.concat([1]));
  const points = values.map((v,i) => {
    const x = padX + (i / (n-1)) * (w - padX*2);
    const y = h - padY - ((v/maxV) * (h - padY*2));
    return [x, y, v, labels[i]];
  });
  const pathD = points.map((p,i) => (i===0?'M':'L')+p[0]+','+p[1]).join(' ');
  const areaD = pathD + ' L '+points[n-1][0]+','+(h-padY)+' L '+points[0][0]+','+(h-padY)+' Z';
  let dots = '';
  points.forEach(p => {
    dots += '<circle cx="'+p[0]+'" cy="'+p[1]+'" r="3.5" fill="'+(color||'#7C2D92')+'" stroke="#fff" stroke-width="2"/>';
    dots += '<text x="'+p[0]+'" y="'+(p[1]-9)+'" text-anchor="middle" font-size="10" font-weight="700" fill="#1F1B2E">'+p[2]+'</text>';
  });
  let xLabels = '';
  points.forEach(p => {
    xLabels += '<text x="'+p[0]+'" y="'+(h-5)+'" text-anchor="middle" font-size="10" fill="#888780">'+p[3]+'</text>';
  });
  return '<svg viewBox="0 0 '+w+' '+h+'" style="width:100%;height:auto;display:block">'
    + '<path d="'+areaD+'" fill="'+(color||'#7C2D92')+'" opacity="0.12"/>'
    + '<path d="'+pathD+'" fill="none" stroke="'+(color||'#7C2D92')+'" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>'
    + dots + xLabels
    + '</svg>';
}

// Camembert (pie chart)
function renderPieChartSVG(data){
  if(!data || data.length===0) return '<div class="text-sm text-muted">Aucune donnée</div>';
  const total = data.reduce((s,d)=>s+d.value,0);
  if(total===0) return '<div class="text-sm text-muted">Aucune donnée</div>';
  const cx = 60, cy = 60, r = 50;
  let cumulative = 0;
  let paths = '';
  data.forEach(d => {
    if(d.value===0) return;
    const startAngle = (cumulative/total) * 2 * Math.PI - Math.PI/2;
    cumulative += d.value;
    const endAngle = (cumulative/total) * 2 * Math.PI - Math.PI/2;
    const x1 = cx + r * Math.cos(startAngle);
    const y1 = cy + r * Math.sin(startAngle);
    const x2 = cx + r * Math.cos(endAngle);
    const y2 = cy + r * Math.sin(endAngle);
    const largeArc = (endAngle - startAngle) > Math.PI ? 1 : 0;
    paths += '<path d="M '+cx+','+cy+' L '+x1+','+y1+' A '+r+','+r+' 0 '+largeArc+' 1 '+x2+','+y2+' Z" fill="'+d.color+'" stroke="#fff" stroke-width="2"/>';
  });
  return '<svg viewBox="0 0 120 120" width="120" height="120" style="flex-shrink:0">'+paths+'</svg>';
}

    const totalPart = joueursDynamic.length || e.participants || 0;
    const totalOptin = joueursDynamic.filter(function(j){ return j.optin; }).length || e.joueursOptin || 0;

    // ─── Sélecteur de jour (multi-jours, SA + Pro) ───

function jeuUpd(eventId, path, value){
  var ev = findEvent(eventId); if(!ev) return;
  if(!ev.cfg) ev.cfg = {};
  var parts = path.split('.');
  var obj = ev.cfg;
  for(var i=0;i<parts.length-1;i++){
    if(!obj[parts[i]]) obj[parts[i]] = {};
    obj = obj[parts[i]];
  }
  obj[parts[parts.length-1]] = value;
  saveData();
}

// Toggle pro/event dans un super event
function seToggle(kind,seId,itemId,checked){
  const se = findSuperEvent(seId); if(!se) return;
  if(!se[kind]) se[kind] = [];
  if(checked && !se[kind].includes(itemId)) se[kind].push(itemId);
  if(!checked) {
    se[kind] = se[kind].filter(x => x!==itemId);
    // Si on retire un pro, on retire aussi ses events de la sélection
    if(kind==='pros'){
      const evIds = DATA.events.filter(e=>e.proId===itemId).map(e=>e.id);
      se.events = (se.events||[]).filter(eid => !evIds.includes(eid));
    }
  }
  saveData();
  renderDrawer();
}

      html += fieldInput('Date fin','dateF',fmtDateInput(f.dateF),'date');
      html += fieldSelect('Statut','status',f.status,[{v:'upcoming',l:'À venir'},{v:'live',l:'En cours'},{v:'past',l:'Passé'}]);
      html += '<div class="field-row"><div class="field-label">Tirage final global</div><div class="field-value"><div class="toggle '+(f.tirageGlobal?'on':'')+'" onclick="setForm(\'tirageGlobal\',!state.drawer.form.tirageGlobal);renderDrawer()"></div></div></div>';
      if(f.tirageGlobal) html += fieldInput('Nombre de gagnants finaux','nbGagnantsFinal',f.nbGagnantsFinal,'number');
    } else {
      html += fieldRow('Nom','<strong>'+esc(se.nom)+'</strong>');
      html += fieldRow('Description',esc(se.description||'-'));
      html += fieldRow('Période',fmtFull(se.dateD)+' → '+fmtFull(se.dateF));
      html += fieldRow('Statut',statusChip(se.status));
      html += fieldRow('Pros liés',prosLies.length?prosLies.map(p=>'<a onclick="openDrawerFor(\'pro\',\''+p.id+'\')">'+esc(p.nom)+'</a>').join(' · '):'<span class="text-muted">Aucun · ajoutez des pros dans l\'onglet "Pros"</span>');
      html += fieldRow('Events liés',evs.length+' / '+eventsCandidats.length+' events disponibles');
      html += fieldRow('Tirage final',se.tirageGlobal?'Oui · '+se.nbGagnantsFinal+' gagnants':'Non · gains par event');
    }
  } else if(state.drawer.tab==='pros'){
    html += '<div class="alert info"><span class="ico">🏢</span>Sélectionnez les pros qui participent à ce Super Event. Vous pourrez ensuite choisir les events de chacun.</div>';
    html += '<div class="section-h">Pros existants</div>';
    DATA.pros.forEach(p => {
      const checked = (se.pros||[]).includes(p.id);
      html += '<label class="cb-row"><input type="checkbox" '+(checked?'checked':'')+' onchange="seToggle(\'pros\',\''+se.id+'\',\''+p.id+'\',this.checked)"/><div class="lbl">'+esc(p.nom)+' <span class="text-muted text-sm">· '+esc(p.ville)+' · '+esc(p.secteur||'')+'</span></div></label>';
    });
    html += '<div class="section-h">Créer un nouveau pro</div>';
    html += '<button class="btn btn-block" onclick="seCreateAndAddPro(\''+se.id+'\')">+ Créer un nouveau pro et l\'ajouter</button>';
  } else if(state.drawer.tab==='events'){
    if((se.pros||[]).length===0){
      html += '<div class="alert warn"><span class="ico">⚠️</span>Aucun pro sélectionné · ajoutez d\'abord des pros dans l\'onglet "Pros".</div>';
    } else {
      html += '<div class="alert info"><span class="ico">📅</span>Cochez les events à inclure dans ce Super Event. Seuls les events des pros sélectionnés sont proposés.</div>';
      const byPro = {};
      eventsCandidats.forEach(e => { if(!byPro[e.proId]) byPro[e.proId]=[]; byPro[e.proId].push(e); });
      Object.entries(byPro).forEach(([proId,list]) => {
        const pro = findPro(proId);
        html += '<div class="section-h">🏢 '+esc(pro.nom)+'</div>';
        list.forEach(e => {
          const checked = (se.events||[]).includes(e.id);
          html += '<label class="cb-row"><input type="checkbox" '+(checked?'checked':'')+' onchange="seToggle(\'events\',\''+se.id+'\',\''+e.id+'\',this.checked)"/><div class="lbl">'+esc(e.nom)+' <span class="text-muted text-sm">· '+fmt(e.dateD)+' · '+(DATA.modules[e.module]||{label:e.module}).label+'</span></div>'+statusChip(e.status)+'</label>';
        });
      });
      if(eventsCandidats.length===0){
        html += '<div class="empty-block"><div class="d">Aucun event créé pour les pros sélectionnés.</div></div>';
      }
      html += '<div class="section-h">Créer un nouvel event</div>';
      html += '<button class="btn btn-block" onclick="seCreateAndAddEvent(\''+se.id+'\')">+ Créer un nouvel event et l\'ajouter</button>';
    }
  } else if(state.drawer.tab==='stats'){
    const totalPart = evs.reduce((s,e)=>s+(e.participants||0),0);
    const totalOptin = evs.reduce((s,e)=>s+(e.joueursOptin||0),0);
    const totalGag = evs.reduce((s,e)=>s+(e.gagnants||0),0);
    html += '<div class="kpi-grid" style="grid-template-columns:1fr 1fr">'
         + kpi('Pros',prosLies.length) + kpi('Events',evs.length)
         + kpi('Participants cumulés',totalPart) + kpi('Opt-in cumulés',totalOptin)
         + kpi('Gagnants distincts',totalGag) + kpi('Tx opt-in moyen',totalPart?Math.round(totalOptin/totalPart*100)+' %':'-')
         + '</div>';
    if(evs.length){
      html += '<div class="section-h">Détail par event</div>';
      evs.forEach(e => {
        html += '<div style="padding:10px;background:var(--sa-subtle);border-radius:8px;margin-bottom:6px;cursor:pointer" onclick="openDrawerFor(\'event\',\''+e.id+'\')">'
             + '<div class="flex flex-between"><div class="fw-700">'+esc(e.nom)+'</div><div class="text-sm">'+(e.participants||0)+' part. · '+(e.joueursOptin||0)+' opt-in</div></div>'
             + '<div class="text-xs text-muted mt-2">'+fmt(e.dateD)+' · '+statusChip(e.status)+'</div></div>';
      });
    }
  } else if(state.drawer.tab==='tirage'){
    if(!se.tirageGlobal){
      html += '<div class="alert info"><span class="ico">ℹ️</span>Le tirage final global n\'est pas activé pour ce Super Event. Activez-le dans l\'onglet "Infos" en mode édition.</div>';
    } else {
      html += '<div class="section-h">Tirage final</div>';
      const isLocked = new Date(se.dateF) > TODAY;
      if(isLocked){
        html += '<div class="alert warn"><span class="ico">⏳</span>Disponible à la fin du Super Event ('+fmtFull(se.dateF)+')</div>';
      } else {
        html += '<div class="alert success"><span class="ico">✓</span>Période terminée · le tirage peut être effectué.</div>';
      }
      const totalOptin = evs.reduce((s,e)=>s+(e.joueursOptin||0),0);
      html += '<div class="form-row"><label class="label">Pool des participants</label><div class="card" style="margin:0">'+totalOptin+' participants opt-in cumulés sur '+evs.length+' events</div></div>';
      html += '<div class="form-row"><label class="label">Nombre de gagnants finaux</label><input type="number" class="input" value="'+(se.nbGagnantsFinal||3)+'"/></div>';
      html += '<button class="btn btn-primary btn-block" '+(isLocked?'disabled':'')+' onclick="toast(\'Tirage final effectué\',\'success\')">🎲 Lancer le tirage final '+(isLocked?'(verrouillé)':'')+'</button>';
    }
  }
  html += '</div>';
  if(state.drawer.edit){
    html += drawerFooter('<button class="btn" onclick="cancelEdit()">Annuler</button><button class="btn btn-primary" onclick="saveEdit()">✓ Enregistrer</button>');
  } else {
    html += drawerFooter('','<button class="btn btn-primary" onclick="enterEditMode()">✏ Éditer</button>');
  }
  return html;
}

// ============ JEUX (catalogue) ============
function renderBiblioJeux(){
  // ── Onglet actif (module sélectionné) ──
  if(!state.jeuxTab) state.jeuxTab = 'quiz';
  var tab = state.jeuxTab;

  var modDefs = [
    {id:'quiz',       ico:'🎯', nom:'Quiz',          color:'#D4537E', tag:'STANDARD'},
    {id:'vote',       ico:'📊', nom:'Vote',           color:'#378ADD', tag:'STANDARD'},
    {id:'spin',       ico:'🎡', nom:'Spin',           color:'#EF9F27', tag:'STANDARD'},
    {id:'tombola',    ico:'🎟', nom:'Tombola',        color:'#1D9E75', tag:'STANDARD'},
    {id:'quizsolo',   ico:'🏆', nom:'Quiz Solo',      color:'#F59E0B', tag:'COMPÉTITION'},
    {id:'quizmaster', ico:'⚡', nom:'Quiz Master',    color:'#7C3AED', tag:'GAMIFICATION'},
    {id:'standup',    ico:'🌟', nom:'Stand Up',       color:'#9333EA', tag:'ÉVÉNEMENTIEL'}
  ];

  var html = '<div class="page">';
  html += '<div class="page-header"><div><div class="page-title">🎮 Jeux</div><div class="page-subtitle">7 modules · paramètres globaux · prévisualisations</div></div>'
       + '<div class="page-actions"><button class="btn" onclick="newBanque()">+ Nouvelle banque</button></div></div>';

  // KPIs
  var totalQ = DATA.banques.reduce(function(s,b){return s+((b.questions&&((b.questions&&b.questions.length)||0))||0);},0);
  html += '<div class="kpi-grid">'
       + kpi('Modules',7)
       + kpi('Banques',DATA.banques.length)

    html += '<button onclick="state.jeuxTab=\''+m.id+'\';render()" style="padding:8px 14px;border:none;background:none;cursor:pointer;font-size:12px;font-weight:'+(active?'800':'600')+';color:'+(active?m.color:'var(--sa-muted)')+';border-bottom:2px solid '+(active?m.color:'transparent')+';margin-bottom:-2px;font-family:inherit;display:flex;align-items:center;gap:5px">'
           + m.ico+' '+m.nom+'</button>';

  html += '</div>';

  // ── Contenu du module sélectionné ──
  var jeuObj = DATA.jeux.find(function(j){return j.type===tab || j.id==='jeu-'+tab;});
  var cfg = jeuObj ? (jeuObj.configDefault||{}) : {};
  var jIdx = DATA.jeux.indexOf(jeuObj);
  var mDef = modDefs.find(function(m){return m.id===tab;});
  var accent = mDef ? mDef.color : '#7C3AED';

  html += '<div style="display:grid;grid-template-columns:1fr 280px;gap:20px;align-items:start">';

  // ── Colonne gauche : paramètres ──
  html += '<div>';

  // Bannière module
  html += '<div style="display:flex;align-items:center;gap:12px;padding:12px 16px;background:'+accent+'12;border:1px solid '+accent+'30;border-radius:10px;margin-bottom:16px">'
       + '<div style="width:42px;height:42px;border-radius:10px;background:'+accent+';display:flex;align-items:center;justify-content:center;font-size:22px">'+(mDef?mDef.ico:'🎮')+'</div>'
       + '<div><div style="font-size:15px;font-weight:900;color:var(--sa-text)">'+(mDef?mDef.nom:'Module')+'</div>'
       + '<div style="font-size:11px;color:var(--sa-muted)">Paramètres globaux · affecte les nouveaux events</div></div>'
       + '</div>';

  if(tab==='quiz'||tab==='quizsolo'){
    // ── QUIZ / QUIZ SOLO ──
    html += '<div class="section-h">Paramètres par défaut</div>';
    html += '<div class="form-grid">';
    html += '<div><label class="label">Nombre de questions / partie</label>'
         + '<input type="number" class="input" value="'+(cfg.quizNbQuestions||5)+'" min="1" max="20" oninput="(function(){var jj=DATA.jeux['+jIdx+'];if(jj){jj.configDefault.quizNbQuestions=parseInt(this.value)||5;saveData();}}).call(this)"/></div>';
    html += '<div><label class="label">Score minimum pour le tirage</label>'
         + '<input type="number" class="input" value="'+(cfg.quizScoreMin||3)+'" min="0" max="20" oninput="(function(){var jj=DATA.jeux['+jIdx+'];if(jj){jj.configDefault.quizScoreMin=parseInt(this.value)||3;saveData();}}).call(this)"/></div>';
    html += '<div><label class="label">Timer par question (sec)</label>'
         + '<input type="number" class="input" value="'+(cfg.quizTimer||30)+'" min="5" max="120" oninput="(function(){var jj=DATA.jeux['+jIdx+'];if(jj){jj.configDefault.quizTimer=parseInt(this.value)||30;saveData();}}).call(this)"/></div>';
    if(tab==='quizsolo'){
      html += '<div><label class="label">Timer visible par les joueurs</label>'
           + '<select class="select" onchange="(function(){var jj=DATA.jeux['+jIdx+'];if(jj){jj.configDefault.quizTimerVisible=this.value===\'true\';saveData();}})()">'
           + '<option value="true"'+(cfg.quizTimerVisible!==false?' selected':'')+'>Visible</option>'
           + '<option value="false"'+(cfg.quizTimerVisible===false?' selected':'')+'>Caché</option>'

    html += '</div>';

    html += '<div class="section-h" style="margin-top:14px">🎟 Règle des tickets (tirage au sort)</div>';
    html += '<div style="display:flex;flex-direction:column;gap:8px">';
    var ticketRules = [
      {key:'quizBonus',    ico:'💡', lbl:'Questions bonus activées', desc:'Répondre au bonus = +1 ticket'},
      {key:'quizPartage',  ico:'📲', lbl:'Partage réseaux sociaux',  desc:'WhatsApp / Messenger / Email = +1 ticket'},
      {key:'quizRecapFin', ico:'📊', lbl:'Récapitulatif fin de partie', desc:'Affiche score + tickets accumulés'},
      {key:'quizUneFoisParJour', ico:'🔒', lbl:'1 tentative par jour', desc:'Anti-doublon quotidien'}

    ticketRules.forEach(function(r){

      html += '<div style="display:flex;align-items:center;justify-content:space-between;padding:10px 12px;background:var(--sa-subtle);border-radius:8px">'
           + '<div style="display:flex;align-items:center;gap:10px"><span style="font-size:18px">'+r.ico+'</span>'
           + '<div><div style="font-size:12px;font-weight:700">'+r.lbl+'</div>'
           + '<div style="font-size:10px;color:var(--sa-muted)">'+r.desc+'</div></div></div>'
           + '<div class="toggle '+(on?'on':'')+'" onclick="(function(){var jj=DATA.jeux['+jIdx+'];if(jj){jj.configDefault.'+r.key+'=!jj.configDefault.'+r.key+';saveData();render();}})()" style="flex-shrink:0"></div>'
           + '</div>';
    });
    html += '</div>';

    // Info règle
    html += '<div style="margin-top:10px;padding:10px 12px;background:#F3E8FF;border-radius:8px;border-left:3px solid '+accent+';font-size:11px;color:#6D28D9">'
         + '🎟 Règle : <strong>'+(cfg.quizScoreMin||3)+' bonnes = 1 ticket</strong>'
         + (cfg.quizBonus!==false?' · bonus = 1 ticket':'')
         + (cfg.quizPartage!==false?' · partage = 1 ticket':'')
         + ' · max 3 tickets/jour → tirage au sort</div>';

    // ── Banques gérées dans la section bas de page ──

  } else if(tab==='spin'){
    // ── SPIN ──
    html += '<div class="section-h">Paramètres</div>';
    html += '<div class="form-grid">';
    html += '<div><label class="label">Durée animation (sec)</label>'
         + '<input type="number" class="input" value="'+(cfg.spinDuration||6)+'" min="2" max="20" oninput="(function(){var jj=DATA.jeux['+jIdx+'];if(jj){jj.configDefault.spinDuration=parseInt(this.value)||6;saveData();}}).call(this)"/></div>';
    html += '<div><label class="label">Mode</label>'
         + '<select class="select" onchange="(function(){var jj=DATA.jeux['+jIdx+'];if(jj){jj.configDefault.spinModeTirage=this.value;saveData();render();}})()">'
         + '<option value="A"'+(cfg.spinModeTirage!=='B'?' selected':'')+'>A · Gain instantané</option>'
         + '<option value="B"'+(cfg.spinModeTirage==='B'?' selected':'')+'>B · Tirage final</option>'
         + '</select></div>';
    html += '</div>';
    html += '<label style="display:flex;align-items:center;gap:8px;font-size:13px;margin-bottom:14px;cursor:pointer">'
         + '<input type="checkbox" '+(cfg.spinSound!==false?'checked':'')+' onchange="(function(){var jj=DATA.jeux['+jIdx+'];if(jj){jj.configDefault.spinSound=this.checked;saveData();}}).call(this)"/> Son activé</label>';

    // Segments
    var segs = cfg.spinSegments||[];
    var totProba = segs.reduce(function(s,x){return s+(parseFloat(x.proba)||0);},0);
    var probaOk = Math.abs(totProba-100)<0.5;
    html += '<div class="section-h">Segments <span class="chip '+(probaOk?'live':'error')+'" style="font-size:9px">'+totProba.toFixed(0)+'%'+(probaOk?' ✓':' ≠ 100!')+'</span></div>';

    html += '<div class="section-h">Paramètres</div>';
    html += '<div class="form-grid">';
    html += '<div><label class="label">Mode de vote</label>'
         + '<select class="select" onchange="(function(){var jj=DATA.jeux['+jIdx+'];if(jj){jj.configDefault.voteMode=this.value;saveData();render();}})()">'

  } else if(tab==='tombola'){

      {k:'prenom',l:'Prénom',req:true},{k:'nom',l:'Nom',req:true},{k:'email',l:'Email',req:true},{k:'genre',l:'Genre H/F',req:true},
      {k:'telephone',l:'Téléphone'},{k:'ville',l:'Ville'},{k:'codePostal',l:'Code postal'},{k:'age_tranche',l:'Tranche d\'âge'},{k:'dateNaissance',l:'Date de naissance'}
    ];

    champsDispos.forEach(function(c){

           + '<input type="checkbox" '+(on?'checked':'')+(c.req?' disabled':'')+' onchange="(function(){var jj=DATA.jeux['+jIdx+'];if(jj){var ch=jj.configDefault.tombolaChamps||[];if(this.checked){if(ch.indexOf(\''+c.k+'\')<0)ch.push(\''+c.k+'\');}else ch=ch.filter(function(x){return x!==\''+c.k+'\';});jj.configDefault.tombolaChamps=ch;saveData();}}).call(this)"/>'
           + '<span style="font-size:12px;font-weight:600">'+c.l+'</span>'
           + (c.req?'<span style="font-size:9px;color:#EF4444;margin-left:auto">Obligatoire</span>':'')
           + '</div>';
    });
    html += '<div class="section-h" style="margin-top:12px">Cases légales</div>';
    var casesDispos = [{k:'majeur',l:'Certifier avoir 18 ans'},{k:'reglement',l:'Accepter le règlement'},{k:'optin',l:'Opt-in newsletter'}];
    var casesCfg = cfg.tombolaCasesLegales||['majeur','reglement'];
    casesDispos.forEach(function(c){

function newQuestion(banqueId){
  openModal('question',{banqueId,question:null});
}
function editQuestion(banqueId,qid){
  const b = findBanque(banqueId); if(!b) return; if(!b.questions) b.questions=[]; const q = b.questions.find(x=>x.id===qid);
  openModal('question',{banqueId,question:q});
}
function deleteQuestion(banqueId,qid){
  confirmDanger('Supprimer cette question ?','Action irréversible.',()=>{
    const b = findBanque(banqueId);
    if(b.questions) b.questions = b.questions.filter(q=>q.id!==qid);
    saveData(); closeModal(); toast('Question supprimée','success');
    setTimeout(()=>openModal('banque',{banqueId}),50);
  },'Supprimer');
}
function deleteBanque(id){
  DATA.banques = DATA.banques.filter(b=>b.id!==id);
  saveData(); closeModal(); toast('Banque supprimée','success'); render();
}

function saveQuestion(banqueId,isNew){
  const q = state.modal.data.q;
  if(!q.texte){ toast('Saisissez le texte de la question','warn'); return; }
  const b = findBanque(banqueId);
  if(isNew){ if(!b.questions) b.questions=[]; b.questions.push(q); }
  else {
    if(!b.questions) b.questions=[]; const idx = b.questions.findIndex(x=>x.id===q.id);
    if(idx>=0) b.questions[idx] = q;
  }
  saveData(); toast(isNew?'Question créée':'Question enregistrée','success');
  closeModal(); setTimeout(()=>openModal('banque',{banqueId}),50);
}

function saveLot(lotId, eventId){
  var f = state.modal.form;
  if(!f.nom){ toast('Saisissez un nom de lot','warn'); return; }
  if(lotId){
    var l = findLot(lotId); if(!l) return;
    l.nom = f.nom; l.valeur = f.valeur; l.quantite = f.quantite; l.partenaireId = f.partenaireId;
  } else {
    var newL = {id:newId('lot'),eventId:eventId,partenaireId:f.partenaireId,nom:f.nom,valeur:f.valeur,quantite:f.quantite||1,assigneA:'',retire:false,dateRetrait:'',dateAssign:''};
    DATA.lots.push(newL);
  }
  saveData();
  // 🔄 Sync Supabase
  try { var _lot = DATA.lots.find(function(l){return l.id===lotId;}); if(_lot) supaWriteLot(_lot); } catch(e){} closeModal(); renderDrawer(); toast('Lot '+(lotId?'modifié':'ajouté'),'success');
}

function renderPreviewSpin(source){
  var segs = null;
  if(source && source.cfg && Array.isArray(source.cfg.spinSegments)) segs = source.cfg.spinSegments;
  else if(state.wiz && state.wiz.draft && state.wiz.draft.cfg && Array.isArray(state.wiz.draft.cfg.spinSegments)) segs = state.wiz.draft.cfg.spinSegments;
  else if(source && source.configDefault && Array.isArray(source.configDefault.segments)) segs = source.configDefault.segments;
  if(!segs || !segs.length){
    var jeuSpin = DATA.jeux.find(function(j){return j.id==='jeu-spin';});
    if(jeuSpin && jeuSpin.configDefault && Array.isArray(jeuSpin.configDefault.segments)) segs = jeuSpin.configDefault.segments;
  }
  if(!segs || !segs.length) return '<div style="padding:30px;text-align:center;color:var(--sa-muted)">⚠ Pas de segments configurés</div>';
  var svgSize=200, cx=100, cy=100, r=94;
  var html = '<div class="spin-wheel-wrap">';
  html += '<div class="spin-wheel"><div class="pointer"></div>';
  html += '<svg class="spin-svg" id="spinSvg" viewBox="0 0 '+svgSize+' '+svgSize+'" style="transform:rotate('+state.spin.rotation+'deg)">';
  var totalProb = segs.reduce(function(s,sg){return s+(parseInt(sg.proba)||0);},0);
  var startAngle = -90;
  segs.forEach(function(s,i){
    var prob = parseInt(s.proba)||0;
    var pct = totalProb>0?(prob/totalProb):(1/segs.length);
    var angle = pct*360; if(angle<=0) return;
    var endAngle = startAngle+angle;
    var midAngle = (startAngle+endAngle)/2;
    var rad1=startAngle*Math.PI/180, rad2=endAngle*Math.PI/180;
    var x1=cx+r*Math.cos(rad1), y1=cy+r*Math.sin(rad1);
    var x2=cx+r*Math.cos(rad2), y2=cy+r*Math.sin(rad2);
    var largeArc=angle>180?1:0;
    var color=s.color||'#7C3AED';
    var opacity=s.perdant?'0.55':'1';
    html += '<path d="M '+cx+' '+cy+' L '+x1.toFixed(2)+' '+y1.toFixed(2)+' A '+r+' '+r+' 0 '+largeArc+' 1 '+x2.toFixed(2)+' '+y2.toFixed(2)+' Z" fill="'+color+'" stroke="#fff" stroke-width="2" opacity="'+opacity+'"/>';
    if(angle>15){
      var lblR=r*0.62;
      var midRad=midAngle*Math.PI/180;
      var tx=cx+lblR*Math.cos(midRad), ty=cy+lblR*Math.sin(midRad);
      var maxChars=angle>45?12:angle>25?8:5;
      var rawLabel=s.label||('Seg '+(i+1));
      var label=rawLabel.length>maxChars?rawLabel.slice(0,maxChars-1)+'\u2026':rawLabel;
      var fontSize=segs.length>10?7:segs.length>6?8:9;
      html += '<text x="'+tx.toFixed(1)+'" y="'+ty.toFixed(1)+'" fill="#fff" font-size="'+fontSize+'" font-weight="900" text-anchor="middle" dominant-baseline="middle" style="paint-order:stroke;stroke:rgba(0,0,0,.4);stroke-width:3px;font-family:Arial,sans-serif">'+esc(label)+'</text>';
    }
    startAngle=endAngle;
  });
  html += '<circle cx="'+cx+'" cy="'+cy+'" r="14" fill="#fff" stroke="#0F172A" stroke-width="2.5"/></svg></div>';
  html += '<button class="spin-btn" onclick="doSpin()">'+(state.spin.spinning?'…':'TOURNER')+'</button>';
  html += '<div class="spin-result">'+esc(state.spin.result||'')+'</div>';
  html += '</div>';
  return html;
}
function _spinWheelSVG(segments){
  if(!segments || segments.length===0){
    return '<div style="background:var(--sa-subtle);border:1.5px dashed var(--sa-border);border-radius:50%;width:240px;height:240px;display:flex;align-items:center;justify-content:center;flex-direction:column;color:var(--sa-muted);margin:0 auto"><div style="font-size:36px;margin-bottom:8px">🎡</div><div style="font-size:11px;text-align:center;padding:0 20px">Aucun segment<br>à afficher</div></div>';
  }
  var totalProb=segments.reduce(function(s,seg){return s+(parseInt(seg.proba)||0);},0);
  var size=240, cx=size/2, cy=size/2, r=size/2-4;
  var paths='', labels='', startAngle=-90;
  segments.forEach(function(seg,i){
    var prob=parseInt(seg.proba)||0;
    var pct=totalProb>0?(prob/totalProb):(1/segments.length);
    var angle=pct*360; if(angle<=0) return;
    var endAngle=startAngle+angle;
    var midAngle=(startAngle+endAngle)/2;
    var rad1=startAngle*Math.PI/180, rad2=endAngle*Math.PI/180;
    var x1=cx+r*Math.cos(rad1), y1=cy+r*Math.sin(rad1);
    var x2=cx+r*Math.cos(rad2), y2=cy+r*Math.sin(rad2);
    var largeArc=angle>180?1:0;
    var color=seg.color||'#D4537E';
    var perdantStyle=seg.perdant?';opacity:.55':'';
    paths+='<path d="M '+cx+' '+cy+' L '+x1.toFixed(2)+' '+y1.toFixed(2)+' A '+r+' '+r+' 0 '+largeArc+' 1 '+x2.toFixed(2)+' '+y2.toFixed(2)+' Z" fill="'+color+'" stroke="#fff" stroke-width="2" style="'+perdantStyle+'"/>';
    if(angle>18){
      var lblRad=midAngle*Math.PI/180, lblR=r*0.62;
      var lx=cx+lblR*Math.cos(lblRad), ly=cy+lblR*Math.sin(lblRad);
      var maxChars=angle>50?13:angle>28?9:6;
      var rawLabel=(seg.label||'Seg '+(i+1));
      var lblText=rawLabel.length>maxChars?rawLabel.slice(0,maxChars-1)+'\u2026':rawLabel;
      var fz=segments.length>10?8:segments.length>6?9:11;
      // Texte horizontal — lisible dans tous les sens, contour noir pour lisibilité
      labels+='<text x="'+lx.toFixed(1)+'" y="'+ly.toFixed(1)+'" fill="#fff" font-size="'+fz+'" font-weight="900" text-anchor="middle" dominant-baseline="middle" style="paint-order:stroke;stroke:rgba(0,0,0,.45);stroke-width:3.5px;font-family:Arial,sans-serif">'+lblText+'</text>';
      if(prob>0 && angle>35) labels+='<text x="'+lx.toFixed(1)+'" y="'+(ly+fz+2).toFixed(1)+'" fill="rgba(255,255,255,.85)" font-size="'+(fz-2)+'" font-weight="700" text-anchor="middle" dominant-baseline="middle" style="font-family:Arial,sans-serif">'+(pct*100).toFixed(0)+'%</text>';
    }
    startAngle=endAngle;
  });
  return '<div style="position:relative;width:'+size+'px;height:'+size+'px;margin:0 auto">'
    +'<div style="position:absolute;top:-6px;left:50%;transform:translateX(-50%);width:0;height:0;border-left:10px solid transparent;border-right:10px solid transparent;border-top:18px solid #1F2937;z-index:2"></div>'
    +'<svg width="'+size+'" height="'+size+'" viewBox="0 0 '+size+' '+size+'" style="display:block;border-radius:50%;box-shadow:0 8px 24px rgba(0,0,0,.15)">'
      +'<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="#fff" stroke="#1F2937" stroke-width="3"/>'
      +paths
      +'<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="none" stroke="#1F2937" stroke-width="3"/>'
      +labels
      +'<circle cx="'+cx+'" cy="'+cy+'" r="14" fill="#1F2937"/>'
      +'<circle cx="'+cx+'" cy="'+cy+'" r="6" fill="#fff"/>'
    +'</svg>'
  +'</div>';
}
function doSpin(){
  if(state.spin.spinning) return;
  // Récupère les mêmes segments que renderPreviewSpin
  let segs = null;
  if(state.wiz && state.wiz.draft && state.wiz.draft.cfg && Array.isArray(state.wiz.draft.cfg.spinSegments)) segs = state.wiz.draft.cfg.spinSegments;
  if(!segs || !segs.length){
    const jeuSpin = DATA.jeux.find(j => j.id === 'jeu-spin');
    if(jeuSpin && jeuSpin.configDefault && Array.isArray(jeuSpin.configDefault.segments)){
      segs = jeuSpin.configDefault.segments;
    }
  }
  if(!segs || !segs.length) return;
  const total = segs.reduce((s,x)=>s+x.proba,0);
  let rnd = Math.random()*total, idx = 0;
  for(let i=0;i<segs.length;i++){ rnd -= segs[i].proba; if(rnd<=0){idx=i;break;} }
  const slice = 360/segs.length;
  const target = 360*5 + (360 - (idx*slice + slice/2));
  state.spin.rotation = target; state.spin.spinning = true; state.spin.result = '';
  renderModal(); renderDrawer();
  setTimeout(()=>{
    state.spin.spinning = false;
    state.spin.result = segs[idx].perdant ? '😔 '+segs[idx].label : '🎉 '+segs[idx].label;
    renderModal(); renderDrawer();
  },4100);
}

function exportBtobCSV(){
  var prospects = DATA.joueurs.filter(function(j){ return j.tags && j.tags.indexOf('btob') > -1; });
  var cols = ['Code Ticket','Enseigne','Prenom','Nom','Email','Tel','Ville','Type Pro','Lot Gagne','Decouvert via','Date','Optin'];
  var rows = prospects.map(function(j){
    var typePro = (j.tags||[]).filter(function(t){ return t && t !== 'btob'; })[0] || '';
    var decouverte = (j.tags||[]).filter(function(t){ return t && t !== 'btob' && t !== typePro; })[0] || '';
    return [j.ticket_code||'',j.enseigne||'',j.prenom||'',j.nom||'',j.email||'',j.tel||'',j.ville||'',typePro,j.lot_gagne||'',decouverte,j.firstSeen||'',j.optin?'Oui':'Non'];
  });
  var csv = [cols].concat(rows).map(function(r){ return r.join(';'); }).join('\n');
  var blob = new Blob([csv], {type:'text/csv'});
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'prospects_btob_flowin.csv';
  a.click();
}

  var ld = (DATA.landings||[]).find(function(l){ return l.id === ldId; });
  if(!ld || !ld.hero) return;
  ld.hero.questions[idx] = val;
  saveData();
}

function lpToggleTunnel(ldId, stepId){
  var ld = (DATA.landings||[]).find(function(l){ return l.id === ldId; });
  if(!ld || !ld.tunnel) return;
  var t = ld.tunnel.find(function(x){ return x.id === stepId; });
  if(t) t.active = !t.active;
  saveData(); renderModal();
}

function lpSetProfil(ldId, profId, field, val){
  var ld = (DATA.landings||[]).find(function(l){ return l.id === ldId; });
  if(!ld || !ld.profils) return;
  var p = ld.profils.find(function(x){ return x.id === profId; });
  if(p) p[field] = val;
  saveData();
}

function lpSave(ldId){
  var ld = (DATA.landings||[]).find(function(l){ return l.id === ldId; });
  if(!ld) return;
  saveData(); render(); closeModal();
  toast('Landing sauvegardée', 'success');
}

function renderLandingPage(){
  if(state.mode === 'pro') return '<div class="page"><div class="empty-block"><div class="ico">🔒</div><div class="t">Accès SA uniquement</div></div></div>';
  var list = (DATA.landings || []).slice();
  var viewMode = state.landingsViewMode || 'kanban';
  var search = (state.search && state.search.landings) ? state.search.landings.toLowerCase() : '';
  if(search) list = list.filter(function(l){ return l.nom.toLowerCase().indexOf(search) > -1; });

  var html = '<div class="page">';
  html += '<div class="page-header">'
       + '<div><div class="page-title">🌐 Landing Pages</div><div class="page-subtitle">' + list.length + ' landing' + (list.length > 1 ? 's' : '') + ' · Prospection B2B</div></div>'
       + '<div class="page-actions">'
       + '<div class="flex gap-2" style="border:1px solid var(--sa-border);border-radius:8px;padding:3px;background:#fff">'
       +   '<button class="btn btn-sm ' + (viewMode === 'kanban' ? 'btn-primary' : 'btn-ghost') + '" onclick="state.landingsViewMode=\'kanban\';render()">▦ Kanban</button>'
       +   '<button class="btn btn-sm ' + (viewMode === 'table' ? 'btn-primary' : 'btn-ghost') + '" onclick="state.landingsViewMode=\'table\';render()">≡ Tableau</button>'
       + '</div>'
       + '<button class="btn btn-primary" onclick="newLanding()">+ Nouvelle landing</button>'
       + '</div></div>';

  html += '<div class="filter-bar">'
       + '<div class="filter-search"><input placeholder="Rechercher une landing…" oninput="if(!state.search)state.search={};state.search.landings=this.value;render()" value="' + esc(search) + '"/></div>'
       + '</div>';

  if(viewMode === 'kanban'){
    html += renderLandingsKanban(list);
  } else {
    html += renderLandingsTable(list);
  }

  html += '</div>';
  return html;

function renderLandingsKanban(list){
  var brouillon = list.filter(function(l){ return l.statut === 'brouillon'; });
  var active    = list.filter(function(l){ return l.statut === 'active'; });
  var archivee  = list.filter(function(l){ return l.statut === 'archivee'; });

  var html = '<div class="kanban">';
  html += renderLandingsKanbanCol('brouillon', '📝 Brouillons', brouillon, '#94A3B8', '#F1F5F9');
  html += renderLandingsKanbanCol('active',    '🟢 Actives',    active,    '#10B981', '#ECFDF5');
  html += renderLandingsKanbanCol('archivee',  '📁 Archivées',  archivee,  '#6B7280', '#F9FAFB');
  html += '</div>';
  return html;
}

function renderLandingsKanbanCol(key, title, list, accent, bg){
  var html = '<div class="kb-col">';
  html += '<div class="kb-col-h" style="background:' + bg + ';border-color:' + accent + '33"><div class="kb-col-title" style="color:' + accent + '">' + title + '</div><span class="kb-col-count">' + list.length + '</span></div>';
  html += '<div class="kb-col-body">';

    html += '<div class="kb-empty">Aucune landing</div>';

    list.forEach(function(ld){ html += renderLandingKanbanCard(ld); });

  html += '</div></div>';

         + '<input type="color" value="' + esc(ld.accentColor||'#3B5CC4') + '" onchange="lpSetField(\'' + esc(ldId) + '\',\'accentColor\',this.value)" style="width:44px;height:36px;border:1px solid var(--sa-border);border-radius:8px;cursor:pointer;padding:2px"/>'
         + '<input class="inp" style="flex:1" value="' + esc(ld.accentColor||'#3B5CC4') + '" oninput="lpSetField(\'' + esc(ldId) + '\',\'accentColor\',this.value)"/>'
         + '</div></div>';
    html += '<div style="padding-top:6px;border-top:1px solid var(--sa-border)">'
         + '<button class="btn btn-danger btn-sm" onclick="lpDelete(\'' + esc(ldId) + '\')">🗑 Supprimer cette landing</button>'
         + '</div>';
    html += '</div>';
  }

  // ── TAB APERÇU — navigation page par page
  else if(tab === 'apercu'){
    var accent   = ld.accentColor || '#3B5CC4';
    var hero2    = ld.hero   || {};
    var proof2   = ld.proof  || {};
    var qs3      = hero2.questions || [];
    var profils2 = ld.profils || [];
    var tunnel2  = (ld.tunnel||[]).filter(function(t){ return t.active; }).sort(function(a,b){ return a.ordre-b.ordre; });
    var modInfo  = DATA.modules[ld.moduleJeu] || {emoji:'🎮',label:ld.moduleJeu||'spin'};

    // Pages de la landing dans l'ordre de navigation
    // Page index stocké dans state.modal.apercuPage
    if(typeof state.modal.apercuPage === 'undefined') state.modal.apercuPage = 0;
    var page = state.modal.apercuPage || 0;

    // Construire les pages dynamiquement selon tunnel actif
    var PAGES = [];
    PAGES.push({id:'hero', lbl:'Accueil'});
    tunnel2.forEach(function(t){ PAGES.push({id:t.id, lbl:t.lbl}); });
    PAGES.push({id:'confirmation', lbl:'Confirmation'});

    if(page >= PAGES.length) page = 0;
    if(page < 0) page = PAGES.length - 1;
    var curPage = PAGES[page];

    // Phone frame wrapper
    var phone = '<div style="max-width:340px;margin:0 auto;border:2px solid var(--sa-border);border-radius:24px;overflow:hidden;background:#0f0e1a;font-family:-apple-system,BlinkMacSystemFont,sans-serif;min-height:520px">';

    // Topbar navigation pages
    phone += '<div style="background:#1a1730;padding:10px 14px;display:flex;align-items:center;gap:6px;flex-wrap:wrap;border-bottom:1px solid rgba(255,255,255,.1)">';
    PAGES.forEach(function(p, i){
      var isActive = i === page;
      phone += '<div style="display:flex;align-items:center;gap:3px">';
      phone += '<div style="width:20px;height:20px;border-radius:50%;background:' + (isActive ? esc(accent) : 'rgba(255,255,255,.15)') + ';color:' + (isActive ? '#fff' : 'rgba(255,255,255,.5)') + ';font-size:9px;font-weight:800;display:flex;align-items:center;justify-content:center">' + (i+1) + '</div>';
      if(isActive) phone += '<span style="font-size:10px;color:rgba(255,255,255,.9);font-weight:700">' + esc(p.lbl) + '</span>';
      phone += '</div>';
      if(i < PAGES.length - 1) phone += '<div style="color:rgba(255,255,255,.2);font-size:9px">›</div>';
    });
    phone += '</div>';

    // Contenu de la page courante
    phone += '<div style="padding:24px 18px;min-height:420px">';

    // ── PAGE HERO — avec sélection profil + ambiance dynamique
    if(curPage.id === 'hero'){
      var selProfId = state.modal.apercuProfil || '';
      var selProf   = profils2.find(function(p){ return p.id === selProfId; }) || null;
      var heroAccent = selProf ? (selProf.couleur || accent) : accent;
      var heroAnswer = selProf ? selProf.apres : (hero2.answer || 'La solution tient en un clic.');
      var heroCta    = selProf ? ('Je veux voir comment ça marche pour ' + selProf.lbl.split(' /')[0].trim() + ' →') : (hero2.cta || 'Je veux essayer  →');

      // Header avec gradient adapté au profil sélectionné
      var bgGrad = selProf
        ? 'linear-gradient(160deg,' + esc(heroAccent) + '33,#0f0e1a 60%)'
        : 'linear-gradient(160deg,#1a1730,#0f0e1a)';

      phone = phone.replace('background:#0f0e1a;font-family', 'background:' + esc(bgGrad.replace(/,/g,'\u002c')) + ';transition:background .4s;font-family');

      // Logo + profil actif
      phone += '<div style="text-align:center;margin-bottom:16px">';
      phone += '<div style="font-size:22px;font-weight:900;color:#fff;letter-spacing:-1px">Flowin</div>';
      if(selProf){
        phone += '<div style="margin-top:6px;display:inline-flex;align-items:center;gap:6px;background:' + esc(heroAccent) + '33;border:1px solid ' + esc(heroAccent) + '66;border-radius:20px;padding:4px 12px">'
               + '<span style="font-size:16px">' + esc(selProf.ico) + '</span>'
               + '<span style="font-size:11px;font-weight:700;color:#fff">' + esc(selProf.lbl) + '</span>'
               + '<button onclick="state.modal.apercuProfil=\'\';renderModal()" style="background:none;border:none;color:rgba(255,255,255,.6);font-size:14px;cursor:pointer;padding:0 0 0 4px;line-height:1">×</button>'
               + '</div>';
      }
      phone += '</div>';

      // Questions hero
      var anyQ = qs3.filter(function(q){ return q && q.trim(); });
      if(anyQ.length){
        anyQ.forEach(function(q,i){
          phone += '<div style="font-size:12px;color:rgba(255,255,255,.78);padding:7px 0;border-bottom:1px solid rgba(255,255,255,.08);display:flex;gap:8px;align-items:flex-start">'
               + '<span style="background:' + esc(heroAccent) + ';color:#fff;border-radius:50%;min-width:18px;height:18px;font-size:9px;font-weight:800;display:flex;align-items:center;justify-content:center">' + (i+1) + '</span>'
               + esc(q) + '</div>';
        });
      } else {
        phone += '<div style="border:1px dashed rgba(255,255,255,.2);border-radius:10px;padding:14px;text-align:center;color:rgba(255,255,255,.35);font-size:11px;margin-bottom:12px">Questions hero non configurées<br><span style="font-size:10px">→ Onglet Textes</span></div>';
      }

      // Réponse dynamique
      phone += '<div style="margin-top:14px;font-size:14px;font-weight:800;color:#fff;text-align:center;line-height:1.3;min-height:40px">' + esc(heroAnswer) + '</div>';

      // CTA dynamique
      phone += '<button style="margin-top:14px;width:100%;background:' + esc(heroAccent) + ';color:#fff;border:none;border-radius:12px;padding:13px;font-weight:800;font-size:13px">' + esc(heroCta) + '</button>';

      // Stats preuve
      if(proof2.stat1){
        phone += '<div style="margin-top:14px;display:flex;gap:20px;justify-content:center;padding-top:12px;border-top:1px solid rgba(255,255,255,.08)">';
        phone += '<div style="text-align:center"><div style="font-size:20px;font-weight:900;color:#fff">' + esc(proof2.stat1) + '</div><div style="font-size:9px;color:rgba(255,255,255,.45)">' + esc(proof2.stat1Lbl||'') + '</div></div>';
        phone += '<div style="text-align:center"><div style="font-size:20px;font-weight:900;color:#fff">' + esc(proof2.stat2||'') + '</div><div style="font-size:9px;color:rgba(255,255,255,.45)">' + esc(proof2.stat2Lbl||'') + '</div></div>';
        phone += '</div>';
      }

      // Sélecteur profils "Vous êtes…"
      phone += '<div style="margin-top:16px;padding-top:12px;border-top:1px solid rgba(255,255,255,.1)">';
      phone += '<div style="font-size:9px;font-weight:700;color:rgba(255,255,255,.4);letter-spacing:1px;margin-bottom:8px;text-align:center">VOUS ÊTES…</div>';
      phone += '<div style="display:flex;flex-wrap:wrap;gap:5px;justify-content:center">';
      profils2.forEach(function(p){
        var isSelected = selProfId === p.id;
        var pColor = p.couleur || accent;
        phone += '<button data-pid="' + esc(p.id) + '" onclick="state.modal.apercuProfil=this.dataset.pid;renderModal()" '
               + 'style="background:' + (isSelected ? esc(pColor) : 'rgba(255,255,255,.08)') + ';'
               + 'color:' + (isSelected ? '#fff' : 'rgba(255,255,255,.7)') + ';'
               + 'border:1px solid ' + (isSelected ? esc(pColor) : 'rgba(255,255,255,.12)') + ';'
               + 'border-radius:20px;padding:5px 10px;font-size:11px;font-weight:' + (isSelected ? '800' : '600') + ';cursor:pointer;'
               + 'transform:' + (isSelected ? 'scale(1.05)' : 'scale(1)') + ';'
               + 'box-shadow:' + (isSelected ? '0 2px 8px ' + esc(pColor) + '66' : 'none') + '">'
               + esc(p.ico) + ' ' + esc(p.lbl.split(' /')[0].trim()) + '</button>';
      });
      phone += '</div>';

      // Si profil sélectionné : micro-panel "Avant / Après"
      if(selProf){
        phone += '<div style="margin-top:10px;background:' + esc(selProf.couleur||accent) + '22;border:1px solid ' + esc(selProf.couleur||accent) + '55;border-radius:12px;padding:10px 12px">';
        phone += '<div style="font-size:10px;font-weight:700;color:rgba(255,255,255,.5);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px">Avant Flowin</div>';
        phone += '<div style="font-size:11px;color:rgba(255,255,255,.65);line-height:1.5;margin-bottom:8px;font-style:italic">"' + esc(selProf.avant) + '"</div>';
        phone += '<div style="font-size:10px;font-weight:700;color:' + esc(selProf.couleur||accent) + ';margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px">Avec Flowin</div>';
        phone += '<div style="font-size:11px;color:#fff;line-height:1.5;font-weight:600">' + esc(selProf.apres) + '</div>';
        phone += '</div>';
      }

      phone += '</div>'; // fin sélecteur profils
    }

    // ── PAGE PRÉSENTATION (tunnel step 1)
    else if(curPage.id === 'presentation'){
      phone += '<div style="text-align:center;margin-bottom:18px"><div style="font-size:28px">🎯</div><div style="font-size:16px;font-weight:900;color:#fff;margin-top:6px">Comment ça marche ?</div></div>';
      phone += '<div style="display:flex;flex-direction:column;gap:10px">';
      var steps = [
        {n:'1',ico:'📱',t:'Un QR code',d:'Votre client scanne le QR code sur place — en quelques secondes.'},
        {n:'2',ico:'🎮',t:'Un jeu',d:'Il joue à ' + esc(modInfo.label||'Spin') + ' — immersif, rapide, gratuit.'},
        {n:'3',ico:'📝',t:'Ses coordonnées',d:'Il laisse son email et son accord pour être recontacté.'},
        {n:'4',ico:'🏆',t:'Un lot à gagner',d:'Il entre dans le tirage — et vous avez son contact qualifié.'}
      ];
      steps.forEach(function(s){
        phone += '<div style="display:flex;gap:10px;align-items:flex-start;background:rgba(255,255,255,.06);border-radius:10px;padding:10px 12px">'
             + '<div style="font-size:20px;min-width:28px">' + s.ico + '</div>'
             + '<div><div style="font-size:12px;font-weight:800;color:#fff;margin-bottom:2px">' + s.t + '</div>'
             + '<div style="font-size:11px;color:rgba(255,255,255,.55);line-height:1.4">' + s.d + '</div></div>'
             + '</div>';
      });
      phone += '</div>';
    }

    // ── PAGE EXEMPLE (tunnel step 2)
    else if(curPage.id === 'exemple'){
      phone += '<div style="text-align:center;margin-bottom:16px"><div style="font-size:28px">📍</div><div style="font-size:16px;font-weight:900;color:#fff;margin-top:6px">Un exemple concret</div></div>';
      if(proof2.quote){
        phone += '<div style="background:rgba(255,255,255,.06);border-left:3px solid ' + esc(accent) + ';border-radius:0 10px 10px 0;padding:12px 14px;margin-bottom:14px">';
        phone += '<div style="font-size:11px;color:rgba(255,255,255,.65);font-style:italic;line-height:1.6">"' + esc(proof2.quote) + '"</div>';
        phone += '</div>';
      } else {
        phone += '<div style="border:1px dashed rgba(255,255,255,.2);border-radius:10px;padding:14px;text-align:center;color:rgba(255,255,255,.35);font-size:11px;margin-bottom:14px">Citation client non configurée<br><span style="font-size:10px">→ Onglet Textes</span></div>';
      }
      phone += '<div style="display:flex;gap:12px;justify-content:center;margin-bottom:14px">';
      if(proof2.stat1) phone += '<div style="text-align:center;background:rgba(255,255,255,.06);border-radius:10px;padding:10px 16px"><div style="font-size:22px;font-weight:900;color:#fff">' + esc(proof2.stat1) + '</div><div style="font-size:9px;color:rgba(255,255,255,.45)">' + esc(proof2.stat1Lbl||'') + '</div></div>';
      if(proof2.stat2) phone += '<div style="text-align:center;background:rgba(255,255,255,.06);border-radius:10px;padding:10px 16px"><div style="font-size:22px;font-weight:900;color:#fff">' + esc(proof2.stat2) + '</div><div style="font-size:9px;color:rgba(255,255,255,.45)">' + esc(proof2.stat2Lbl||'') + '</div></div>';
      phone += '</div>';
      // Profils aperçu
      if(profils2.length){
        phone += '<div style="font-size:10px;font-weight:700;color:rgba(255,255,255,.4);letter-spacing:.5px;margin-bottom:8px">VOUS ÊTES…</div>';
        phone += '<div style="display:flex;flex-wrap:wrap;gap:5px">';
        profils2.slice(0,4).forEach(function(p){
          phone += '<div style="background:rgba(255,255,255,.08);border-radius:8px;padding:5px 10px;font-size:11px;color:rgba(255,255,255,.8)">' + esc(p.ico) + ' ' + esc(p.lbl) + '</div>';
        });
        phone += '</div>';
      }
    }

    // ── PAGE JEU (tunnel step 3)
    else if(curPage.id === 'jeu'){
      phone += '<div style="text-align:center;margin-bottom:18px"><div style="font-size:36px">' + modInfo.emoji + '</div><div style="font-size:16px;font-weight:900;color:#fff;margin-top:6px">' + esc(modInfo.label) + '</div><div style="font-size:11px;color:rgba(255,255,255,.45);margin-top:4px">Jouez et tentez de gagner</div></div>';
      if(ld.moduleJeu === 'spin'){
        // Roue stylisée simplifiée
        phone += '<div style="width:160px;height:160px;border-radius:50%;background:conic-gradient(' + esc(accent) + ' 0deg 60deg,#2D3748 60deg 120deg,' + esc(accent) + '99 120deg 180deg,#2D3748 180deg 240deg,' + esc(accent) + 'cc 240deg 300deg,#2D3748 300deg 360deg);margin:0 auto 16px;border:4px solid rgba(255,255,255,.15);box-shadow:0 0 30px ' + esc(accent) + '44"></div>';
        phone += '<button style="width:100%;background:' + esc(accent) + ';color:#fff;border:none;border-radius:12px;padding:13px;font-weight:800;font-size:14px">🎡 Lancer la roue</button>';
      } else if(ld.moduleJeu === 'quiz'){
        phone += '<div style="background:rgba(255,255,255,.06);border-radius:12px;padding:14px;margin-bottom:12px"><div style="font-size:12px;font-weight:700;color:#fff;margin-bottom:10px">Question 1 / 5</div>';
        phone += '<div style="display:flex;flex-direction:column;gap:6px">';
        ['Réponse A','Réponse B','Réponse C','Réponse D'].forEach(function(r){
          phone += '<div style="background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);border-radius:8px;padding:9px 12px;font-size:12px;color:rgba(255,255,255,.8);cursor:pointer">' + r + '</div>';
        });
        phone += '</div></div>';
      } else if(ld.moduleJeu === 'tombola'){
        phone += '<div style="text-align:center;padding:20px 0"><div style="font-size:48px">🎁</div><div style="font-size:13px;color:rgba(255,255,255,.6);margin-top:10px">Remplissez le formulaire<br>pour participer au tirage</div></div>';
      }
    }

    // ── PAGE CAPTURE (formulaire CRM)
    else if(curPage.id === 'capture'){
      phone += '<div style="text-align:center;margin-bottom:18px"><div style="font-size:28px">📝</div><div style="font-size:15px;font-weight:900;color:#fff;margin-top:6px">Vos coordonnées</div><div style="font-size:11px;color:rgba(255,255,255,.45);margin-top:4px">Pour recevoir votre résultat</div></div>';
      phone += '<div style="display:flex;flex-direction:column;gap:8px;margin-bottom:14px">';
      ['Prénom', 'Nom', 'Email', 'Téléphone (optionnel)'].forEach(function(f){
        phone += '<div style="background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:10px;padding:11px 14px;font-size:12px;color:rgba(255,255,255,.4)">' + f + '</div>';
      });
      phone += '</div>';
      phone += '<div style="display:flex;gap:8px;align-items:flex-start;padding:10px;background:rgba(255,255,255,.04);border-radius:8px;margin-bottom:14px">'
           + '<div style="width:16px;height:16px;border:1px solid ' + esc(accent) + ';border-radius:4px;min-width:16px;margin-top:1px"></div>'
           + '<div style="font-size:10px;color:rgba(255,255,255,.5);line-height:1.5">J&rsquo;accepte d&rsquo;etre recontacte par email ou telephone. Donnees protegees, non revendues.</div>'
           + '</div>';
      phone += '<button style="width:100%;background:' + esc(accent) + ';color:#fff;border:none;border-radius:12px;padding:13px;font-weight:800;font-size:14px">Valider et participer 🎲</button>';
    }

    // ── PAGE CONFIRMATION
    else if(curPage.id === 'confirmation'){
      phone += '<div style="text-align:center;padding:20px 0">';
      phone += '<div style="font-size:48px;margin-bottom:12px">🎉</div>';
      phone += '<div style="font-size:18px;font-weight:900;color:#fff;margin-bottom:8px">Vous êtes inscrit !</div>';
      phone += '<div style="font-size:12px;color:rgba(255,255,255,.55);line-height:1.6;margin-bottom:20px">Votre participation est enregistree.<br>Le tirage aura lieu à la fin de l&rsquo;événement.</div>';
      if(ld.waNumber && ld.waNumber !== '33XXXXXXXXX'){
        phone += '<a style="display:block;width:100%;background:#25D366;color:#fff;border:none;border-radius:12px;padding:13px;font-weight:800;font-size:14px;text-align:center;text-decoration:none;box-sizing:border-box" href="https://wa.me/' + esc(ld.waNumber) + '">💬 Nous contacter sur WhatsApp</a>';
      } else {
        phone += '<div style="border:1px dashed rgba(255,255,255,.2);border-radius:10px;padding:12px;text-align:center;color:rgba(255,255,255,.35);font-size:11px">Bouton WhatsApp non configuré<br><span style="font-size:10px">→ Onglet Config</span></div>';
      }
      phone += '<div style="margin-top:16px;font-size:11px;color:rgba(255,255,255,.3)">Propulsé par Flowin</div>';
      phone += '</div>';
    }

    phone += '</div>'; // fin padding content
    phone += '</div>'; // fin phone frame

    // Navigation prev/next
    var navHtml = '<div style="display:flex;align-items:center;justify-content:space-between;max-width:340px;margin:12px auto 0">';
    navHtml += (page > 0
      ? '<button class="btn btn-sm" onclick="state.modal.apercuPage=' + (page-1) + ';renderModal()">← ' + esc(PAGES[page-1].lbl) + '</button>'
      : '<div></div>');
    navHtml += '<div style="font-size:11px;color:var(--sa-muted)">' + (page+1) + ' / ' + PAGES.length + '</div>';
    navHtml += (page < PAGES.length-1
      ? '<button class="btn btn-sm btn-primary" onclick="state.modal.apercuPage=' + (page+1) + ';renderModal()">' + esc(PAGES[page+1].lbl) + ' →</button>'
      : '<button class="btn btn-sm btn-primary" onclick="lpPublish(this.getAttribute(\'data-id\'));closeModal()" data-id="' + esc(ldId) + '">🟢 Publier</button>');
    navHtml += '</div>';

    html += '<div style="font-size:11px;color:var(--sa-muted);margin-bottom:12px;background:#FEF9C3;border:1px solid #FDE68A;border-radius:8px;padding:8px 12px">⚠️ Prévisualisation interne — page ' + (page+1) + ' sur ' + PAGES.length + '</div>';
    html += phone;
    html += navHtml;
    if(ld.deployUrl){
      html += '<div style="text-align:center;margin-top:10px"><a href="' + esc(ld.deployUrl) + '" target="_blank" class="btn btn-sm">↗ Voir en ligne</a></div>';
    }
  }
  // Footer save (hors aperçu)
  if(tab !== 'apercu'){
    html += '<div style="display:flex;justify-content:flex-end;gap:8px;margin-top:16px;padding-top:12px;border-top:1px solid var(--sa-border)">';
    html += '<button class="btn" onclick="closeModal()">Fermer</button>';
    html += '<button class="btn btn-primary" onclick="lpSave(\'' + esc(ldId) + '\')">&#128190; Sauvegarder</button>';
    html += '</div>';
  }

  return wrapHtml + html + '</div></div>';
}

function landingPublish(){ if(DATA.landings && DATA.landings[0]) lpPublish(DATA.landings[0].id); }
function landingUnpublish(){ if(DATA.landings && DATA.landings[0]) lpUnpublish(DATA.landings[0].id); }


function renderRapports(){
  const templates = [
    {id:'synthese',ico:'📊',nom:'Synthèse mensuelle',desc:'Vue d\'ensemble : events, participants, opt-in, gagnants pour le mois choisi',cat:'Marketing'},
    {id:'tunnel',ico:'🎯',nom:'Tunnel de conversion',desc:'Scans → démarrages → soumissions → opt-in (par event ou global)',cat:'Performance'},
    {id:'roi-partenaires',ico:'🤝',nom:'ROI partenaires',desc:'Valeur fournie par partenaire vs visibilité obtenue',cat:'Commercial'},
    {id:'lots-non-retires',ico:'🎁',nom:'Lots non retirés',desc:'Liste des gagnants n\'ayant pas encore récupéré leur lot',cat:'Opérations'},
    {id:'geo',ico:'🗺',nom:'Géo joueurs',desc:'Répartition CRM par ville/CP, top zones',cat:'Marketing'},
    {id:'optin',ico:'📧',nom:'Liste opt-in',desc:'Export ciblé pour campagne email (filtres date/event)',cat:'Marketing'}
  ];
  let html = '<div class="page">';
  html += '<div class="page-header"><div><div class="page-title">📊 Rapports</div><div class="page-subtitle">6 modèles prêts à exporter · PDF, CSV, XLSX</div></div></div>';
  html += '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:14px">';
  templates.forEach(t => {
    html += '<div class="list-card" onclick="openModal(\'rapport\',{tpl:\''+t.id+'\'})">'

function startWizardCreate(proId){
  state.wiz = {step:'A',mode:'create',editingId:null,draft:initWizDraft()};

  state.view = 'wizard-event';

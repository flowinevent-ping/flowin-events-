function startWizardEdit(eventId,startStep){
  const e = findEvent(eventId); if(!e) return;
  // Merge manuel sans Object.assign (compat iOS Safari — règle impérative)
  var baseDraft = initWizDraft();
  var eCopy = JSON.parse(JSON.stringify(e));
  var draft = baseDraft;
  Object.keys(eCopy).forEach(function(k){ draft[k] = eCopy[k]; });
  if(!draft.cfg) draft.cfg = baseDraft.cfg;
  else { Object.keys(baseDraft.cfg).forEach(function(k){ if(draft.cfg[k]===undefined) draft.cfg[k] = baseDraft.cfg[k]; }); }
  // Charger les lots de cet event dans le draft (pour édition)
  const evLots = DATA.lots.filter(l => l.eventId === eventId);
  draft.lots = evLots.map(l => ({nom:l.nom, valeur:l.valeur||0, quantite:l.quantite||1, partenaireId:l.partenaireFournisseur||l.partenaireId||''}));
  // Garantir proVisib chargé depuis l'event (pas depuis initWizDraft vide)
  if(eCopy.proVisib) draft.proVisib = eCopy.proVisib;
  else if(!draft.proVisib) draft.proVisib = {stats:true,participants:true,lots:true,qr:true,export:true,activite:true,msgBienvenue:'',langue:'fr'};
  // Sécurité : init obligatoire des arrays/objets
  if(!Array.isArray(draft.lots)) draft.lots = [];
  if(!Array.isArray(draft.partenaires)) draft.partenaires = [];
  if(!draft.cfg) draft.cfg = {};
  if(!Array.isArray(draft.cfg.quizBanques)) draft.cfg.quizBanques = [];
  if(!Array.isArray(draft.cfg.quizCustomQuestions)) draft.cfg.quizCustomQuestions = [];
  if(!Array.isArray(draft.cfg.quizBonusList)) draft.cfg.quizBonusList = [];
  state.wiz = {step:startStep||'A',mode:'edit',editingId:eventId,draft:draft};
  state.view = 'wizard-event';
  closeDrawer(); closeModal();
  render();
}
function wizGoStep(s){ state.wiz.step = s; render(); }
function wizCancel(){
  if(state.wiz.mode==='edit') goView('events');
  else confirmDanger('Annuler la création ?','Le brouillon sera perdu.',()=>{state.wiz=initWizDraftFull();goView('events');closeModal();},'Annuler');
}
function initWizDraftFull(){ return {step:'A',mode:'create',editingId:null,draft:initWizDraft()}; }
// Helper : monter/descendre un item dans une liste du draft.cfg ou draft (.lots)
function wizMoveItem(path,index,direction){
  let arr;
  if(path==='lots') arr = state.wiz.draft.lots;
  else arr = state.wiz.draft.cfg[path];
  if(!arr) return;
  const ni = index + direction;
  if(ni<0 || ni>=arr.length) return;
  const tmp = arr[index]; arr[index] = arr[ni]; arr[ni] = tmp;
  renderWizard();
}

// Télécharger le billet en PNG via Canvas API
function ticketDownloadPNG(joueurId, lotId, eventId, idx, num){
  const j = findJoueur(joueurId), lot = DATA.lots.find(l=>l.id===lotId), e = findEvent(eventId);
  if(!j || !lot || !e) return;
  const tid = 'ticket-'+eventId+'-'+idx;
  const lotName = (document.getElementById(tid+'-lot')||{}).value || lot.nom;
  const lotVal = (document.getElementById(tid+'-val')||{}).value || (lot.valeur?'Valeur '+lot.valeur+' €':'');
  const msg = (document.getElementById(tid+'-msg')||{}).value || (e.cfg && e.cfg.tirage && e.cfg.tirage.msgGagnant) || '';
  const offertPar = (e.cfg && e.cfg.tirage && e.cfg.tirage.offertPar) || '-';
  const medals = ['🥇','🥈','🥉','🏅','🏅','🏅','🏅','🏅'];

  const W=600, H=420;
  const cv = document.createElement('canvas');
  cv.width = W; cv.height = H;
  const ctx = cv.getContext('2d');

  // Header dégradé
  const grad = ctx.createLinearGradient(0,0,W,120);
  grad.addColorStop(0, e.couleur||'#7C2D92');
  grad.addColorStop(1, '#EF9F27');
  ctx.fillStyle = grad;
  ctx.fillRect(0,0,W,140);
  // Body
  ctx.fillStyle = '#FBEAF0';
  ctx.fillRect(0,140,W,H-140);

  // Médaille
  ctx.font = '32px Arial';
  ctx.fillText(medals[idx], 24, 56);
  // Tag
  ctx.fillStyle = 'rgba(255,255,255,.8)';
  ctx.font = 'bold 11px Arial';
  ctx.fillText('FÉLICITATIONS', 70, 38);
  // Nom
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 26px Arial';
  ctx.fillText(j.nom, 70, 70);
  // Date / event
  ctx.fillStyle = 'rgba(255,255,255,.7)';
  ctx.font = '12px Arial';
  ctx.fillText(fmtFull(lot.dateAssign||e.dateD)+' · '+e.nom, 70, 92);
  // Séparateur
  ctx.strokeStyle = 'rgba(255,255,255,.25)';
  ctx.beginPath(); ctx.moveTo(24,118); ctx.lineTo(W-24,118); ctx.stroke();

  // Lot gagné
  ctx.fillStyle = '#92400E';
  ctx.font = 'bold 9px Arial';
  ctx.fillText('🎁 LOT GAGNÉ', 30, 168);
  ctx.fillStyle = e.couleur||'#7C2D92';
  ctx.font = 'bold 17px Arial';
  // Wrap si trop long
  let line = '', y = 192;
  const maxW = W-60;
  const words = lotName.split(' ');
  words.forEach(w => {
    const test = line + (line?' ':'') + w;
    if(ctx.measureText(test).width > maxW && line){
      ctx.fillText(line, 30, y);
      line = w; y += 22;
    } else { line = test; }
  });
  ctx.fillText(line, 30, y);
  if(lotVal){
    ctx.fillStyle = '#EF9F27';
    ctx.font = 'bold 12px Arial';
    ctx.fillText(lotVal, 30, y+22);
  }

  // Grid info
  const infoY = y + 56;
  ctx.fillStyle = '#888';
  ctx.font = 'bold 9px Arial';
  ctx.fillText('🏛 OFFERT PAR', 30, infoY);
  ctx.fillStyle = '#1F1B2E';
  ctx.font = 'bold 13px Arial';
  ctx.fillText(offertPar, 30, infoY+18);
  ctx.fillStyle = '#888';
  ctx.font = 'bold 9px Arial';
  ctx.fillText('🎟 N° BILLET', W/2+10, infoY);
  ctx.fillStyle = '#1F1B2E';
  ctx.font = 'bold 13px Arial';
  ctx.fillText(num, W/2+10, infoY+18);

  // Message
  if(msg){
    const msgY = infoY + 50;
    ctx.fillStyle = '#888';
    ctx.font = 'bold 9px Arial';
    ctx.fillText('✉ MESSAGE AU GAGNANT', 30, msgY);
    ctx.fillStyle = '#444';
    ctx.font = '12px Arial';
    // Wrap message
    let mline = '', my = msgY+18;
    msg.split(' ').forEach(w => {
      const test = mline + (mline?' ':'') + w;
      if(ctx.measureText(test).width > W-60 && mline){
        ctx.fillText(mline, 30, my);
        mline = w; my += 16;
      } else { mline = test; }
    });
    ctx.fillText(mline, 30, my);
  }

  // Footer
  ctx.fillStyle = 'rgba(212,83,126,.12)';
  ctx.fillRect(0, H-36, W, 36);
  ctx.fillStyle = '#1F1B2E';
  ctx.font = 'bold 13px Arial';
  ctx.fillText('Flow', 30, H-14);
  ctx.fillStyle = e.couleur||'#7C2D92';
  ctx.fillText('in', 65, H-14);
  ctx.fillStyle = '#888';
  ctx.font = '11px Arial';
  ctx.fillText(num, W-100, H-14);

  // Téléchargement
  cv.toBlob(blob => {
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'billet-'+num+'.png';
    a.click();
    toast('Billet téléchargé · '+a.download,'success');
  });
}

// Lancer un tirage (mock pour l'instant — pour les events live)
function lancerTirageJour(eventId, dateStr){
  const ev = LIB_EVENTS.find(eventId); if(!ev) return;
  if(ev.status !== 'live' && ev.status !== 'past'){
    toast('Le tirage nécessite un event en cours ou terminé','warn'); return;
  }
  if(!confirm('Lancer le tirage du '+fmt(dateStr)+' ?')) return;
  if(!ev.tiragesFaits) ev.tiragesFaits = {};
  ev.tiragesFaits[dateStr] = true;
  lancerTirage(eventId);
}
function lancerTirage(eventId){
  const ev = LIB_EVENTS.find(eventId); if(!ev) return;
  const cfg = ev.cfg || {};
  const tirageNb = cfg.tirageNbGagnants || 3;
  const regle = cfg.tirageRegle || 'tous'; // 'tous' | 'quiz' | 'quizbonus'

  // 1. Construire la liste des éligibles
  let eligibles = LIB_JOUEURS.query({eventId});
  if(regle === 'quiz')      eligibles = eligibles.filter(j => j.scoreMoy && parseFloat(j.scoreMoy)>0);
  if(regle === 'quizbonus') eligibles = eligibles.filter(j => j.optin); // double chance opt-in

  if(eligibles.length === 0) { toast('Aucun participant éligible pour ce tirage','warn'); return; }

  // 2. Lots libres pour cet event (non assignés)
  const lotsLibres = LIB_LOTS.query({eventId}).filter(l => !l.assigneA);
  if(lotsLibres.length === 0) { toast('Tous les lots sont déjà assignés','warn'); return; }

  const nbTirer = Math.min(tirageNb, eligibles.length, lotsLibres.length);

  // 3. Tirage sans remise (Fisher-Yates shuffle)
  const pool = eligibles.slice();
  for(let i=pool.length-1; i>0; i--){
    const j = Math.floor(Math.random()*(i+1));
    [pool[i],pool[j]] = [pool[j],pool[i]];
  }
  const gagnants = pool.slice(0, nbTirer);

  // 4. Assigner les lots dans l'ordre
  gagnants.forEach((j, idx) => {
    const lot = lotsLibres[idx]; if(!lot) return;
    LIB_LOTS.assign(lot.id, j.id);
  });

  // 5. Mettre à jour le compteur gagnants de l'event
  ev.gagnants = (ev.gagnants||0) + nbTirer;
  saveData();
  // 🔄 Sync Supabase : les lots assignés et joueurs gagnants
  try {
    var _evLots = DATA.lots.filter(function(l){return l.eventId===eventId && l.assigneA;});
    _evLots.forEach(function(l){ supaWriteLot(l); });
    var _winnerIds = _evLots.map(function(l){return l.assigneA;});
    var _winners = DATA.joueurs.filter(function(j){return _winnerIds.indexOf(j.id)>=0;});
    _winners.forEach(function(j){ supaWriteJoueur(j); });
    var _ev = DATA.events.find(function(e){return e.id===eventId;});
    if(_ev) supaWriteEvent(_ev);
  } catch(e){ console.warn("[sync tirage]",e); }

  toast('🎉 Tirage terminé · '+nbTirer+' gagnant'+(nbTirer>1?'s':'')+' désignés','success');
  // Re-render pour afficher les billets
  setTimeout(() => { state.drawer.tab = 'tirage'; renderDrawer(); }, 400);
}

function resetData(){
  const liveEvents = DATA.events.filter(e=>e.status==='live');
  if(liveEvents.length > 0){
    toast('⚠ Reset interdit : '+liveEvents.length+' event(s) live en cours','warn');
    return;
  }
  if(!confirm('Réinitialiser toutes les données ? Cette action est irréversible.')) return;
  localStorage.removeItem(LS_KEY);
  Object.keys(DATA).forEach(k=>delete DATA[k]);
  var _fresh = JSON.parse(JSON.stringify(SEED)); Object.keys(_fresh).forEach(function(k){ DATA[k]=_fresh[k]; });
  DATA.modules = SEED.modules;
  toast('Données réinitialisées','success');
  render();
}

function wizSave(){
  const d = state.wiz.draft;
  if(!d.nom) { toast('Le nom est obligatoire','warn'); wizGoStep('A'); return; }
  if(!d.module) { toast('Choisissez un module','warn'); wizGoStep('B'); return; }
  if(!d.dateD) { toast('Date de début requise','warn'); wizGoStep('A'); return; }
  let createdId = null;
  if(state.wiz.mode==='create'){
    const id = newId('ev');
    createdId = id;
    var _newEv = _flowinNew({id:id,status:'upcoming',participants:0,gagnants:0,joueursOptin:0,clientType:d.clientType||'btoc',
      proVisib:d.proVisib||{stats:true,participants:true,lots:true,qr:true,export:true,activite:true,msgBienvenue:''}
    }, d);
    _newEv.id = id; _newEv.status = 'upcoming'; _newEv.participants = 0; _newEv.gagnants = 0; _newEv.joueursOptin = 0;
    DATA.events.unshift(_newEv);
    // Si on vient d'un super event, on rattache automatiquement
    if(state.wiz.superEventId){
      const se = findSuperEvent(state.wiz.superEventId);
      if(se){
        if(!se.events) se.events = [];
        se.events.push(id);
      }
    }
    toast('Event "'+d.nom+'" créé','success');
    supaWriteEvent(_newEv);
    // Génération auto qrUrl
    if(_newEv.cfg) _newEv.cfg.qrUrl = 'https://flowin-events.vercel.app/parcours_user.html?ev=' + id;
  } else {
    const idx = DATA.events.findIndex(e=>e.id===state.wiz.editingId);
    if(idx>=0){
      _flowinMerge(DATA.events[idx], d);
      if(d.proVisib) DATA.events[idx].proVisib = d.proVisib;
      supaWriteEvent(DATA.events[idx]);
    }
    toast('Event "'+d.nom+'" enregistré','success');
  }
  saveData();
  // Si on est venu depuis un super event, on retourne dessus
  if(state.wiz.superEventId){
    const seId = state.wiz.superEventId;
    state.view = 'super-events';
    render();
    setTimeout(()=>openDrawerFor('superEvent',seId,'events'),100);
  } else {
    state.view='events';
    render();
  }
}

// Retourne la liste des pages à afficher selon le module et la config
function wizPreviewPages(d) {
  var m = d.module;
  var cfg = d.cfg || {};
  var couleur = d.couleur || '#7C2D92';
  var nom = d.nom || 'Mon Event';
  var partenaires = (d.partenaires||[]).map(function(pid){ return DATA.partenaires.find(function(p){return p.id===pid;}); }).filter(Boolean);
  // Lire les lots depuis DATA en priorité (données réelles), sinon depuis d.lots
  var lots = (d.id && DATA.lots) ? DATA.lots.filter(function(l){ return l.eventId===d.id; }) : (d.lots || []);
  // Pour le wizard création (pas encore d'id) → utiliser d.lots
  if(!d.id && d.lots && d.lots.length) lots = d.lots;
  // Normaliser bonusList — lire quizBonusList en fallback
  if(cfg.bonusList === undefined || cfg.bonusList.length === 0) {
    cfg.bonusList = cfg.quizBonusList || [];
  }
  var pages = [];

  // ── Page 1 : Front (commune) ──
  pages.push({
    label: '🏠 Front',
    html: wizPreviewFront(d, couleur, nom, lots, partenaires)
  });

  // ── Page 2 : Formulaire CRM (commune) ──
  pages.push({
    label: '📋 Formulaire',
    html: wizPreviewForm(d, couleur, nom, cfg)
  });

  // ── Pages module-spécifiques ──
  if(m==='quiz' || m==='quizsolo') {
    pages.push({ label: '🧠 Quiz', html: wizPreviewQuiz(d, couleur, nom, cfg) });
  }
  if(m==='vote') {
    var sections = cfg.voteSections || [];
    if(sections.length === 0) {
      pages.push({ label: '⭐ Vote', html: wizPreviewVoteEmpty(d, couleur, nom, cfg) });
    } else {
      sections.forEach(function(vs, vi) {
        pages.push({ label: '⭐ Vote '+(vi+1), html: wizPreviewVoteSection(d, couleur, nom, cfg, vs, vi) });
      });
    }
  }
  if(m==='spin') {
    pages.push({ label: '🎡 Spin', html: wizPreviewSpin(d, couleur, nom, cfg) });
  }
  if(m==='tombola') {
    pages.push({ label: '🎟 Tombola', html: wizPreviewTombola(d, couleur, nom, cfg) });
  }
  if(m==='standup') {
    pages.push({ label: '🎤 Stand-up', html: wizPreviewStandup(d, couleur, nom, cfg) });
  }

  // ── Bonus (si activé) ──
  if(cfg.bonusActif && cfg.bonusList && cfg.bonusList.length > 0) {
    pages.push({ label: '✨ Bonus', html: wizPreviewBonus(d, couleur, nom, cfg) });
  }

  // ── Partenaires (si présents) ──
  if(partenaires.length > 0) {
    pages.push({ label: '🤝 Partenaires', html: wizPreviewPartenaires(d, couleur, nom, partenaires) });
  }

  return pages;
}

// Helper debounce render — évite les sauts de scroll sur inputs number/range
var _renderWizTimer = null;
var _renderDrawerTimer = null;
function _dRW(){ // debounced renderWizard
  clearTimeout(_renderWizTimer);
  _renderWizTimer = setTimeout(function(){ renderWizard(); }, 150);
}
function _dRD(){ // debounced renderDrawer
  clearTimeout(_renderDrawerTimer);
  _renderDrawerTimer = setTimeout(function(){
    var db = document.querySelector('.drawer-body');
    var sy = db ? db.scrollTop : 0;
    renderDrawer();
    requestAnimationFrame(function(){
      var db2 = document.querySelector('.drawer-body');
      if(db2) db2.scrollTop = sy;
    });
  }, 150);
}
function renderWizard(){
  if(state.view!=='wizard-event') return;
  var vp = document.querySelector('.viewport');
  var scrollY = vp ? vp.scrollTop : 0;
  render();
  requestAnimationFrame(function(){
    var vp2 = document.querySelector('.viewport');
    if(vp2) vp2.scrollTop = scrollY;
  });
}

    if(!d.cfg.quizBonusList) d.cfg.quizBonusList = [];
    if(!d.cfg.quizCustomQuestions) d.cfg.quizCustomQuestions = [];
    const subtab = d.cfg.quizSubtab || 'banques';
    // Sous-onglets
    html += '<div class="flex gap-2 mb-3" style="flex-wrap:wrap">'
         + ['banques','questions','bonus','params'].map(s => {
              const labels = {banques:'📚 Banques',questions:'✏ Questions custom',bonus:'✨ Bonus',params:'⚙️ Paramètres'};
              return '<button class="filter-pill '+(subtab===s?'active':'')+'" onclick="state.wiz.draft.cfg.quizSubtab=\''+s+'\';renderWizard()">'+labels[s]+'</button>';
           }).join('')

      html += '<div class="alert info"><span class="ico">📚</span>Cochez les banques à utiliser. Cliquez sur la banque pour voir ses questions, ou sur ✏ pour les éditer.</div>';

        // Auto-expand si banque cochée (sauf si l'user a explicitement collapsé)
        const userToggled = state.wiz.expandedBanques.hasOwnProperty(b.id);

        html += '<div class="wiz-banque-card '+(checked?'selected':'')+'">';

        html += '<div class="wiz-banque-h">'
             + '<input type="checkbox" '+(checked?'checked':'')+' onchange="if(this.checked)state.wiz.draft.cfg.quizBanques.push(\''+b.id+'\');else state.wiz.draft.cfg.quizBanques=state.wiz.draft.cfg.quizBanques.filter(x=>x!==\''+b.id+'\');renderWizard()" onclick="event.stopPropagation()"/>'
             + '<div class="wiz-banque-info" onclick="state.wiz.expandedBanques[\''+b.id+'\']=!('+expanded+');renderWizard()">'
             +   '<div class="wiz-banque-nom">'+esc(b.nom)+'</div>'
             +   '<div class="wiz-banque-meta">'+((b.questions&&b.questions.length)||0)+' question'+(((b.questions&&b.questions.length)||0)>1?'s':'')+(b.description?' · '+esc(b.description):'')+'</div>'
             + '</div>'
             + '<button class="btn btn-sm" onclick="state.wiz.expandedBanques[\''+b.id+'\']=!('+expanded+');renderWizard()" title="'+(expanded?'Replier':'Voir les questions')+'">'+(expanded?'▾ Masquer':'▸ Voir / éditer')+'</button>'
             + '</div>';
        // Liste questions si expanded
        if(expanded){
          html += '<div class="wiz-banque-body">';

            html += '<div class="text-sm text-muted text-center" style="padding:14px;font-style:italic">Aucune question dans cette banque</div>';
          } else {

    html = '<div class="flex gap-2 mb-3" style="flex-wrap:wrap">'
         + ['config','questions','bonus'].map(function(s){

      html += renderCustomQuestionsEditor(d.cfg, 'state.wiz.draft.cfg', 'renderWizard()');

        'renderWizard()'
      );
    }
  }
  return html;
}



// ============ CUSTOM QUESTIONS EDITOR — formulaire CRM complémentaire ============
// Modèle Pâques : "Comment nous avez-vous connu ?" + RGPD + optin
// Utilisé par tous les modules sauf Vote
function renderCustomQuestionsEditor(cfg, idxPfx, rerender) {
  if(!cfg.customQuestions) cfg.customQuestions = [];
  var list = cfg.customQuestions;
  var html = '';

  html += '<div style="margin-bottom:14px">';
  html += '<div style="font-size:12px;color:var(--sa-muted);background:var(--sa-subtle);border-radius:8px;padding:10px 12px;margin-bottom:14px">';
  html += '<strong>✏ Questions custom</strong> — Affichées dans le formulaire d\'inscription, après les champs obligatoires (prénom, nom, email, genre). ';
  html += 'Les réponses enrichissent les données CRM joueurs.';
  html += '</div>';

  // RGPD + Optin (toujours présents, non supprimables)
  html += '<div class="section-h" style="margin-bottom:8px">📋 Mentions légales (toujours affichées)</div>';
  html += '<div style="background:#F0FDF4;border:1px solid #BBF7D0;border-radius:10px;padding:10px 12px;margin-bottom:14px;font-size:11px;color:#065F46">';
  html += '<div style="font-weight:700;margin-bottom:4px">☑ Mention RGPD</div>';
  html += '<div style="color:#047857;font-size:10px">« En participant, vous acceptez que vos données soient utilisées dans le cadre de cet événement conformément au RGPD. »</div>';
  html += '</div>';

  // Optin newsletter
  html += '<div style="display:flex;align-items:center;justify-content:space-between;background:#EFF6FF;border:1px solid #BFDBFE;border-radius:10px;padding:10px 12px;margin-bottom:16px">';
  html += '<div>';
  html += '<div style="font-size:12px;font-weight:700;color:#1E40AF">📧 Optin newsletter</div>';
  html += '<div style="font-size:10px;color:#3B82F6;margin-top:2px">« On vous informe pour les prochains événements ? »</div>';
  html += '</div>';
  html += '<div onclick="'+idxPfx+'.optinActif=!'+idxPfx+'.optinActif;'+rerender+'" style="width:38px;height:22px;background:'+(cfg.optinActif?'#3B82F6':'#CBD5E1')+';border-radius:100px;cursor:pointer;position:relative;flex-shrink:0">';
  html += '<div style="width:16px;height:16px;background:#fff;border-radius:50%;position:absolute;top:3px;left:'+(cfg.optinActif?'19':'3')+'px;transition:left .15s"></div>';
  html += '</div>';
  html += '</div>';

  // Questions custom libres
  html += '<div class="section-h" style="margin-bottom:8px">❓ Questions personnalisées</div>';

  if(list.length === 0) {
    html += '<div style="padding:14px;text-align:center;background:var(--sa-subtle);border-radius:10px;font-size:11px;color:var(--sa-muted);margin-bottom:10px">';
    html += 'Aucune question · cliquez « + Ajouter »</div>';
  } else {
    list.forEach(function(q, qi) {
      if(!q.options) q.options = [];
      if(!q.type) q.type = 'single';
      html += '<div class="bonus-card" style="border-color:#E2E8F0">';
      // Header
      html += '<div class="bonus-card-hd">';
      html += '<div class="bonus-num-circle" style="background:#3B82F6">'+(qi+1)+'</div>';
      html += '<input class="bonus-q-input" type="text" value="'+escAttr(q.label||'')+'" placeholder="Ex: Comment nous avez-vous connu ?" oninput="'+idxPfx+'.customQuestions['+qi+'].label=this.value"/>';
      html += '<div class="bonus-arrows">';
      html += (qi>0?'<button class="bonus-arrow" onclick="(function(){var a='+idxPfx+'.customQuestions,t=a['+qi+'];a['+qi+']=a['+(qi-1)+'];a['+(qi-1)+']=t;'+rerender+'})()">↑</button>':'<div style="width:22px;height:18px"></div>');
      html += (qi<list.length-1?'<button class="bonus-arrow" onclick="(function(){var a='+idxPfx+'.customQuestions,t=a['+qi+'];a['+qi+']=a['+(qi+1)+'];a['+(qi+1)+']=t;'+rerender+'})()">↓</button>':'<div style="width:22px;height:18px"></div>');
      html += '</div>';
      html += '<button class="bonus-del" onclick="if(confirm(\'Supprimer ?\')){ '+idxPfx+'.customQuestions.splice('+qi+',1);'+rerender+'}">✕</button>';
      html += '</div>';
      // Type
      html += '<div class="bonus-type-row">';
      html += '<button class="bonus-type-pill '+(q.type==='single'?'active':'')+'" onclick="'+idxPfx+'.customQuestions['+qi+'].type=\'single\';'+rerender+'">⭕ Choix unique</button>';
      html += '<button class="bonus-type-pill '+(q.type==='multi'?'active':'')+'" onclick="'+idxPfx+'.customQuestions['+qi+'].type=\'multi\';'+rerender+'">☑ Multi-choix</button>';
      html += '<button class="bonus-type-pill '+(q.type==='text'?'active':'')+'" onclick="'+idxPfx+'.customQuestions['+qi+'].type=\'text\';'+rerender+'">✏ Texte libre</button>';
      html += '</div>';
      // Options (si pas texte libre)
      if(q.type !== 'text') {
        q.options.forEach(function(o, oi) {
          var oVal = typeof o==='string' ? o : (o.label||'');
          html += '<div class="bonus-opt-row2">';
          html += '<input type="text" value="'+escAttr(oVal)+'" placeholder="Option '+(oi+1)+'" oninput="(function(){var opt='+idxPfx+'.customQuestions['+qi+'].options['+oi+'];if(typeof opt===\'string\')'+idxPfx+'.customQuestions['+qi+'].options['+oi+']=this.value;else opt.label=this.value;}).call(this)"/>';
          html += '<button class="bonus-opt-del" onclick="'+idxPfx+'.customQuestions['+qi+'].options.splice('+oi+',1);'+rerender+'">✕</button>';
          html += '</div>';
        });
        html += '<button class="bonus-add-opt" onclick="'+idxPfx+'.customQuestions['+qi+'].options.push({label:\'\',val:\'opt-\'+Date.now()});'+rerender+'">+ Option</button>';
      }
      html += '</div>';
    });
  }

  // Bouton ajouter + template Pâques
  html += '<div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:10px">';
  html += '<button class="btn btn-sm" onclick="'+idxPfx+'.customQuestions.push({id:\'cq-\'+Date.now(),label:\'\',type:\'single\',options:[]});'+rerender+'">+ Ajouter une question</button>';
  html += '<button class="btn btn-sm" style="background:#EFF6FF;color:#3B82F6;border-color:#BFDBFE" onclick="(function(){';
  html += 'var tpl=[';
  html += '{id:\'decouverte\',label:\'Comment nous avez-vous connu ?\',type:\'single\',options:[{label:\'📱 Réseaux sociaux\',val:\'rs\'},{label:\'🗣 Bouche à oreille\',val:\'ba\'},{label:\'📰 Presse / Affichage\',val:\'presse\'},{label:\'🌐 Site internet\',val:\'web\'}]},';
  html += '{id:\'venu\',label:\'Vous êtes venu(e)...\',type:\'single\',options:[{label:\'👨\u200d👩\u200d👧 En famille\',val:\'famille\'},{label:\'👫 Entre amis\',val:\'amis\'},{label:\'💑 En couple\',val:\'couple\'},{label:\'🚶 Seul(e)\',val:\'seul\'}]}';
  html += '];';
  html += 'tpl.forEach(function(q){'+idxPfx+'.customQuestions.push(q);});';
  html += rerender+'})()">📋 Modèle Pâques</button>';
  html += '</div>';

  html += '</div>';
  return html;
}

// ============ BONUS EDITOR — rendu commun wizard + drawer ============
function renderBonusEditor(cfg, idxPfx, toggleFn, rerender) {
  if(!cfg.bonusList) cfg.bonusList = [];
  var bonusList = cfg.bonusList;
  var html = '';
  html += '<div style="margin-top:20px;border-top:1px solid var(--sa-border);padding-top:18px">';
  // Header toggle
  html += '<div class="bonus-section-hd">'
       + '<div><div style="font-size:14px;font-weight:800;color:var(--sa-text)">✨ Questions bonus (enquête satisfaction)</div>'
       + '<div style="font-size:11px;color:var(--sa-muted);margin-top:2px">Présentées après le jeu · Compléter = +1 ticket dans l\'urne</div></div>'
       + '<div onclick="'+toggleFn+'" style="width:42px;height:24px;background:'+(cfg.bonusActif?'#7C2D92':'#CBD5E1')+';border-radius:100px;cursor:pointer;position:relative;flex-shrink:0">'
       + '<div style="width:18px;height:18px;background:#fff;border-radius:50%;position:absolute;top:3px;left:'+(cfg.bonusActif?'21':'3')+'px;transition:left .2s"></div>'
       + '</div></div>';
  if(cfg.bonusActif) {
    bonusList.forEach(function(b, bi) {
      if(b.texte && !b.label){ b.label=b.texte; b.id='bonus-'+bi; b.type='single'; b.options=b.options||[]; }
      if(!b.options) b.options=[];
      if(!b.type) b.type='single';
      if(!b.id) b.id='bonus-'+bi;
      var isActive = b.actif !== false;
      html += '<div class="bonus-card">';
      // Header carte
      var arrowUp   = (bi>0) ? '<button class="bonus-arrow" onclick="(function(){var a='+idxPfx+'.bonusList,t=a['+bi+'];a['+bi+']=a['+(bi-1)+'];a['+(bi-1)+']=t;'+rerender+'})()">↑</button>' : '<div style="width:22px;height:18px"></div>';

      html += '<div class="bonus-card-hd">'
           + '<div class="bonus-num-circle">'+(bi+1)+'</div>'
           + '<input class="bonus-q-input" type="text" value="'+escAttr(b.label||'')+'" placeholder="Vous êtes venu(e)..." oninput="'+idxPfx+'.bonusList['+bi+'].label=this.value"/>'
           + '<div class="bonus-arrows">'+arrowUp+arrowDown+'</div>'
           + '<button class="bonus-actif-badge '+(isActive?'':'off')+'" onclick="'+idxPfx+'.bonusList['+bi+'].actif='+(isActive?'false':'true')+';'+rerender+'">'+(isActive?'✓ Actif':'Inactif')+'</button>'
           + '<button class="bonus-del" onclick="if(confirm(\'Supprimer ?\')){'+idxPfx+'.bonusList.splice('+bi+',1);'+rerender+'}">✕</button>'
           + '</div>';
      // Type pills
      html += '<div class="bonus-type-row">'
           + '<button class="bonus-type-pill '+(b.type==='single'?'active':'')+'" onclick="'+idxPfx+'.bonusList['+bi+'].type=\'single\';'+rerender+'">⭕ Choix unique</button>'
           + '<button class="bonus-type-pill '+(b.type==='multi'?'active':'')+'" onclick="'+idxPfx+'.bonusList['+bi+'].type=\'multi\';'+rerender+'">☑ Multi-choix</button>'
           + '</div>';
      // Options
      b.options.forEach(function(o, oi) {
        var oVal = (typeof o==='string') ? o : (o.label||'');
        html += '<div class="bonus-opt-row2">'
             + '<input type="text" value="'+escAttr(oVal)+'" placeholder="Option '+(oi+1)+'" oninput="(function(){var opt='+idxPfx+'.bonusList['+bi+'].options['+oi+'];if(typeof opt===\'string\')'+idxPfx+'.bonusList['+bi+'].options['+oi+']=this.value;else opt.label=this.value;}).call(this)"/>'
             + '<button class="bonus-opt-del" onclick="'+idxPfx+'.bonusList['+bi+'].options.splice('+oi+',1);'+rerender+'">✕</button>'
             + '</div>';
      });
      html += '<button class="bonus-add-opt" onclick="'+idxPfx+'.bonusList['+bi+'].options.push({label:\'\',val:\'opt-\'+Date.now()});'+rerender+'">+ Option</button>';

  return html;
}

// renderLiveControl supprimée — voir drawer event onglet Stats
function renderLiveActionsForModule(e){
  let html = '';
  if(e.module==='spin'){
    // Stocks par segment (utilise la config par défaut puisque l'event peut ne pas avoir tout en draft)
    const segs = state.wiz.draft.cfg.spinSegments || [];
    html += '<div style="padding:10px;background:rgba(255,255,255,.04);border-radius:8px;margin-bottom:10px">';
    html += '<div style="font-size:11px;font-weight:700;color:rgba(255,255,255,.85);margin-bottom:8px;text-transform:uppercase;letter-spacing:.04em">Stocks restants par segment</div>';
    segs.forEach((s,i) => {
      const stockInit = s.stock!=null ? s.stock : 30;
      const consume = s.perdant ? 0 : Math.floor(Math.random()*Math.min(stockInit,15));
      const restant = stockInit - consume;
      const pct = stockInit ? (restant/stockInit*100) : 0;
      const lowStock = restant>0 && restant<5;
      html += '<div style="margin-bottom:6px"><div style="display:flex;align-items:center;gap:6px;font-size:11px;color:#fff;margin-bottom:3px"><span style="width:10px;height:10px;border-radius:50%;background:'+s.color+';flex-shrink:0"></span><span style="flex:1">'+esc(s.label)+'</span>'
           + (s.perdant?'<span style="color:rgba(255,255,255,.4);font-size:10px">∞ perdant</span>':'<span style="color:'+(lowStock?'#F87171':'rgba(255,255,255,.7)')+';font-weight:700">'+restant+' / '+stockInit+(lowStock?' ⚠':'')+'</span>')+'</div>'
           + (s.perdant?'':'<div style="height:3px;background:rgba(255,255,255,.06);border-radius:2px;overflow:hidden"><div style="height:100%;background:'+(lowStock?'#EF4444':s.color)+';width:'+pct+'%"></div></div>')
           + '</div>';
    });
    html += '</div>';
    html += '<button class="lcc-action-btn" onclick="toast(\'Roulette mise en pause\',\'warn\')"><span class="ico">⏸</span><span class="lbl">Pause spin<div class="desc">Bloque temporairement les nouveaux tours</div></span></button>';
    html += '<button class="lcc-action-btn" onclick="toast(\'Recharge stocks programmée\',\'info\')"><span class="ico">🔄</span><span class="lbl">Recharger les stocks<div class="desc">Au prochain palier ou à la fermeture</div></span></button>';
  } else if(e.module==='vote'){
    html += '<div style="padding:10px;background:rgba(255,255,255,.04);border-radius:8px;margin-bottom:10px">';
    html += '<div style="font-size:11px;font-weight:700;color:rgba(255,255,255,.85);margin-bottom:8px;text-transform:uppercase">Sujets de vote</div>';
    [{l:'Photo du marché',v:54},{l:'Concert Place du Frêne',v:128},{l:'Ouverture festival',v:0}].forEach((s,i)=>{
      html += '<div style="display:flex;align-items:center;gap:8px;padding:6px;background:rgba(255,255,255,.04);border-radius:6px;margin-bottom:4px"><span style="flex:1;font-size:12px;color:#fff;font-weight:700">'+s.l+'</span><span style="font-size:11px;color:rgba(255,255,255,.7)">'+s.v+' votes</span>'+(i===1?'<span style="background:var(--st-live);color:#000;font-size:9px;padding:2px 6px;border-radius:4px;font-weight:800">EN COURS</span>':'')+'</div>';
    });
    html += '</div>';
    html += '<button class="lcc-action-btn" onclick="toast(\'Sujet suivant activé\',\'success\')"><span class="ico">▶</span><span class="lbl">Activer le sujet suivant<div class="desc">Passer au prochain élément à voter</div></span></button>';
    html += '<button class="lcc-action-btn" onclick="toast(\'Résultats affichés grand écran\',\'success\')"><span class="ico">📊</span><span class="lbl">Afficher résultats grand écran<div class="desc">'+(e.participants||0)+' votes comptabilisés</div></span></button>';
    html += '<button class="lcc-action-btn" onclick="toast(\'Vote clos\',\'warn\')"><span class="ico">🛑</span><span class="lbl">Clore le vote<div class="desc">Plus de nouveaux votes acceptés</div></span></button>';
  } else if(e.module==='standup'){
    const list = state.wiz.draft.cfg.standupComediens;
    list.forEach((c,i)=>{
      const status = state.liveCC.activeComedien===i ? 'active' : (state.liveCC.activeComedien>i?'done':'waiting');
      const lbl = status==='active'?'EN COURS':(status==='done'?'TERMINÉ':'EN ATTENTE');
      const votes = status==='done'?Math.floor(Math.random()*80+20)+' votes · '+(Math.random()*4+1).toFixed(1)+' / 5':(status==='active'?'Votes en cours…':'-');

         + '<button class="btn btn-success btn-sm" onclick="if(state.liveCC.activeComedien==null)state.liveCC.activeComedien=0;else state.liveCC.activeComedien++;render()">▶ Activer suivant</button>'
         + '<button class="btn btn-sm" onclick="state.liveCC.activeComedien=null;render()">⏸ Pause</button>'
         + '<button class="btn btn-warn btn-sm" onclick="state.liveCC.activeComedien=null;render()">↺ Reset</button>'
         + '</div>';
  } else if(e.module==='quiz'||e.module==='quizsolo'||e.module==='quizmaster'){
    html += '<div style="padding:10px;background:rgba(255,255,255,.04);border-radius:8px;margin-bottom:10px">';
    html += '<div style="font-size:11px;font-weight:700;color:rgba(255,255,255,.85);margin-bottom:8px;text-transform:uppercase">Top 5 classement</div>';
    [{n:'Sophie B.',s:19},{n:'Marie D.',s:18},{n:'Thomas P.',s:17},{n:'Emma R.',s:16},{n:'Pierre M.',s:15}].forEach((p,i)=>{
      html += '<div style="display:flex;align-items:center;gap:8px;padding:5px 6px;font-size:12px"><span style="color:rgba(255,255,255,.5);width:18px">#'+(i+1)+'</span><span style="flex:1;color:#fff;font-weight:'+(i<3?'700':'500')+'">'+p.n+'</span><span style="color:'+(i===0?'#FBBF24':'rgba(255,255,255,.7)')+';font-weight:700">'+p.s+'/20</span></div>';
    });
    html += '</div>';
    html += '<button class="lcc-action-btn" onclick="toast(\'Classement live affiché\',\'success\')"><span class="ico">🏆</span><span class="lbl">Afficher classement grand écran<div class="desc">Top 10 sur grand écran</div></span></button>';
    html += '<button class="lcc-action-btn" onclick="toast(\'Banque rechargée\',\'info\')"><span class="ico">📚</span><span class="lbl">Recharger les questions<div class="desc">Si banque épuisée en cours d\'event</div></span></button>';
  } else if(e.module==='tombola'){
    html += '<div style="padding:10px;background:rgba(255,255,255,.04);border-radius:8px;margin-bottom:10px">';
    html += '<div style="display:flex;justify-content:space-between;font-size:11px;color:rgba(255,255,255,.85);margin-bottom:6px;text-transform:uppercase;letter-spacing:.04em"><span>Inscriptions</span><span style="color:#fff;font-weight:800">'+(e.participants||0)+'</span></div>';
    html += '<div style="display:flex;justify-content:space-between;font-size:11px;color:rgba(255,255,255,.85)"><span>Doublons bloqués</span><span>3</span></div>';
    html += '</div>';
    html += '<button class="lcc-action-btn" onclick="openModal(\'tirage\',{eventId:\''+e.id+'\'})"><span class="ico">🎲</span><span class="lbl">Lancer un tirage<div class="desc">'+(e.participants||0)+' participants éligibles</div></span></button>';
    html += '<button class="lcc-action-btn" onclick="toast(\'Inscriptions clôturées\',\'warn\')"><span class="ico">🛑</span><span class="lbl">Fermer les inscriptions<div class="desc">Plus de nouveaux participants</div></span></button>';
  }
  return html;
}

// ============ NETTOYAGE PRÉ-PRODUCTION ============
// Garde uniquement : pro-vence + ev-paques + joueurs j-pq-* + partenaires liés + bq-paques-vence
function preprodCleanup() {
  var KEEP_PROS       = ['pro-vence'];
  var KEEP_EVENTS     = ['ev-paques'];
  var KEEP_JOUEUR_PFX = 'j-pq-';
  var KEEP_BANQUES    = ['bq-paques-vence'];

  // Partenaires liés à ev-paques
  var evPaques = DATA.events.find(function(e){ return e.id === 'ev-paques'; });
  var keepPartIds = evPaques && evPaques.partenaires ? evPaques.partenaires.slice() : [];

  // Lots liés à ev-paques
  var beforeLots = DATA.lots.length;
  DATA.lots = DATA.lots.filter(function(l){ return l.eventId === 'ev-paques'; });

  // Joueurs : garder les j-pq-* uniquement
  var beforeJ = DATA.joueurs.length;
  DATA.joueurs = DATA.joueurs.filter(function(j){ return j.id && j.id.indexOf(KEEP_JOUEUR_PFX) === 0; });

  // Pros : garder pro-vence uniquement
  var beforeP = DATA.pros.length;
  DATA.pros = DATA.pros.filter(function(p){ return KEEP_PROS.indexOf(p.id) !== -1; });

  // Events : garder ev-paques uniquement
  var beforeE = DATA.events.length;
  DATA.events = DATA.events.filter(function(e){ return KEEP_EVENTS.indexOf(e.id) !== -1; });

  // Partenaires : garder ceux liés à ev-paques
  var beforePt = DATA.partenaires.length;
  DATA.partenaires = DATA.partenaires.filter(function(p){ return keepPartIds.indexOf(p.id) !== -1; });

  // Banques : garder bq-paques-vence uniquement
  var beforeBq = DATA.banques.length;
  DATA.banques = DATA.banques.filter(function(b){ return b && b.id && KEEP_BANQUES.indexOf(b.id) !== -1; });

  // Super Events : tout supprimer (NDS sera re-créé depuis zéro)
  var beforeSE = DATA.superEvents.length;
  DATA.superEvents = [];

  saveData();
  render();

  var msg = 'Nettoyage terminé :\n'
    + '• Pros : ' + beforeP + ' → ' + DATA.pros.length + '\n'
    + '• Events : ' + beforeE + ' → ' + DATA.events.length + '\n'
    + '• Joueurs : ' + beforeJ + ' → ' + DATA.joueurs.length + '\n'
    + '• Partenaires : ' + beforePt + ' → ' + DATA.partenaires.length + '\n'
    + '• Banques : ' + beforeBq + ' → ' + DATA.banques.length + '\n'
    + '• Lots : ' + beforeLots + ' → ' + DATA.lots.length + '\n'
    + '• Super Events : ' + beforeSE + ' → 0';
  toast('Nettoyage pré-production effectué', 'success');
  setTimeout(function(){ toast(msg.replace(/\n/g,' · '), 'info'); }, 400);
}

function saveSupaConfig(){
  const url = document.getElementById('supa-url');
  const anon = document.getElementById('supa-anon');
  if(!url||!anon) return;
  FLOWIN_SUPA_URL = url.value.trim().replace(/\/$/, '');
  FLOWIN_SUPA_ANON = anon.value.trim();
  localStorage.setItem('flowin_supa_url', FLOWIN_SUPA_URL);
  localStorage.setItem('flowin_supa_anon', FLOWIN_SUPA_ANON);
  const res = document.getElementById('supa-test-result');
  if(res) res.innerHTML = '<div style="font-size:12px;color:var(--sa-muted)">Test de connexion…</div>';
  testSupaConnection().then(ok=>{
    if(res) res.innerHTML = ok
      ? '<div class="alert" style="background:#D1FAE5;color:#065F46;padding:10px;border-radius:8px;font-size:13px;margin-top:8px">✅ Connexion Supabase réussie · prêt pour le dual-write</div>'
      : '<div class="alert" style="background:#FEE2E2;color:#991B1B;padding:10px;border-radius:8px;font-size:13px;margin-top:8px">❌ Connexion échouée · vérifiez l\'URL et la clé anon</div>';
  });
}

async function testSupaConnection(){
  if(!FLOWIN_SUPA_URL || !FLOWIN_SUPA_ANON) return false;
  try {
    var r = await fetch(FLOWIN_SUPA_URL+'/rest/v1/pros?limit=1', {
      headers:{'apikey':FLOWIN_SUPA_ANON,'Authorization':'Bearer '+FLOWIN_SUPA_ANON}
    });
    return r.status < 400;
  } catch(e){ return false; }
}

// Migration initiale Pâques → Supabase (idempotent via upsert)
async function migrateSupaPaques(){
  if(!FLOWIN_SUPA_URL || !FLOWIN_SUPA_ANON){
    toast('Configurez Supabase avant la migration','warn'); return;
  }
  toast('Migration Pâques en cours…','info');
  var errors = 0;

  // 1. Pro Ville de Vence
  var pro = findPro('pro-vence');
  if(pro){
    var okP = await supaUpsert('pros', {
      id:pro.id, nom:pro.nom, ville:pro.ville, code_postal:pro.codePostal,
      adresse:pro.adresse, siret:pro.siret, secteur:pro.secteur,
      contact:pro.contact, email:pro.email, tel:pro.tel
    });
    if(!okP) errors++;
  }

  // 2. Event Pâques
  var ev = findEvent('ev-paques');
  if(ev){ var okE = await supaWriteEvent(ev); if(!okE) errors++; }

  // 3. Joueurs Pâques (par batch de 20)
  var joueurs = DATA.joueurs.filter(function(j){ return j.events && j.events.indexOf('ev-paques')>=0; });
  for(var i=0; i<joueurs.length; i+=20){
    var batch = joueurs.slice(i, i+20);
    var batchPayload = batch.map(function(j){
      return {id:j.id, email:j.email, nom:j.nom, prenom:j.prenom||'', tel:j.tel||'',
        ville:j.ville||'', code_postal:j.codePostal||'', date_naissance:j.dateNaissance||'',
        optin:j.optin||false, gains:j.gains||0, score_moy:j.scoreMoy||'',
        events:j.events||[], first_seen:j.firstSeen||null, last_seen:j.lastSeen||null};
    });
    var okB = await supaUpsert('joueurs', batchPayload);
    if(!okB) errors++;
  }

  // 4. Lots Pâques
  var lots = DATA.lots.filter(function(l){ return l.eventId==='ev-paques'; });
  for(var li=0; li<lots.length; li++){ await supaWriteLot(lots[li]); }

  // 5. Event NDS (stub vide)
  var nds = findEvent('ev-nds');
  if(nds){ await supaWriteEvent(nds); }

  if(errors === 0){
    toast('✅ Migration Pâques terminée · '+joueurs.length+' joueurs · vérifiez Supabase','success');
  } else {
    toast('⚠️ Migration avec '+errors+' erreur(s) — vérifiez la connexion','warn');
  }
}

// ============ REALTIME POLLING ============
let _realtimeInterval = null;
let _lastRealtimeAt = null;

function startRealtimePolling(){
  if(_realtimeInterval) clearInterval(_realtimeInterval);
  _realtimeInterval = setInterval(()=>{
    if(!state.realtimeEnabled) return;
    const liveEvents = DATA.events.filter(e=>e.status==='live');
    if(liveEvents.length === 0) return;
    _lastRealtimeAt = new Date();
    // Si Supabase configuré : requête réelle
    if(FLOWIN_SUPA_URL && FLOWIN_SUPA_ANON){
      liveEvents.forEach(ev=>{
        fetch(FLOWIN_SUPA_URL+'/rest/v1/participations?event_id=eq.'+ev.id+'&select=count', {
          headers:{'apikey':FLOWIN_SUPA_ANON,'Authorization':'Bearer '+FLOWIN_SUPA_ANON,
                   'Prefer':'count=exact','Range':'0-0'}
        }).then(r=>{
          const count = parseInt(r.headers.get('content-range')?.split('/')[1]||'0');
          if(count && count !== ev.participants){
            ev.participants = count;
            if(state.view==='pilotage') render();
          }
        }).catch(()=>{});
      });
    } else {
      // Simulation : incrément aléatoire pour démo
      liveEvents.forEach(ev=>{ ev.participants = (ev.participants||0) + Math.floor(Math.random()*3); });
      // Mise à jour silencieuse du compteur live
      const el = document.querySelector('.lcc-stat .v');
      if(el) el.textContent = liveEvents[0].participants;
    }
    // Indicateur "Maj il y a Ns"
    updateRealtimeBadge();
  }, 10000);
}

function updateRealtimeBadge(){
  document.querySelectorAll('.rt-badge').forEach(el=>{
    el.textContent = 'Maj il y a ' + (Math.round((new Date()-_lastRealtimeAt)/1000)||0) + 's';
  });
}

// Badge mis à jour chaque seconde
setInterval(()=>{ if(_lastRealtimeAt) updateRealtimeBadge(); }, 1000);

// ── Gestion lots event ──
function marquerRetire(lotId){
  var l = findLot(lotId); if(!l) return;
  l.retire = true; l.dateRetrait = new Date().toISOString().slice(0,10);
  saveData(); renderDrawer(); toast('Lot marqué comme retiré','success');
}
function deleteLot(lotId){
  DATA.lots = DATA.lots.filter(function(l){ return l.id !== lotId; });
  saveData(); renderDrawer(); toast('Lot supprimé','success');
}

document.addEventListener('DOMContentLoaded', async function(){
  render();  // Render initial avec localStorage (rapide)
  startRealtimePolling();
  console.log('Flowin Dashboard v28 · Boot localStorage :',{
    pros:DATA.pros.length,events:DATA.events.length,joueurs:DATA.joueurs.length
  });
  
  // Charger Supabase en parallèle et rafraîchir
  if(FLOWIN_SUPA_URL && FLOWIN_SUPA_ANON){
    console.log('[Flowin] Sync Supabase en cours...');
    var data = await supaLoadAll();
    if(data){
      DATA.pros = data.pros;
      DATA.partenaires = data.partenaires;
      DATA.events = data.events;
      DATA.superEvents = data.superEvents;
      DATA.joueurs = data.joueurs;
      DATA.lots = data.lots;
      if(data.banques && data.banques.length) DATA.banques = data.banques;
      saveData();
      console.log('[Flowin] Supabase chargé :',{
        pros:DATA.pros.length,events:DATA.events.length,joueurs:DATA.joueurs.length,
        partenaires:DATA.partenaires.length,banques:DATA.banques.length,
        lots:DATA.lots.length,superEvents:DATA.superEvents.length
      });
      render();
      try { toast('✅ Synchronisé Supabase ('+DATA.events.length+' events)','success'); } catch(e){}
    }
  }
});

function openJoueurModal(evId, evNom, module){

function openProMobileModal(proId){
  if(!proId) { console.warn('[Flowin] openProMobileModal: proId vide'); return; }
  var pro = (typeof findPro === 'function') ? findPro(proId) : null;
  var proNom = pro ? pro.nom : proId;
  var modal = document.getElementById('proMobileModal');
  var iframe = document.getElementById('pmmIframe');
  var sub = document.getElementById('pmmSub');
  var urlDisp = document.getElementById('pmmUrlDisplay');
  var openLink = document.getElementById('pmmOpenLink');
  if(!modal || !iframe) return;
  
  /* Construction de l'URL : relative pour preview locale, absolue pour partage */
  var localUrl = 'pro_mobile.html?pro=' + encodeURIComponent(proId);
  var origin = window.location.origin && window.location.origin !== 'null'
               ? window.location.origin
               : 'https://flowin-events.vercel.app';
  var fullUrl = origin + '/' + localUrl;
  
  sub.textContent = proNom + ' · ' + proId;
  iframe.src = localUrl;
  urlDisp.textContent = fullUrl;
  openLink.href = fullUrl;
  
  modal.style.display = 'flex';
  document.body.style.overflow = 'hidden';
  /* Mémoriser pour la copie */
  modal.dataset.url = fullUrl;
}

function closeProMobileModal(){
  var modal = document.getElementById('proMobileModal');
  var iframe = document.getElementById('pmmIframe');
  if(!modal) return;
  modal.style.display = 'none';
  if(iframe) iframe.src = 'about:blank';
  document.body.style.overflow = '';
}

function pmmCopyLink(){
  var modal = document.getElementById('proMobileModal');
  var url = (modal && modal.dataset.url) || '';
  if(!url) return;
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(url).then(function(){
      if(typeof toast === 'function') toast('Lien copié dans le presse-papier');
    });
  } else {
    var ta = document.createElement('textarea');
    ta.value = url; document.body.appendChild(ta);
    ta.select(); document.execCommand('copy'); document.body.removeChild(ta);
    if(typeof toast === 'function') toast('Lien copié');
  }
}

/* Échap pour fermer */
document.addEventListener('keydown', function(e){
  if(e.key === 'Escape'){
    var modal = document.getElementById('proMobileModal');
    if(modal && modal.style.display !== 'none') closeProMobileModal();
    var jm = document.getElementById('joueurModal');
    if(jm && jm.style.display !== 'none') closeJoueurModal();
  }
});

<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Flowin Vote</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#0F0E1A;color:#fff;min-height:100vh;padding:20px}
.container{max-width:480px;margin:0 auto}
.header{text-align:center;margin-bottom:24px}
.ev-name{font-size:22px;font-weight:800;color:#3B5CC4;margin-bottom:4px}
.card{background:#1F1B2E;border-radius:16px;padding:20px;margin-bottom:14px}
.form-row{margin-bottom:14px}
label{display:block;font-size:12px;color:#9A8FBF;margin-bottom:6px}
input{width:100%;padding:12px;background:#2D2844;border:1px solid #3D3854;border-radius:10px;color:#fff;font-size:14px}
.btn{display:block;width:100%;padding:14px;background:linear-gradient(135deg,#3B5CC4,#1E40AF);color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;margin-top:16px}
.choix-card{background:#1F1B2E;border-radius:14px;padding:18px;margin-bottom:14px;border:2px solid transparent;transition:border-color .2s}
.choix-card.voted{border-color:#3B5CC4}
.choix-label{font-size:16px;font-weight:700;margin-bottom:10px}
.stars{display:flex;justify-content:space-around;gap:8px}
.star{font-size:32px;cursor:pointer;opacity:.3;transition:opacity .15s}
.star.active{opacity:1}
.thanks{text-align:center;font-size:18px;font-weight:700;color:#3B5CC4;padding:30px 20px}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="ev-name" id="ev-name">Vote</div>
    <div style="font-size:13px;color:#9A8FBF" id="ev-sub">Donnez votre avis !</div>
  </div>

  <div id="step-form" class="card">
    <h3 style="margin-bottom:14px;font-size:16px">Vos coordonnées</h3>
    <div class="form-row"><label>Email *</label><input type="email" id="email"></div>
    <div class="form-row"><label>Prénom</label><input type="text" id="prenom"></div>
    <div class="form-row"><label>Ville</label><input type="text" id="ville"></div>
    <button class="btn" onclick="startVote()">Commencer →</button>
  </div>

  <div id="step-vote" style="display:none">
    <div id="choix-list"></div>
    <button class="btn" onclick="submitVotes()">Envoyer mes votes →</button>
  </div>

  <div id="step-thanks" style="display:none" class="card">
    <div class="thanks">🙏 Merci pour votre vote !</div>
    <p style="text-align:center;color:#9A8FBF;font-size:13px">Vos votes ont été enregistrés.</p>
  </div>
</div>

<script>
var SUPABASE_URL='https://atddutvzklcgiqxlpvla.supabase.co';
var SUPABASE_KEY='sb_publishable_LBkvaGc0M9ZzXZLxviJi9g_58lU8onF';
var event=null;try{event=JSON.parse(sessionStorage.getItem('flowin_current_event'))||{};}catch(e){event={};}
var cfg=event.cfg||{};
document.getElementById('ev-name').textContent=event.nom||'Vote';
if(event.couleur){document.querySelectorAll('.btn').forEach(function(b){b.style.background='linear-gradient(135deg,'+event.couleur+',#1E40AF)';});document.getElementById('ev-name').style.color=event.couleur;}

var choix=cfg.voteChoix||[];
var votes={};
var formData={};

function startVote(){
  var email=document.getElementById('email').value.trim();
  if(!email||email.indexOf('@')<0){alert('Email requis');return;}
  formData={email:email,prenom:document.getElementById('prenom').value.trim(),ville:document.getElementById('ville').value.trim()};
  document.getElementById('step-form').style.display='none';
  renderChoix();
  document.getElementById('step-vote').style.display='block';
}

function renderChoix(){
  var html='';
  choix.forEach(function(c){
    html+='<div class="choix-card" data-cid="'+c.id+'">';
    html+='<div class="choix-label">'+(c.label||c.id)+'</div>';
    html+='<div class="stars">';
    for(var i=1;i<=5;i++){
      html+='<span class="star" data-cid="'+c.id+'" data-note="'+i+'" onclick="pickStar(\''+c.id+'\','+i+')">⭐</span>';
    }
    html+='</div></div>';
  });
  document.getElementById('choix-list').innerHTML=html;
}

function pickStar(cid,note){
  votes[cid]=note;
  // Mettre à jour visuel
  document.querySelectorAll('.choix-card[data-cid="'+cid+'"] .star').forEach(function(s){
    var n=parseInt(s.dataset.note,10);
    if(n<=note)s.classList.add('active');else s.classList.remove('active');
  });
  document.querySelector('.choix-card[data-cid="'+cid+'"]').classList.add('voted');
}

function submitVotes(){
  if(Object.keys(votes).length===0){alert('Votez pour au moins un choix');return;}
  var jid='j-vote-'+Date.now()+'-'+Math.random().toString(36).slice(2,6);
  // Save joueur
  fetch(SUPABASE_URL+'/rest/v1/joueurs',{
    method:'POST',
    headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,'Content-Type':'application/json','Prefer':'return=minimal'},
    body:JSON.stringify({
      id:jid,email:formData.email,prenom:formData.prenom,ville:formData.ville,
      events:[event.id],source:'QR Vote '+event.nom,
      optin:true,optin_date:new Date().toISOString().split('T')[0],
      first_seen:new Date().toISOString().split('T')[0],last_seen:new Date().toISOString().split('T')[0],
      gains:0,client_type:'btoc'
    })
  });
  // Save votes
  var voteRows=Object.keys(votes).map(function(cid){
    return {event_id:event.id,joueur_id:jid,cible_id:cid,cible_type:'concert',note:votes[cid]};
  });
  fetch(SUPABASE_URL+'/rest/v1/votes',{
    method:'POST',
    headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,'Content-Type':'application/json','Prefer':'return=minimal'},
    body:JSON.stringify(voteRows)
  });
  fetch(SUPABASE_URL+'/rest/v1/participations',{
    method:'POST',
    headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,'Content-Type':'application/json','Prefer':'return=minimal'},
    body:JSON.stringify({event_id:event.id,joueur_id:jid,score:0,completed:true})
  });
  document.getElementById('step-vote').style.display='none';
  document.getElementById('step-thanks').style.display='block';
}
</script>
</body>
</html>

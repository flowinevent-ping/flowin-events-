<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Flowin Tombola</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#0F0E1A;color:#fff;min-height:100vh;padding:20px}
.container{max-width:480px;margin:0 auto}
.header{text-align:center;margin-bottom:24px}
.ev-name{font-size:22px;font-weight:800;color:#10B981;margin-bottom:4px}
.card{background:#1F1B2E;border-radius:16px;padding:24px;margin-bottom:16px}
.form-row{margin-bottom:14px}
label{display:block;font-size:12px;color:#9A8FBF;margin-bottom:6px}
input{width:100%;padding:12px;background:#2D2844;border:1px solid #3D3854;border-radius:10px;color:#fff;font-size:14px}
.btn{display:block;width:100%;padding:14px;background:linear-gradient(135deg,#10B981,#059669);color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;margin-top:16px}
.ticket{background:linear-gradient(135deg,#10B981,#059669);padding:24px;border-radius:14px;text-align:center;margin:20px 0}
.ticket-num{font-size:48px;font-weight:900;letter-spacing:.05em;font-family:monospace}
.ticket-label{font-size:11px;text-transform:uppercase;letter-spacing:.1em;opacity:.9;margin-top:8px}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="ev-name" id="ev-name">Tombola</div>
    <div style="font-size:13px;color:#9A8FBF" id="ev-sub">Tentez votre chance !</div>
  </div>

  <div id="step-form" class="card">
    <h3 style="margin-bottom:14px;font-size:16px">Vos coordonnées</h3>
    <div class="form-row"><label>Email *</label><input type="email" id="email"></div>
    <div class="form-row"><label>Prénom</label><input type="text" id="prenom"></div>
    <div class="form-row"><label>Nom</label><input type="text" id="nom"></div>
    <div class="form-row"><label>Ville</label><input type="text" id="ville"></div>
    <button class="btn" onclick="participate()">Participer →</button>
  </div>

  <div id="step-ticket" style="display:none">
    <div class="ticket">
      <div style="font-size:13px;opacity:.9">Votre ticket de tombola</div>
      <div class="ticket-num" id="ticket-num">000000</div>
      <div class="ticket-label">Gardez ce numéro</div>
    </div>
    <div class="card">
      <p style="font-size:13px;color:#9A8FBF;line-height:1.6">Le tirage au sort sera effectué par l'organisateur à la fin de l'événement.<br><br>Si vous gagnez, vous serez contacté par email.</p>
    </div>
  </div>
</div>

<script>
var SUPABASE_URL='https://atddutvzklcgiqxlpvla.supabase.co';
var SUPABASE_KEY='sb_publishable_LBkvaGc0M9ZzXZLxviJi9g_58lU8onF';
var event=null;
try{event=JSON.parse(sessionStorage.getItem('flowin_current_event'))||{};}catch(e){event={};}

document.getElementById('ev-name').textContent=event.nom||'Tombola';
if(event.couleur){
  document.querySelectorAll('.btn').forEach(function(b){b.style.background='linear-gradient(135deg,'+event.couleur+',#059669);';});
  document.getElementById('ev-name').style.color=event.couleur;
}

function participate(){
  var email=document.getElementById('email').value.trim();
  if(!email||email.indexOf('@')<0){alert('Email requis');return;}
  var nom=document.getElementById('nom').value.trim();
  var prenom=document.getElementById('prenom').value.trim();
  var ville=document.getElementById('ville').value.trim();

  var ticketNum=String(Math.floor(100000+Math.random()*900000));
  var jid='j-tom-'+Date.now()+'-'+Math.random().toString(36).slice(2,6);
  
  document.getElementById('ticket-num').textContent=ticketNum;
  document.getElementById('step-form').style.display='none';
  document.getElementById('step-ticket').style.display='block';

  var payload={
    id:jid,email:email,nom:nom,prenom:prenom,ville:ville,
    events:[event.id],source:'QR Tombola '+event.nom,
    optin:true,optin_date:new Date().toISOString().split('T')[0],
    first_seen:new Date().toISOString().split('T')[0],
    last_seen:new Date().toISOString().split('T')[0],
    gains:0,ticket_code:ticketNum,client_type:'btoc'
  };
  fetch(SUPABASE_URL+'/rest/v1/joueurs',{
    method:'POST',
    headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,'Content-Type':'application/json','Prefer':'return=minimal'},
    body:JSON.stringify(payload)
  });
  fetch(SUPABASE_URL+'/rest/v1/participations',{
    method:'POST',
    headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,'Content-Type':'application/json','Prefer':'return=minimal'},
    body:JSON.stringify({event_id:event.id,joueur_id:jid,score:0,completed:true})
  });
}
</script>
</body>
</html>
